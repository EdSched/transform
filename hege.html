<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合格実绩 · 唯新教育</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: #e2ded6;
  --border-light: #ede9e2;
  --text-primary: #1a1814;
  --text-secondary: #5a5650;
  --text-muted: #9a9590;
  --accent: #2c4a8a;

  /* tier colors */
  --t1: #2c4a8a;   --t1-bg: #e8edf8;
  --t2: #5a6e2a;   --t2-bg: #eef3e0;
  --t3: #7a4a20;   --t3-bg: #f5ece0;

  /* subject colors */
  --s-shakai-bg:  #ddeaf8; --s-shakai: #1a3a6a;
  --s-fukushi-bg: #ddf0e8; --s-fukushi: #1a4a30;
  --s-shinpan-bg: #ece4f8; --s-shinpan: #3a2a7a;
  --s-keizai-bg:  #faecd8; --s-keizai: #5a3010;
  --s-keiei-bg:   #f8e8e0; --s-keiei:  #6a2820;
  --s-kyoiku-bg:  #e8f4e4; --s-kyoiku: #1a4818;
  --s-other-bg:   #eeecea; --s-other:  #3a3830;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.55;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--text-primary);
  padding: 2rem 3rem 1.5rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 2rem;
  flex-wrap: wrap;
}
.header-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  line-height: 1.2;
}
.header-sub {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
}
.header-stats {
  display: flex;
  gap: 2rem;
  align-items: flex-end;
}
.stat-item { text-align: right; }
.stat-num {
  font-family: 'Noto Serif SC', serif;
  font-size: 2rem;
  font-weight: 300;
  color: var(--accent);
  line-height: 1;
}
.stat-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  margin-top: 3px;
}

/* ── Controls bar ── */
.controls-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 3rem;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}
.seg-group {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.seg-btn {
  padding: 5px 14px;
  background: transparent;
  border: none;
  border-right: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background .12s, color .12s;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.seg-btn:last-child { border-right: none; }
.seg-btn.active { background: var(--text-primary); color: var(--bg); }
.seg-btn:hover:not(.active) { background: var(--bg); }

.ctrl-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── Subject filter pills ── */
.pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 3px 10px;
  border-radius: 2px;
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  border: 1px solid transparent;
  transition: opacity .12s, transform .1s;
  letter-spacing: 0.02em;
}
.pill:not(.active) { opacity: 0.42; }
.pill.active { opacity: 1; }
.pill:hover { transform: translateY(-1px); }
.pill-shakai  { background: var(--s-shakai-bg);  color: var(--s-shakai);  border-color: var(--s-shakai); }
.pill-fukushi { background: var(--s-fukushi-bg); color: var(--s-fukushi); border-color: var(--s-fukushi); }
.pill-shinpan { background: var(--s-shinpan-bg); color: var(--s-shinpan); border-color: var(--s-shinpan); }
.pill-keizai  { background: var(--s-keizai-bg);  color: var(--s-keizai);  border-color: var(--s-keizai); }
.pill-keiei   { background: var(--s-keiei-bg);   color: var(--s-keiei);   border-color: var(--s-keiei); }
.pill-kyoiku  { background: var(--s-kyoiku-bg);  color: var(--s-kyoiku);  border-color: var(--s-kyoiku); }
.pill-other   { background: var(--s-other-bg);   color: var(--s-other);   border-color: var(--s-other); }

/* ── Main layout ── */
main { padding: 2rem 3rem 4rem; }

/* ── Tier sections ── */
.tier-block { margin-bottom: 2.5rem; }
.tier-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1rem;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.tier-badge {
  font-size: 9px;
  letter-spacing: 0.12em;
  padding: 2px 8px;
  border-radius: 2px;
  text-transform: uppercase;
  font-weight: 500;
}
.tier-1 .tier-badge { background: var(--t1-bg); color: var(--t1); }
.tier-2 .tier-badge { background: var(--t2-bg); color: var(--t2); }
.tier-3 .tier-badge { background: var(--t3-bg); color: var(--t3); }
.tier-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}
.tier-count {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-left: auto;
}

/* ── Univ groups ── */
.univ-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px;
}
.univ-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  transition: box-shadow .15s;
}
.univ-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.univ-head {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-light);
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.univ-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  flex: 1;
  min-width: 0;
}
.univ-total {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  white-space: nowrap;
}

/* ── Entry rows ── */
.entry-list { display: flex; flex-direction: column; }
.entry-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 12px;
  border-top: 1px solid var(--border-light);
  transition: background .1s;
}
.entry-row:hover { background: #faf8f4; }
.entry-row:first-child { border-top: none; }
.subj-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.entry-info { flex: 1; min-width: 0; }
.entry-dept {
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.entry-spec {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}
.entry-scores {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}
.score-tag {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  background: var(--border-light);
  color: var(--text-secondary);
  white-space: nowrap;
}
.entry-subj-tag {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  white-space: nowrap;
}
.era-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  white-space: nowrap;
  background: #f0ede6;
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.era-new {
  background: #e8f0f8;
  color: var(--t1);
  border-color: #c0d0e8;
}

/* ── Empty state ── */
.empty-state {
  padding: 3rem;
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  letter-spacing: 0.04em;
  display: none;
}

/* ── Summary view ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 2rem;
}
.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 16px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 8px;
}
.sum-label {
  font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: 0.03em;
  line-height: 1.4;
}
.sum-num {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.8rem;
  font-weight: 300;
  line-height: 1;
}

/* ── Bar chart ── */
.bar-section { margin-bottom: 2.5rem; }
.bar-section-title {
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
  font-size: 11px;
}
.bar-label { width: 140px; flex-shrink: 0; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 14px; background: var(--border-light); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.bar-val { width: 28px; flex-shrink: 0; text-align: right; color: var(--text-muted); }

@media (max-width: 680px) {
  header { padding: 1.2rem; }
  .controls-bar { padding: 8px 1.2rem; }
  main { padding: 1rem 1.2rem 3rem; }
  .univ-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">合格実绩</div>
    <div class="header-sub">唯新教育 · 文科大学院</div>
  </div>
  <div class="header-stats" id="header-stats">
    <div class="stat-item">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">合格件数</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-univs">—</div>
      <div class="stat-label">合格大学数</div>
    </div>
  </div>
</header>

<div class="controls-bar">
  <div style="display:flex;align-items:center;gap:8px">
    <span class="ctrl-label">年份</span>
    <div class="seg-group" id="era-btns">
      <button class="seg-btn active" onclick="setEra('all')">全部</button>
      <button class="seg-btn" onclick="setEra('hist')">2022–2024</button>
      <button class="seg-btn" onclick="setEra('new')">2025–2026</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="ctrl-label">视图</span>
    <div class="seg-group" id="view-btns">
      <button class="seg-btn active" onclick="setView('list')">大学列表</button>
      <button class="seg-btn" onclick="setView('stats')">统计图表</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span class="ctrl-label">学科</span>
    <div class="pill-group" id="subj-pills"></div>
  </div>
</div>

<main id="main-content"></main>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────
// era: 'hist' = 2022-2024, 'new' = 2025-2026
// subj: shakai / fukushi / shinpan / keizai / keiei / kyoiku / other

const SUBJECTS = [
  { id: 'shakai',  label: '社会学',   cls: 'pill-shakai'  },
  { id: 'fukushi', label: '社会福祉', cls: 'pill-fukushi' },
  { id: 'shinpan', label: '新聞伝播', cls: 'pill-shinpan' },
  { id: 'keizai',  label: '経済学',   cls: 'pill-keizai'  },
  { id: 'keiei',   label: '経営学',   cls: 'pill-keiei'   },
  { id: 'kyoiku',  label: '教育学',   cls: 'pill-kyoiku'  },
  { id: 'other',   label: 'その他',   cls: 'pill-other'   },
];

const SUBJ_COLOR = {
  shakai:  { bg: 'var(--s-shakai-bg)',  fg: 'var(--s-shakai)'  },
  fukushi: { bg: 'var(--s-fukushi-bg)', fg: 'var(--s-fukushi)' },
  shinpan: { bg: 'var(--s-shinpan-bg)', fg: 'var(--s-shinpan)' },
  keizai:  { bg: 'var(--s-keizai-bg)',  fg: 'var(--s-keizai)'  },
  keiei:   { bg: 'var(--s-keiei-bg)',   fg: 'var(--s-keiei)'   },
  kyoiku:  { bg: 'var(--s-kyoiku-bg)',  fg: 'var(--s-kyoiku)'  },
  other:   { bg: 'var(--s-other-bg)',   fg: 'var(--s-other)'   },
};

const SUBJ_LABEL = { shakai:'社会学', fukushi:'社会福祉', shinpan:'新聞伝播', keizai:'経済学', keiei:'経営学', kyoiku:'教育学', other:'その他' };

// tier: 1 = 旧帝・一橋・東工＋早慶上智, 2 = G-MARCH・関関同立＋地方国公立, 3 = 日駒東専＋女子大＋地方私立
const TIER_INFO = {
  1: { label: 'T1', name: '旧帝・一橋・東科大  ＋  早慶上智' },
  2: { label: 'T2', name: 'G-MARCH・関関同立  ＋  地方国公立' },
  3: { label: 'T3', name: '日駒東専  ＋  重点女子大・地方私立' },
};

// Tier classification
function tierOf(univ) {
  const t1 = ['东京大学','京都大学','大阪大学','名古屋大学','九州大学','东北大学','北海道大学','一桥大学','东京科学大学','东京工业大学',
    '早稻田大学','庆应义塾大学','慶應義塾大学','上智大学','御茶水女子大学','筑波大学'];
  const t2 = ['法政大学','明治大学','青山学院大学','立教大学','中央大学','学习院大学','关西大学','関西大学','关西学院大学','関西学院大学',
    '同志社大学','立命馆大学','立命館大学','横滨国立大学','横浜国立大学','横滨市立大学','神户大学','神戸大学','埼玉大学','千叶大学','千葉大学',
    '东京都立大学','東京都立大学','金沢大学','金泽大学','广岛大学','弘前大学','爱知县立大学','大阪公立大学','静冈县立大学','东京外国语大学',
    '神奈川大学'];
  const u = univ.replace(/\s/g,'');
  if (t1.some(x => u.includes(x.replace(/\s/g,'')))) return 1;
  if (t2.some(x => u.includes(x.replace(/\s/g,'')))) return 2;
  return 3;
}

// Subject classification from 在籍学科 field
function subjOf(s) {
  if (!s) return 'other';
  if (s.includes('社会人文(社会)') || s==='社会学') return 'shakai';
  if (s.includes('社会人文(福祉)') || s==='社会福祉') return 'fukushi';
  if (s.includes('社会人文(新传)') || s.includes('社会人文(表象)') || s==='新聞') return 'shinpan';
  if (s.includes('経済') || s.includes('経営') === false && s.includes('经济')) return 'keizai';
  if (s.includes('経営') || s.includes('经营')) return 'keiei';
  if (s.includes('教育')) return 'kyoiku';
  // broader matches
  if (s.includes('keizai') || s.includes('经济学')) return 'keizai';
  if (s.includes('经营学')) return 'keiei';
  return 'other';
}

function subjOf2(s) {
  if (!s) return 'other';
  const t = s.toLowerCase();
  // explicit bracket tags from 2025 sheet
  if (t.includes('(社会)') || t.includes('社会学')) return 'shakai';
  if (t.includes('(福祉)') || t.includes('社会福祉') || t.includes('福祉')) return 'fukushi';
  if (t.includes('(新传)') || t.includes('(表象)') || t.includes('新聞') || t.includes('传播') || t.includes('伝播') || t.includes('メディア')) return 'shinpan';
  if (t.includes('经济') || t.includes('経済') || t.includes('keizai')) return 'keizai';
  if (t.includes('经营') || t.includes('経営') || t.includes('keiei')) return 'keiei';
  if (t.includes('教育') || t.includes('kyoiku')) return 'kyoiku';
  if (t.includes('法学') || t.includes('政治') || t.includes('国際') || t.includes('国际') || t.includes('文学') || t.includes('历史') || t.includes('历史学') || t.includes('日本语')) return 'other';
  return 'other';
}

// Raw data: [univ, dept, spec, student_initial, subj, era, jlpt, eng]
// era: 'hist' or 'new'
// Sources: document 3 (合格实绩 table) + excel data
const DATA = [
  // ── 社会人文系 / 社会学 ─────────────────────────
  ['东京大学','情报学环','社会情报','C',    'shakai', 'hist','N1','TOEFL-115'],
  ['东京大学','情报学环','社会情报','陈涵瑞','shakai','new','N1-119','TOEFL-115'],
  ['大阪大学','人间科学研究科','社会学','Y','shakai','hist','N1-170','TOEFL-91'],
  ['大阪大学','人间科学研究科','社会学','喻静薇','shakai','new','N1-169','TOEFL-90'],
  ['一桥大学','社会学研究科','地球社会研究专攻','Z','shakai','hist','N1-162','TOEFL-98'],
  ['一桥大学','社会学研究科','地球社会研究专攻','C','shakai','hist','N1-110','—'],
  ['一桥大学','社会学研究科','综合社会研究专攻','J※','shakai','hist','N1-145','TOEIC-845'],
  ['一桥大学','社会学研究科','综合社会研究专攻','H','shakai','hist','N1','TOEFL-90'],
  ['一桥大学','社会学研究科','综合社会研究专攻','L','shakai','hist','N1','TOEFL-90'],
  ['一桥大学','社会学研究科','综合社会研究专攻','T','shakai','hist','N1-99','TOEIC-820'],
  ['一桥大学','社会学研究科','综合社会研究专攻','L','shakai','hist','N2','TOEIC-504'],
  ['一桥大学','社会学研究科','総合社会学専攻','胡潇宁','shakai','new','N1','TOEFL-90'],
  ['一桥大学','社会学研究科','総合社会学専攻','王昱程','shakai','new','—','—'],
  ['一桥大学','社会学研究科','総合社会学専攻','江洲','shakai','new','N1-145','TOEIC-845'],
  ['一桥大学','社会学研究科','総合社会学専攻','万子玥','shakai','new','—','—'],
  ['一桥大学','言语社会研究科','表象文化论','李童昕','shinpan','new','N1-162','TOEIC-700'],
  ['东京科学大学','社会人间科学系','社会学','C','shakai','hist','N1','TOEIC-820'],
  ['东京科学大学','社会人间科学系','表象文化','林瑜宁','shinpan','new','N1-176','TOEIC-85'],
  ['御茶水女子大学','人间文化创成研究科','人间发达科学专攻','J※','shakai','hist','N1-145','TOEIC-845'],
  ['御茶水女子大学','人间社会研究科','教育学专攻','Z','kyoiku','hist','N1','—'],
  ['御茶水女子大学','人间创成文化科学','临床心理学','刘路遥','shakai','new','N2-104','IELTS-7.0'],

let curEra = 'all';
let curView = 'list';
let activeSubs = new Set(SUBJECTS.map(s => s.id));

// ─── UI INIT ────────────────────────────────────────────────────────────
function initPills() {
  const container = document.getElementById('subj-pills');
  container.innerHTML = SUBJECTS.map(s => `
    <button class="pill ${s.cls} active" id="pill-${s.id}" onclick="toggleSubj('${s.id}')">${s.label}</button>
  `).join('');
}

function toggleSubj(id) {
  if (activeSubs.has(id) && activeSubs.size === 1) return;
  if (activeSubs.has(id)) activeSubs.delete(id); else activeSubs.add(id);
  document.querySelectorAll('.pill').forEach(p => {
    const sid = p.id.replace('pill-', '');
    p.classList.toggle('active', activeSubs.has(sid));
  });
  render();
}

function setEra(e) {
  curEra = e;
  document.querySelectorAll('#era-btns .seg-btn').forEach((b,i) =>
    b.classList.toggle('active', ['all','hist','new'][i] === e));
  render();
}

function setView(v) {
  curView = v;
  document.querySelectorAll('#view-btns .seg-btn').forEach((b,i) =>
    b.classList.toggle('active', ['list','stats'][i] === v));
  render();
}

// ─── FILTER ─────────────────────────────────────────────────────────────
function filtered() {
  return DATA.filter(d => {
    const eraOk = curEra === 'all' || d[5] === curEra;
    const subjOk = activeSubs.has(d[4]);
    return eraOk && subjOk;
  });
}

// ─── RENDER ─────────────────────────────────────────────────────────────
function render() {
  const data = filtered();
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-univs').textContent = new Set(data.map(d=>d[0])).size;

  const main = document.getElementById('main-content');
  if (curView === 'list') main.innerHTML = renderList(data);
  else main.innerHTML = renderStats(data);
}

function renderList(data) {
  // Group by tier → univ
  const tiers = {1:{}, 2:{}, 3:{}};
  for (const d of data) {
    const t = tierOf(d[0]);
    if (!tiers[t][d[0]]) tiers[t][d[0]] = [];
    tiers[t][d[0]].push(d);
  }

  let html = '';
  for (const t of [1,2,3]) {
    const univs = Object.keys(tiers[t]);
    if (!univs.length) continue;
    const total = univs.reduce((s,u) => s + tiers[t][u].length, 0);
    html += `<div class="tier-block tier-${t}">`;
    html += `<div class="tier-head">
      <span class="tier-badge">${TIER_INFO[t].label}</span>
      <span class="tier-name">${TIER_INFO[t].name}</span>
      <span class="tier-count">${total} 件 · ${univs.length} 校</span>
    </div>`;
    html += `<div class="univ-grid">`;
    // Sort univs by count desc
    univs.sort((a,b) => tiers[t][b].length - tiers[t][a].length);
    for (const u of univs) {
      const rows = tiers[t][u];
      html += `<div class="univ-card">`;
      html += `<div class="univ-head"><span class="univ-name">${u}</span><span class="univ-total">${rows.length} 件</span></div>`;
      html += `<div class="entry-list">`;
      for (const r of rows) {
        const sc = SUBJ_COLOR[r[4]];
        const scoreStr = [r[6],r[7]].filter(x=>x&&x!=='—'&&x!=='无'&&x!=='—').join('  ');
        html += `<div class="entry-row">`;
        html += `<div class="subj-dot" style="background:${sc.fg}"></div>`;
        html += `<div class="entry-info">`;
        html += `<div class="entry-dept">${r[1]}</div>`;
        if (r[2] && r[2] !== '—') html += `<div class="entry-spec">${r[2]}</div>`;
        html += `</div>`;
        html += `<div class="entry-scores">`;
        if (scoreStr) html += `<span class="score-tag">${scoreStr}</span>`;
        html += `<span class="entry-subj-tag" style="background:${sc.bg};color:${sc.fg}">${SUBJ_LABEL[r[4]]}</span>`;
        html += `<span class="era-badge ${r[5]==='new'?'era-new':''}">${r[5]==='new'?'25–26':'22–24'}</span>`;
        html += `</div></div>`;
      }
      html += `</div></div>`;
    }
    html += `</div></div>`;
  }
  return html;
}

function renderStats(data) {
  // Counts by subject
  const subjCount = {};
  const univCount = {};
  for (const d of data) {
    subjCount[d[4]] = (subjCount[d[4]]||0) + 1;
    univCount[d[0]] = (univCount[d[0]]||0) + 1;
  }

  // Summary cards
  const newCnt = data.filter(d=>d[5]==='new').length;
  const histCnt = data.filter(d=>d[5]==='hist').length;
  let html = `<div class="summary-grid">`;
  html += `<div class="sum-card"><div class="sum-label">全部合格件数</div><div class="sum-num" style="color:var(--accent)">${data.length}</div></div>`;
  html += `<div class="sum-card"><div class="sum-label">合格大学数</div><div class="sum-num">${new Set(data.map(d=>d[0])).size}</div></div>`;
  html += `<div class="sum-card"><div class="sum-label">2025–2026 入学</div><div class="sum-num" style="color:var(--t1)">${newCnt}</div></div>`;
  html += `<div class="sum-card"><div class="sum-label">2022–2024 実绩</div><div class="sum-num" style="color:var(--text-muted)">${histCnt}</div></div>`;
  html += `</div>`;

  // Subject bar
  const subjOrder = ['shakai','fukushi','shinpan','keizai','keiei','kyoiku','other'];
  const maxSubj = Math.max(...subjOrder.map(s=>subjCount[s]||0), 1);
  html += `<div class="bar-section"><div class="bar-section-title">学科别合格件数</div>`;
  for (const s of subjOrder) {
    const cnt = subjCount[s]||0;
    if (!cnt) continue;
    const sc = SUBJ_COLOR[s];
    const pct = Math.round(cnt/maxSubj*100);
    html += `<div class="bar-row">
      <div class="bar-label">${SUBJ_LABEL[s]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${sc.fg}"></div></div>
      <div class="bar-val">${cnt}</div>
    </div>`;
  }
  html += `</div>`;

  // Top univs bar
  const topUnivs = Object.entries(univCount).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const maxU = topUnivs[0]?.[1] || 1;
  html += `<div class="bar-section"><div class="bar-section-title">大学别合格件数（前15）</div>`;
  for (const [u, cnt] of topUnivs) {
    const t = tierOf(u);
    const colors = ['','var(--t1)','var(--t2)','var(--t3)'];
    const pct = Math.round(cnt/maxU*100);
    html += `<div class="bar-row">
      <div class="bar-label" title="${u}">${u}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[t]}"></div></div>
      <div class="bar-val">${cnt}</div>
    </div>`;
  }
  html += `</div>`;

  // Tier breakdown
  html += `<div class="bar-section"><div class="bar-section-title">层次别分布</div>`;
  for (const t of [1,2,3]) {
    const cnt = data.filter(d=>tierOf(d[0])===t).length;
    const pct = data.length ? Math.round(cnt/data.length*100) : 0;
    const colors = ['','var(--t1)','var(--t2)','var(--t3)'];
    html += `<div class="bar-row">
      <div class="bar-label">${TIER_INFO[t].label} ${TIER_INFO[t].name.split('＋')[0].trim()}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[t]}"></div></div>
      <div class="bar-val">${cnt}</div>
    </div>`;
  }
  html += `</div>`;

  return html;
}

// ─── BOOT ────────────────────────────────────────────────────────────────
initPills();
render();
</script>
</body>
</html>
