<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP单回课程点选</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: #e2ded6;
  --border-light: #ede9e2;
  --text-primary: #1a1814;
  --text-secondary: #5a5650;
  --text-muted: #9a9590;
  --accent: #2c4a8a;
  --checked-bg: #1a1814;
  --checked-text: #f7f5f0;

  --c-base-bg: #ddeaf8;   --c-base: #1a3a6a;
  --c-adv-bg: #e8e4f8;    --c-adv: #3a2a7a;
  --c-method-bg: #ddf0e0; --c-method: #1a4a28;
  --c-past-bg: #f8e4dc;   --c-past: #6a2818;
  --c-plan-bg: #faecd8;   --c-plan: #5a3010;
  --c-apply-bg: #fbeaf0;  --c-apply: #6a1a3a;
  --c-inter-bg: #e1f0ea;  --c-inter: #0a4030;
  --c-eng-bg: #ece8e0;    --c-eng: #3a3830;
  --c-found-bg: #f5f0e8;  --c-found: #2a2820;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Mono', 'Noto Serif SC', monospace;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.5;
}

/* ── Header ── */
header {
  border-bottom: 1px solid var(--border);
  padding: 2.5rem 3rem 1.5rem;
  background: var(--surface);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 2rem;
  flex-wrap: wrap;
}
.header-left h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.6rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  line-height: 1.2;
}
.header-left .sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ── Sticky summary bar ── */
.summary-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 3rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.summary-counts {
  display: flex;
  gap: 1.5rem;
  align-items: center;
  flex-wrap: wrap;
}
.summary-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
}
.summary-num {
  font-size: 18px;
  font-weight: 500;
  color: var(--text-primary);
  font-family: 'DM Mono', monospace;
  min-width: 2ch;
  text-align: right;
}
.summary-divider { width: 1px; height: 20px; background: var(--border); }
.btn-reset {
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: transparent;
  font-family: inherit;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.btn-reset:hover { border-color: var(--text-secondary); color: var(--text-primary); }

/* ── Tabs ── */
.tabs-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 3rem;
  display: flex;
  gap: 0;
  overflow-x: auto;
}
.tab-btn {
  padding: 10px 18px;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  font-family: inherit;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  letter-spacing: 0.03em;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
.tab-btn:hover:not(.active) { color: var(--text-secondary); }

/* ── Main layout ── */
main { padding: 2rem 3rem 4rem; max-width: 1100px; }

/* ── Section ── */
.section { display: none; }
.section.active { display: block; }

/* ── Project group ── */
.project-group { margin-bottom: 2rem; }
.project-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-light);
}
.project-tag {
  border-radius: 3px;
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.project-count {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

/* ── Course rows ── */
.course-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.course-row {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  align-items: stretch;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.1s;
  min-height: 48px;
}
.course-row:last-child { border-bottom: none; }
.course-row:hover { background: var(--bg); }
.course-row.checked { background: #f0ede8; }

.course-check {
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border-light);
  padding: 0 8px;
  flex-shrink: 0;
}
.checkmark {
  width: 14px;
  height: 14px;
  border: 1px solid var(--border);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: transparent;
  background: transparent;
  transition: all 0.1s;
  flex-shrink: 0;
}
.course-row.checked .checkmark {
  background: var(--text-primary);
  border-color: var(--text-primary);
  color: #fff;
}

.course-info {
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}
.course-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.course-num {
  font-size: 10px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}
.course-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
.course-hw {
  font-size: 10px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}
.hw-label {
  background: var(--bg);
  border: 1px solid var(--border-light);
  border-radius: 2px;
  padding: 0 4px;
  font-size: 9px;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* subject detail rows */
.subject-rows { display: none; }
.subject-rows.open { display: block; }
.subject-row {
  display: grid;
  grid-template-columns: 36px 36px 1fr auto;
  align-items: stretch;
  border-top: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.1s;
  min-height: 44px;
  background: #fafaf8;
}
.subject-row:hover { background: #f5f3ee; }
.subject-row.checked { background: #f0ede6; }
.subject-indent {
  border-right: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
}
.indent-line {
  width: 1px;
  height: 60%;
  background: var(--border);
}
.subject-check {
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border-light);
  padding: 0 8px;
}
.subject-info {
  padding: 7px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.subject-title { font-size: 11px; font-weight: 500; color: var(--text-primary); }
.subject-topics { font-size: 10px; color: var(--text-muted); line-height: 1.5; }

.course-meta {
  padding: 8px 14px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  gap: 3px;
  flex-shrink: 0;
}
.meta-hours {
  font-size: 12px;
  font-weight: 500;
  font-family: 'DM Mono', monospace;
  color: var(--text-primary);
}
.meta-unit { font-size: 9px; color: var(--text-muted); }

/* ── 专业课 expand toggle ── */
.expand-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px 12px 6px;
  letter-spacing: 0.04em;
  user-select: none;
  transition: color 0.1s;
}
.expand-btn:hover { color: var(--text-secondary); }
.expand-icon { font-size: 8px; transition: transform 0.2s; }
.expand-icon.open { transform: rotate(90deg); }

/* ── 专业课 subject selector ── */
.major-selector {
  padding: 8px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.major-label { font-size: 11px; color: var(--text-secondary); letter-spacing: 0.03em; }
.major-btn {
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: transparent;
  font-family: inherit;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
}
.major-btn.active {
  background: var(--text-primary);
  border-color: var(--text-primary);
  color: var(--bg);
}
.major-btn:hover:not(.active) { border-color: var(--text-secondary); color: var(--text-secondary); }

@media (max-width: 680px) {
  header { padding: 1.5rem 1.2rem 1rem; }
  .summary-bar { padding: 10px 1.2rem; }
  .tabs-bar { padding: 0 1.2rem; }
  main { padding: 1.2rem 1.2rem 3rem; }
  .course-row { grid-template-columns: 36px 1fr auto; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>VIP单回课程点选</h1>
    <div class="sub">唯新教育 · 请勾选所需课程</div>
  </div>
</header>

<div class="summary-bar">
  <div class="summary-counts">
    <div class="summary-item">
      <span class="summary-num" id="total-sessions">0</span>
      <span>回</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <span class="summary-num" id="total-hours">0</span>
      <span>课时</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item" style="color:var(--text-muted);font-size:11px">
      已选课程合计
    </div>
  </div>
  <button class="btn-reset" onclick="resetAll()">清空选择</button>
</div>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="showTab('overview')">课程总览</button>
  <button class="tab-btn" onclick="showTab('xinchuan')">新闻传播学</button>
  <button class="tab-btn" onclick="showTab('shehui')">社会学</button>
  <button class="tab-btn" onclick="showTab('jingyingxue')">经营学</button>
  <button class="tab-btn" onclick="showTab('jingji')">经济学</button>
</div>

<main>

<!-- ── 总览 ── -->
<div class="section active" id="tab-overview">

  <!-- 升学基本指导 -->
  <div class="project-group">
    <div class="project-header">
      <span class="project-tag" style="background:var(--c-found-bg);color:var(--c-found)">升学基本指导</span>
    </div>
    <div class="course-table">
      <div class="course-row" onclick="toggleCourse(this,'升学目标指定',0,0,'升学基本指导')">
        <div class="course-check"><div class="checkmark">✓</div></div>
        <div class="course-info">
          <div class="course-title">升学目标指定</div>
          <div class="course-desc">面谈、方向确认、整体学习计划制定</div>
          <div class="course-hw"><span class="hw-label">作业</span>完成老师要求信息提交</div>
        </div>
        <div class="course-meta"><span class="meta-hours">—</span><span class="meta-unit">面谈</span></div>
      </div>
    </div>
  </div>

  <!-- 专业知识 -->
  <div class="project-group">
    <div class="project-header">
      <span class="project-tag" style="background:var(--c-base-bg);color:var(--c-base)">1. 专业课基础知识</span>
      <span class="project-count" id="cnt-base">0 回选中</span>
    </div>
    <div class="course-table">
      <div class="major-selector">
        <span class="major-label">专业方向：</span>
        <button class="major-btn active" onclick="setMajor('base','xinchuan',this)">新闻传播学</button>
        <button class="major-btn" onclick="setMajor('base','shehui',this)">社会学</button>
        <button class="major-btn" onclick="setMajor('base','jingyingxue',this)">经营学</button>
        <button class="major-btn" onclick="setMajor('base','jingji',this)">经济学</button>
      </div>
      <div id="base-subjects"></div>
      <div class="expand-btn" onclick="toggleExpand('base-subjects',this)">
        <span class="expand-icon">▶</span> 查看各课详情
      </div>
    </div>
  </div>

  <!-- 专业课备考强化 -->
  <div class="project-group">
    <div class="project-header">
      <span class="project-tag" style="background:var(--c-adv-bg);color:var(--c-adv)">2. 专业课备考强化</span>
      <span class="project-count" id="cnt-adv">0 回选中</span>
    </div>
    <div class="course-table">
      <div class="major-selector">
        <span class="major-label">专业方向：</span>
        <button class="major-btn active" onclick="setMajor('adv','xinchuan',this)">新闻传播学</button>
        <button class="major-btn" onclick="setMajor('adv','shehui',this)">社会学</button>
        <button class="major-btn" onclick="setMajor('adv','jingyingxue',this)">经营学</button>
        <button class="major-btn" onclick="setMajor('adv','jingji',this)">经济学</button>
      </div>
      <div id="adv-subjects"></div>
      <div class="expand-btn" onclick="toggleExpand('adv-subjects',this)">
        <span class="expand-icon">▶</span> 查看各课详情
      </div>
    </div>
  </div>

  <!-- 基础方法论 -->
  <div class="project-group">
    <div class="project-header">
      <span class="project-tag" style="background:var(--c-method-bg);color:var(--c-method)">3. 专业课基础方法论</span>
      <span class="project-count" id="cnt-method">0 回选中</span>
    </div>
    <div class="course-table">
      <div class="major-selector">
        <span class="major-label">专业方向：</span>
        <button class="major-btn active" onclick="setMajor('method','xinchuan',this)">新闻传播学</button>
        <button class="major-btn" onclick="setMajor('method','shehui',this)">社会学</button>
        <button class="major-btn" onclick="setMajor('method','jingyingxue',this)">经营学</button>
        <button class="major-btn" onclick="setMajor('method','jingji',this)">经济学</button>
      </div>
      <div id="method-subjects"></div>
      <div class="expand-btn" onclick="toggleExpand('method-subjects',this)">
        <span class="expand-icon">▶</span> 查看各课详情
      </div>
    </div>
  </div>

  <!-- 过去问对策 -->
  <div class="project-group">
    <div class="project-header">
      <span class="project-tag" style="background:var(--c-past-bg);color:var(--c-past)">过去问对策</span>
      <span class="project-count" id="cnt-past">0 回选中</span>
    </div>
    <div class="course-table" id="past-table"></div>
  </div>

  <!-- 英翻日对策 -->
  <div class="project-group">
    <div class="project-header">
      <span class="project-tag" style="background:var(--c-eng-bg);color:var(--c-eng)">英翻日对策</span>
      <span class="project-count" id="cnt-eng">0 回选中</span>
    </div>
    <div class="course-table" id="eng-table"></div>
  </div>

  <!-- 研究计划书 -->
  <div class="project-group">
    <div class="project-header">
      <span class="project-tag" style="background:var(--c-plan-bg);color:var(--c-plan)">研究计划书</span>
      <span class="project-count" id="cnt-plan">0 回选中</span>
    </div>
    <div class="course-table" id="plan-table"></div>
  </div>

  <!-- 出愿指导 -->
  <div class="project-group">
    <div class="project-header">
      <span class="project-tag" style="background:var(--c-apply-bg);color:var(--c-apply)">出愿指导</span>
      <span class="project-count" id="cnt-apply">0 回选中</span>
    </div>
    <div class="course-table" id="apply-table"></div>
  </div>

  <!-- 面试对策 -->
  <div class="project-group">
    <div class="project-header">
      <span class="project-tag" style="background:var(--c-inter-bg);color:var(--c-inter)">面试对策</span>
      <span class="project-count" id="cnt-inter">0 回选中</span>
    </div>
    <div class="course-table" id="inter-table"></div>
  </div>

</div><!-- end overview -->

<!-- ── 专业课详表 tabs ── -->
<div class="section" id="tab-xinchuan"></div>
<div class="section" id="tab-shehui"></div>
<div class="section" id="tab-jingyingxue"></div>
<div class="section" id="tab-jingji"></div>

</main>

<script>
// ── Data ──

    {id:'past-5', name:'志望校真题强化', desc:'志望校弱项强化训练（易错题专项）', hw:'完成课后题目', hours:0},

// ── State ──
const selected = new Set();
let currentMajor = {base:'xinchuan', adv:'xinchuan', method:'xinchuan'};

// ── Build fixed course tables ──
function buildFixedTable(tableId, courses, cntId, tagStyle) {
  const tbl = document.getElementById(tableId);
  tbl.innerHTML = '';
  courses.forEach(c => {
    const row = document.createElement('div');
    row.className = 'course-row';
    row.dataset.id = c.id;
    row.dataset.hours = c.hours;
    row.dataset.sessions = 1;
    row.innerHTML = `
      <div class="course-check"><div class="checkmark">✓</div></div>
      <div class="course-info">
        <div class="course-title">${c.name}</div>
        <div class="course-desc">${c.desc}</div>
        <div class="course-hw"><span class="hw-label">作业</span>${c.hw}</div>
      </div>
      <div class="course-meta">
        <span class="meta-hours">${c.hours > 0 ? c.hours : '—'}</span>
        <span class="meta-unit">${c.hours > 0 ? '课时' : '面谈'}</span>
      </div>`;
    row.addEventListener('click', () => { toggleRow(row); updateCounts(); });
    tbl.appendChild(row);
  });
}

// ── Build subject detail rows ──
function buildSubjectRows(containerId, major, type, cntId) {
  const container = document.getElementById(containerId);
  const subjects = MAJOR_SUBJECTS[major][type] || [];
  container.innerHTML = '';
  subjects.forEach(s => {
    const row = document.createElement('div');
    row.className = 'subject-row';
    row.dataset.id = s.id;
    row.dataset.hours = s.hours;
    row.dataset.sessions = s.hours / 2;
    row.innerHTML = `
      <div class="subject-indent"><div class="indent-line"></div></div>
      <div class="subject-check"><div class="checkmark">✓</div></div>
      <div class="subject-info">
        <div class="subject-title"><span style="color:var(--text-muted);margin-right:6px">${s.num}</span>${s.name}</div>
        <div class="subject-topics">${s.topics}</div>
      </div>
      <div class="course-meta">
        <span class="meta-hours">${s.hours}</span>
        <span class="meta-unit">课时</span>
      </div>`;
    if (selected.has(s.id)) row.classList.add('checked');
    row.addEventListener('click', () => { toggleRow(row); updateCounts(); });
    container.appendChild(row);
  });
}

function setMajor(type, major, btn) {
  currentMajor[type] = major;
  btn.closest('.major-selector').querySelectorAll('.major-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildSubjectRows(`${type}-subjects`, major, type, `cnt-${type}`);
  updateCounts();
}

function toggleRow(row) {
  const id = row.dataset.id;
  if (selected.has(id)) { selected.delete(id); row.classList.remove('checked'); }
  else { selected.add(id); row.classList.add('checked'); }
}

function toggleExpand(id, btn) {
  const el = document.getElementById(id);
  const icon = btn.querySelector('.expand-icon');
  const isOpen = el.classList.toggle('open');
  icon.classList.toggle('open', isOpen);
  btn.querySelector('span:last-child').textContent = isOpen ? '收起详情' : '查看各课详情';
}

function updateCounts() {
  let totalSessions = 0, totalHours = 0;
  selected.forEach(id => {
    const row = document.querySelector(`[data-id="${id}"]`);
    if (!row) return;
    totalSessions += parseFloat(row.dataset.sessions) || 0;
    totalHours += parseFloat(row.dataset.hours) || 0;
  });
  document.getElementById('total-sessions').textContent = totalSessions;
  document.getElementById('total-hours').textContent = totalHours;

  // Per-group counts
  const groups = {
    past: ['past-1','past-2','past-3','past-4','past-5'],
    eng: ['eng-1','eng-2','eng-3','eng-4'],
    plan: ['plan-1','plan-2','plan-3','plan-4','plan-5','plan-6','plan-7','plan-8','plan-9','plan-10','plan-11'],
    apply: ['apply-1','apply-2','apply-3','apply-4','apply-5','apply-6'],
    inter: ['inter-1','inter-2','inter-3','inter-4','inter-5'],
  };
  Object.entries(groups).forEach(([key, ids]) => {
    const cnt = ids.filter(id => selected.has(id)).length;
    const el = document.getElementById(`cnt-${key}`);
    if (el) el.textContent = cnt > 0 ? `${cnt} 回选中` : '';
  });
  // subject groups
  ['base','adv','method'].forEach(type => {
    const all = Object.values(MAJOR_SUBJECTS).flatMap(m => (m[type]||[]).map(s=>s.id));
    const cnt = all.filter(id => selected.has(id)).length;
    const el = document.getElementById(`cnt-${type}`);
    if (el) el.textContent = cnt > 0 ? `${cnt} 回选中` : '';
  });
}

function resetAll() {
  selected.clear();
  document.querySelectorAll('.course-row.checked, .subject-row.checked').forEach(r => r.classList.remove('checked'));
  updateCounts();
}

function showTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['overview','xinchuan','shehui','jingyingxue','jingji'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  if (tab !== 'overview') buildMajorTab(tab);
}

function buildMajorTab(major) {
  const container = document.getElementById(`tab-${major}`);
  const labels = {xinchuan:'新闻传播学', shehui:'社会学', jingyingxue:'经营学', jingji:'经济学'};
  const data = MAJOR_SUBJECTS[major];
  const types = [
    {key:'base', label:'1. 专业课基础知识', bg:'var(--c-base-bg)', color:'var(--c-base)'},
    {key:'adv',  label:'2. 专业课备考强化', bg:'var(--c-adv-bg)',  color:'var(--c-adv)'},
    {key:'method',label:'3. 专业课基础方法论', bg:'var(--c-method-bg)', color:'var(--c-method)'},
  ];
  container.innerHTML = '';
  types.forEach(t => {
    const subjects = data[t.key] || [];
    if (!subjects.length) return;
    const pg = document.createElement('div');
    pg.className = 'project-group';
    pg.innerHTML = `
      <div class="project-header">
        <span class="project-tag" style="background:${t.bg};color:${t.color}">${t.label}</span>
        <span class="project-count">${subjects.reduce((a,s)=>a+s.hours,0)} 课时 / ${subjects.length} 回</span>
      </div>
      <div class="course-table" id="mt-${major}-${t.key}"></div>`;
    container.appendChild(pg);
    const tbl = document.getElementById(`mt-${major}-${t.key}`);
    subjects.forEach(s => {
      const row = document.createElement('div');
      row.className = `subject-row${selected.has(s.id)?' checked':''}`;
      row.style.gridTemplateColumns = '36px 1fr auto';
      row.dataset.id = s.id;
      row.dataset.hours = s.hours;
      row.dataset.sessions = s.hours / 2;
      row.innerHTML = `
        <div class="subject-check" style="border-right:1px solid var(--border-light)"><div class="checkmark">✓</div></div>
        <div class="subject-info" style="padding:8px 12px">
          <div class="subject-title" style="font-size:12px"><span style="color:var(--text-muted);margin-right:6px">${s.num}</span>${s.name}</div>
          <div class="subject-topics">${s.topics}</div>
        </div>
        <div class="course-meta">
          <span class="meta-hours">${s.hours}</span>
          <span class="meta-unit">课时</span>
        </div>`;
      row.addEventListener('click', () => { toggleRow(row); syncSelection(s.id); updateCounts(); });
      tbl.appendChild(row);
    });
  });
}

// sync selection state across overview and detail tabs
function syncSelection(id) {
  const isSelected = selected.has(id);
  document.querySelectorAll(`[data-id="${id}"]`).forEach(el => {
    el.classList.toggle('checked', isSelected);
  });
}

// ── Init ──
buildFixedTable('past-table', FIXED_COURSES.past, 'cnt-past');
buildFixedTable('eng-table',  FIXED_COURSES.eng,  'cnt-eng');
buildFixedTable('plan-table', FIXED_COURSES.plan, 'cnt-plan');
buildFixedTable('apply-table',FIXED_COURSES.apply,'cnt-apply');
buildFixedTable('inter-table',FIXED_COURSES.inter,'cnt-inter');
buildSubjectRows('base-subjects',   'xinchuan', 'base',   'cnt-base');
buildSubjectRows('adv-subjects',    'xinchuan', 'adv',    'cnt-adv');
buildSubjectRows('method-subjects', 'xinchuan', 'method', 'cnt-method');
updateCounts();
</script>
