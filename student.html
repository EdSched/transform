<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面谈预约 — 唯新教育</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf7f2; --surface: #ffffff; --border: #e8e0d4; --border-light: #f0ebe2;
  --text-primary: #3a2e24; --text-secondary: #6b5c4e; --text-muted: #a8998a;
  --accent: #3a2e24; --accent-light: #f2ede8; --accent-mid: #8a7a6e;
  --sat: #2a5a9a; --sun: #9a2a3c;
  --tag-daily-bg:#ede8fa; --tag-daily:#4a3a8a;
  --tag-plan-bg:#e2f2e8;  --tag-plan:#2a5a38;
  --tag-mock-bg:#faeae0;  --tag-mock:#7a3818;
  --success:#2a9e6a; --success-light:#e4f5ee;
  --warning:#b87820; --warning-light:#fdf2dc;
  --danger:#b03030;  --danger-light:#fceaea;
}
body { font-family:'DM Mono','Noto Serif SC',monospace; background:var(--bg); color:var(--text-primary); font-size:13px; line-height:1.5; min-height:100vh; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:1.4rem 2.5rem 1.1rem; }
.header-major { font-family:'Noto Serif SC',serif; font-size:1.35rem; font-weight:600; letter-spacing:.02em; }
.header-sub { font-size:10px; color:var(--text-muted); letter-spacing:.08em; text-transform:uppercase; margin-top:3px; }
.header-locked { display:inline-block; margin-top:6px; font-size:11px; color:var(--text-secondary); background:var(--accent-light); border:1px solid var(--border); border-radius:2px; padding:3px 10px; }
.page-wrap { max-width:680px; margin:0 auto; padding:28px 24px 60px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:20px 22px; margin-bottom:14px; }
.card-title { font-family:'Noto Serif SC',serif; font-size:13px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.step-num { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; background:var(--accent); color:#fff; border-radius:2px; font-size:10px; font-weight:600; flex-shrink:0; font-family:'DM Mono',monospace; }
.form-group { margin-bottom:12px; }
.form-label { display:block; font-size:11px; color:var(--text-secondary); margin-bottom:4px; }
.required { color:var(--danger); }
input,select,textarea { width:100%; border:1px solid var(--border); background:var(--bg); border-radius:3px; padding:7px 9px; font-size:12px; font-family:'DM Mono',monospace; color:var(--text-primary); outline:none; transition:border-color .15s; }
input:focus,select:focus,textarea:focus { border-color:var(--accent); }
.radio-group { display:flex; gap:5px; flex-wrap:wrap; }
.radio-option { position:relative; }
.radio-option input[type=radio] { position:absolute; opacity:0; width:0; height:0; }
.radio-option label { display:block; padding:5px 12px; border:1px solid var(--border); border-radius:2px; cursor:pointer; font-size:12px; transition:all .15s; background:var(--surface); white-space:nowrap; }
.radio-option input:checked+label { background:var(--accent); color:#fff; border-color:var(--accent); }
.radio-option label:hover { border-color:var(--accent-mid); }
.progress-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.type-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px; }
.type-card { border:1px solid var(--border); border-radius:3px; padding:10px 12px; cursor:pointer; transition:all .15s; position:relative; background:var(--surface); }
.type-card:hover:not(.locked) { border-color:var(--accent-mid); }
.type-card.selected { border-color:var(--accent); background:var(--accent-light); border-width:2px; }
.type-card.selected .type-card-name { color:var(--accent); }
.type-card.locked { opacity:.4; cursor:not-allowed; background:var(--bg); }
.type-card-name { font-size:12px; font-weight:600; margin-bottom:3px; }
.type-card-desc { font-size:10px; color:var(--text-muted); }
.type-card-lock { position:absolute; top:8px; right:8px; font-size:12px; display:none; }
.locked-notice { background:var(--bg); border:1px dashed var(--border); border-radius:3px; padding:9px 11px; font-size:11px; color:var(--text-muted); line-height:1.6; }
.slot-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:6px; }
.slot-option { position:relative; }
.slot-option input[type=radio] { position:absolute; opacity:0; width:0; height:0; }
.slot-option label { display:block; padding:9px 10px; border:1px solid var(--border); border-radius:3px; cursor:pointer; transition:all .15s; background:var(--surface); }
.slot-option label:hover { border-color:var(--accent-mid); }
.slot-option input:checked+label { border-color:var(--accent); background:var(--accent-light); }
.slot-option.taken label { opacity:.4; cursor:not-allowed; background:var(--bg); pointer-events:none; }
.slot-date-r { font-size:12px; font-weight:500; }
.slot-dow-r { font-size:10px; margin-left:4px; }
.slot-time-r { font-size:11px; color:var(--text-muted); margin-top:2px; font-family:'DM Mono',monospace; }
.slot-remain { font-size:10px; margin-top:2px; }
.no-slots { font-size:11px; color:var(--text-muted); text-align:center; padding:20px 0; line-height:1.8; }
.tag { display:inline-block; padding:1px 7px; border-radius:2px; font-size:10px; font-weight:500; }
.tag-daily { background:var(--tag-daily-bg); color:var(--tag-daily); }
.tag-plan  { background:var(--tag-plan-bg);  color:var(--tag-plan); }
.tag-mock  { background:var(--tag-mock-bg);  color:var(--tag-mock); }
.status-badge { padding:2px 8px; border-radius:2px; font-size:10px; font-weight:500; }
.status-pending   { background:var(--warning-light); color:var(--warning); }
.status-confirmed { background:var(--success-light); color:var(--success); }
.status-cancelled { background:var(--border); color:var(--text-muted); }
.btn { display:inline-flex; align-items:center; gap:5px; padding:8px 16px; border-radius:3px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid transparent; transition:all .15s; font-family:'DM Mono',monospace; }
.btn-primary { background:var(--accent); color:#fff; width:100%; justify-content:center; padding:12px; font-size:13px; }
.btn-primary:hover { background:#5a4a3c; }
.btn-outline { background:transparent; color:var(--text-primary); border-color:var(--border); }
.btn-outline:hover { background:var(--bg); }
.success-banner { background:var(--success-light); border:1px solid var(--success); border-radius:4px; padding:14px 18px; margin-bottom:16px; display:none; }
.success-banner.show { display:block; }
.success-banner-title { font-weight:600; color:var(--success); margin-bottom:3px; font-size:13px; }
.success-banner-text { font-size:11px; color:var(--text-secondary); }
.no-major-banner { background:var(--danger-light); border:1px solid var(--danger); border-radius:4px; padding:24px; text-align:center; }
.no-major-title { font-weight:600; color:var(--danger); margin-bottom:4px; font-size:13px; }
.no-major-text { font-size:11px; color:var(--text-secondary); }
.section-sep { display:flex; align-items:center; gap:12px; margin:28px 0 18px; }
.section-sep-line { flex:1; border-top:1px solid var(--border); }
.section-sep-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); }
.refresh-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.refresh-meta { font-size:11px; color:var(--text-muted); }
.booking-list { display:flex; flex-direction:column; gap:8px; }
.booking-row { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:12px 14px; }
.booking-row-name { font-weight:600; font-size:13px; font-family:'Noto Serif SC',serif; }
.booking-row-meta { font-size:11px; color:var(--text-muted); margin-top:2px; }
.booking-row-needs { font-size:11px; color:var(--text-secondary); margin-top:4px; border-top:1px solid var(--border-light); padding-top:5px; }
.urgency-high { color:var(--danger); font-weight:600; }
.urgency-mid  { color:var(--warning); font-weight:600; }
.urgency-low  { color:var(--success); font-weight:600; }
.loading { text-align:center; padding:30px; color:var(--text-muted); font-size:12px; }
</style>
</head>
<body>
<header>
  <div id="headerContent">
    <div class="header-major">面谈预约</div>
    <div class="header-sub">唯新教育</div>
  </div>
</header>
<div class="page-wrap" id="mainWrap"><div class="loading">加载中…</div></div>

<script>
const SB_URL='https://vwntezfvqbrkeovnseku.supabase.co';
const SB_KEY='sb_publishable_cUnCkti5qv1_G4N6Ho5tpw_9pr7pSas';
async function sbFetch(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+path,opts);
  if(!r.ok){const e=await r.text();throw new Error(e)}
  const t=await r.text();return t?JSON.parse(t):[];
}

const MAJORS={keiei:'経営学',keizai:'経済学',shakai:'社会学',shinpan:'新闻传播学',fukushi:'社会福祉学'};
const DAYS_CN=['周日','周一','周二','周三','周四','周五','周六'];
let major=null,selectedType=null,selectedSlotId=null;
let slotViewYear=new Date().getFullYear(),slotViewMonth=new Date().getMonth();
let cachedSlots=[],cachedBookings=[];

function typeLabel(t){return t==='daily'?'日常学习面谈':t==='plan'?'计划书相关':'模拟面试'}
function typeTag(t){return t==='daily'?'tag-daily':t==='plan'?'tag-plan':'tag-mock'}
function slotCapacity(tr){const[a,b]=(tr||'').split('–');if(!a||!b)return 4;const[ah,am]=a.split(':').map(Number);const[bh,bm]=b.split(':').map(Number);return Math.max(1,Math.floor(((bh*60+bm)-(ah*60+am))/15))}

async function initMajor(){
  const p=new URLSearchParams(window.location.search);
  major=p.get('major');
  if(major&&MAJORS[major]){
    document.getElementById('headerContent').innerHTML=`
      <div class="header-major">面谈预约</div>
      <div class="header-sub">唯新教育</div>
      <div class="header-locked">📌 ${MAJORS[major]}</div>`;
    try{
      [cachedSlots,cachedBookings]=await Promise.all([
        sbFetch(`/rest/v1/slots?select=*&major=eq.${major}&order=date.asc,time_range.asc`),
        sbFetch(`/rest/v1/bookings?select=*&major=eq.${major}&order=slot_date.asc`)
      ]);
      buildForm();
    }catch(e){document.getElementById('mainWrap').innerHTML=`<div class="no-major-banner"><div class="no-major-title">加载失败</div><div class="no-major-text">${e.message}</div></div>`}
  } else {
    document.getElementById('mainWrap').innerHTML=`
      <div class="no-major-banner">
        <div class="no-major-title">请通过专业链接访问</div>
        <div class="no-major-text">请联系老师获取您所在专业的预约链接</div>
      </div>`;
  }
}

function buildForm(){
  document.getElementById('mainWrap').innerHTML=`
  <div class="success-banner" id="successBanner">
    <div class="success-banner-title">✓ 预约申请已提交</div>
    <div class="success-banner-text">请等待老师确认，可在下方查看预约状态。</div>
  </div>
  <div class="card">
    <div class="card-title"><span class="step-num">1</span>基本信息</div>
    <div class="form-group"><label class="form-label">姓名 <span class="required">*</span></label><input type="text" id="name" placeholder="请输入姓名"></div>
    <div class="form-group"><label class="form-label">出愿期间 <span class="required">*</span></label>
      <div class="radio-group">
        <div class="radio-option"><input type="radio" name="examPeriod" id="ep1" value="夏季出愿"><label for="ep1">夏季出愿</label></div>
        <div class="radio-option"><input type="radio" name="examPeriod" id="ep2" value="冬季出愿"><label for="ep2">冬季出愿</label></div>
        <div class="radio-option"><input type="radio" name="examPeriod" id="ep3" value="次年出愿"><label for="ep3">次年出愿</label></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title"><span class="step-num">2</span>当前学习进程</div>
    <div class="progress-grid">
      <div class="form-group"><label class="form-label">专业知识</label>
        <select id="specialtyStatus" onchange="updateTypeOptions()"><option value="">请选择</option><option>刚开始</option><option>学习中</option><option>完成一期</option></select></div>
      <div class="form-group"><label class="form-label">目标学校</label>
        <select id="targetSchool"><option value="">请选择</option><option>已择校</option><option>择校中</option><option>未择校</option></select></div>
      <div class="form-group"><label class="form-label">联系教授</label>
        <select id="contactProf"><option value="">请选择</option><option>已联系</option><option>写邮件中</option><option>未选定教授</option></select></div>
      <div class="form-group"><label class="form-label">研究计划书 <span class="required">*</span></label>
        <select id="planStatus" onchange="updateTypeOptions()"><option value="">请选择</option><option>已完成</option><option>待修改</option><option>收集先行研究中</option><option>已定好方向</option><option>未开始</option></select></div>
      <div class="form-group"><label class="form-label">出愿进度</label>
        <select id="applicationStatus"><option value="">请选择</option><option>已出愿</option><option>出愿中</option><option>准备材料中</option><option>未开始</option></select></div>
      <div class="form-group"><label class="form-label">笔试准备</label>
        <select id="writtenExam"><option value="">请选择</option><option>已开始</option><option>练习笔试中</option><option>未开始</option></select></div>
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">面试准备 <span class="required">*</span></label>
        <select id="interviewStatus" onchange="updateTypeOptions()"><option value="">请选择</option><option>已完成面试稿</option><option>面试稿撰写中</option><option>模拟面试中</option><option>未开始</option></select></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title"><span class="step-num">3</span>面谈类型 <span style="font-size:10px;color:var(--text-muted);font-weight:400">（点击可筛选时间槽）</span></div>
    <div class="type-grid" id="typeGrid">
      <div class="type-card" id="type-daily" onclick="selectType('daily')"><div class="type-card-name">日常学习面谈</div><div class="type-card-desc">TA老师负责</div></div>
      <div class="type-card locked" id="type-plan" onclick="selectTypeIfUnlocked('plan')"><div class="type-card-name">计划书相关</div><div class="type-card-desc">专业课老师</div><div class="type-card-lock">🔒</div></div>
      <div class="type-card locked" id="type-mock" onclick="selectTypeIfUnlocked('mock')"><div class="type-card-name">模拟面试</div><div class="type-card-desc">按情况安排</div><div class="type-card-lock">🔒</div></div>
    </div>
    <div id="lockNotice" class="locked-notice" style="display:none"></div>
  </div>
  <div class="card">
    <div class="card-title"><span class="step-num">4</span>选择预约时间</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:11px;font-weight:600;letter-spacing:.04em" id="slotMonthLabel"></div>
      <div style="display:flex;gap:4px">
        <button onclick="slotMonthShift(-1)" style="background:none;border:1px solid var(--border);border-radius:2px;width:24px;height:24px;cursor:pointer;font-size:12px;color:var(--text-primary);display:flex;align-items:center;justify-content:center">‹</button>
        <button onclick="slotMonthShift(1)"  style="background:none;border:1px solid var(--border);border-radius:2px;width:24px;height:24px;cursor:pointer;font-size:12px;color:var(--text-primary);display:flex;align-items:center;justify-content:center">›</button>
      </div>
    </div>
    <div class="slot-grid" id="slotGrid"><div class="no-slots">加载中…</div></div>
    <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group" style="margin:0"><label class="form-label">面谈时长</label>
        <div class="radio-group">
          <div class="radio-option"><input type="radio" name="duration" id="d15" value="15" checked><label for="d15">15 min</label></div>
          <div class="radio-option"><input type="radio" name="duration" id="d30" value="30"><label for="d30">30 min</label></div>
        </div>
      </div>
      <div class="form-group" style="margin:0"><label class="form-label">紧急程度</label>
        <div class="radio-group">
          <div class="radio-option"><input type="radio" name="urgency" id="uh" value="high"><label for="uh">紧急</label></div>
          <div class="radio-option"><input type="radio" name="urgency" id="um" value="mid"><label for="um">适中</label></div>
          <div class="radio-option"><input type="radio" name="urgency" id="ul" value="low" checked><label for="ul">一般</label></div>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title"><span class="step-num">5</span>具体需求</div>
    <textarea id="needs" rows="3" placeholder="希望解决的问题，或需要老师重点关注的内容…"></textarea>
  </div>
  <button class="btn btn-primary" onclick="submitBooking()">提交预约申请 →</button>
  <div class="section-sep"><div class="section-sep-line"></div><div class="section-sep-label">本月预约情况</div><div class="section-sep-line"></div></div>
  <div class="refresh-row">
    <div class="refresh-meta" id="refreshMeta"></div>
    <button class="btn btn-outline" style="font-size:11px;padding:5px 10px" onclick="reloadPublicList()">↺ 刷新</button>
  </div>
  <div class="booking-list" id="publicBookingList"><div class="loading">加载中…</div></div>`;

  updateTypeOptions();
  renderSlots();
  renderPublicList();
}

function getPlanStatus(){return document.getElementById('planStatus')?.value||''}
function getInterviewStatus(){return document.getElementById('interviewStatus')?.value||''}
function canSelectPlan(){return getPlanStatus()!==''}
function canSelectMock(){const p=getPlanStatus(),i=getInterviewStatus();return p==='已完成'&&(i==='已完成面试稿'||i==='面试稿撰写中'||i==='模拟面试中')}

function updateTypeOptions(){
  const planOk=canSelectPlan(),mockOk=canSelectMock();
  const planCard=document.getElementById('type-plan'),mockCard=document.getElementById('type-mock');
  if(!planCard)return;
  planCard.classList.toggle('locked',!planOk);planCard.querySelector('.type-card-lock').style.display=planOk?'none':'block';
  mockCard.classList.toggle('locked',!mockOk);mockCard.querySelector('.type-card-lock').style.display=mockOk?'none':'block';
  const notices=[];
  if(!mockOk)notices.push('模拟面试：研究计划书需为「已完成」且面试准备已推进');
  const n=document.getElementById('lockNotice');
  if(notices.length&&(getPlanStatus()||getInterviewStatus())){n.style.display='block';n.innerHTML='🔒 '+notices.join('<br>🔒 ')}else n.style.display='none';
  if(selectedType==='plan'&&!planOk){selectedType=null;document.querySelectorAll('.type-card').forEach(c=>c.classList.remove('selected'))}
  if(selectedType==='mock'&&!mockOk){selectedType=null;document.querySelectorAll('.type-card').forEach(c=>c.classList.remove('selected'))}
  renderSlots();
}
function selectType(type){selectedType=(selectedType===type)?null:type;document.querySelectorAll('.type-card').forEach(c=>c.classList.remove('selected'));if(selectedType)document.getElementById('type-'+selectedType)?.classList.add('selected');renderSlots()}
function selectTypeIfUnlocked(type){if(type==='plan'&&!canSelectPlan())return;if(type==='mock'&&!canSelectMock())return;selectType(type)}
function slotMonthShift(d){slotViewMonth+=d;if(slotViewMonth>11){slotViewMonth=0;slotViewYear++}if(slotViewMonth<0){slotViewMonth=11;slotViewYear--}renderSlots()}

function renderSlots(){
  const lbl=document.getElementById('slotMonthLabel'),grid=document.getElementById('slotGrid');
  if(!lbl||!grid)return;
  lbl.textContent=`${slotViewYear}年${slotViewMonth+1}月`;
  const ym=`${slotViewYear}-${String(slotViewMonth+1).padStart(2,'0')}`;
  let allSlots=cachedSlots.filter(s=>s.date.startsWith(ym));
  allSlots.sort((a,b)=>a.date.localeCompare(b.date)||a.time_range.localeCompare(b.time_range));
  const slotBookedCount={};
  cachedBookings.filter(b=>b.status!=='cancelled').forEach(b=>{slotBookedCount[b.slot_id]=(slotBookedCount[b.slot_id]||0)+1});
  if(!allSlots.length){grid.innerHTML='<div class="no-slots">本月暂无可预约时间槽<br><span style="font-size:10px">请联系老师确认排期</span></div>';return}
  const visible=selectedType?allSlots.filter(s=>s.type===selectedType):allSlots;
  const dimmed =selectedType?allSlots.filter(s=>s.type!==selectedType):[];
  const renderSlot=(s,isDimmed)=>{
    const d=new Date(s.date),dow=DAYS_CN[d.getDay()];
    const dc=d.getDay()===6?'var(--sat)':d.getDay()===0?'var(--sun)':'var(--text-secondary)';
    const cap=slotCapacity(s.time_range),booked=slotBookedCount[s.id]||0,remaining=cap-booked,full=remaining<=0;
    const disabled=full||isDimmed;
    const remainLabel=full?'<div class="slot-remain" style="color:var(--danger)">已满</div>':`<div class="slot-remain" style="color:var(--success)">剩余 ${remaining} 名额</div>`;
    return `<div class="slot-option${disabled?' taken':''}">
      <input type="radio" name="slotPick" id="slot-${s.id}" value="${s.id}" ${disabled?'disabled':''} onchange="selectedSlotId='${s.id}'">
      <label for="slot-${s.id}">
        <div style="display:flex;align-items:center;gap:4px">
          <span class="slot-date-r">${s.date.slice(5).replace('-','/')}</span>
          <span class="slot-dow-r" style="color:${dc}">${dow}</span>
          <span class="tag ${typeTag(s.type)}" style="margin-left:auto;font-size:9px">${s.type==='daily'?'日常':s.type==='plan'?'计划书':'模拟'}</span>
        </div>
        <div class="slot-time-r">${s.time_range}</div>
        ${isDimmed?'':remainLabel}
      </label>
    </div>`;
  };
  selectedSlotId=null;
  grid.innerHTML=[...visible.map(s=>renderSlot(s,false)),...dimmed.map(s=>renderSlot(s,true))].join('');
}

async function submitBooking(){
  const name=document.getElementById('name').value.trim();
  const examPeriod=document.querySelector('input[name=examPeriod]:checked')?.value;
  const planStatus=getPlanStatus(),interviewStatus=getInterviewStatus();
  const duration=document.querySelector('input[name=duration]:checked')?.value;
  const urgency=document.querySelector('input[name=urgency]:checked')?.value;
  const needs=document.getElementById('needs').value.trim();
  if(!name){alert('请填写姓名');return}
  if(!examPeriod){alert('请选择出愿期间');return}
  if(!planStatus){alert('请选择研究计划书状态');return}
  if(!selectedSlotId){alert('请选择预约时间');return}
  const slot=cachedSlots.find(s=>s.id===selectedSlotId);
  if(!slot){alert('时间槽不存在，请刷新后重试');return}
  if(slot.type==='plan'&&!canSelectPlan()){alert('当前进程不符合计划书相关面谈的条件');return}
  if(slot.type==='mock'&&!canSelectMock()){alert('当前进程不符合模拟面试的条件');return}
  const cap=slotCapacity(slot.time_range);
  const booked=cachedBookings.filter(b=>b.slot_id===selectedSlotId&&b.status!=='cancelled').length;
  if(booked>=cap){alert('该时间段名额已满，请选择其他时间');renderSlots();return}
  const booking={
    id:Date.now().toString(),name,major,exam_period:examPeriod,
    specialty_status:document.getElementById('specialtyStatus').value,
    target_school:document.getElementById('targetSchool').value,
    contact_prof:document.getElementById('contactProf').value,
    plan_status:planStatus,application_status:document.getElementById('applicationStatus').value,
    written_exam:document.getElementById('writtenExam').value,
    interview_status:interviewStatus,type:slot.type,slot_id:selectedSlotId,
    slot_date:slot.date,slot_time_range:slot.time_range,
    duration:parseInt(duration),urgency,needs,status:'pending',actual_time:'',note:null,daily_record:null
  };
  try{
    const res=await sbFetch('/rest/v1/bookings','POST',booking);
    cachedBookings.push(Array.isArray(res)?res[0]:booking);
    document.getElementById('successBanner').classList.add('show');
    window.scrollTo({top:0,behavior:'smooth'});
    renderSlots();renderPublicList();
  }catch(e){alert('提交失败：'+e.message)}
}

function urgencySpan(u){return u==='high'?'<span class="urgency-high">紧急</span>':u==='mid'?'<span class="urgency-mid">适中</span>':'<span class="urgency-low">一般</span>'}

async function reloadPublicList(){
  try{
    cachedBookings=await sbFetch(`/rest/v1/bookings?select=*&major=eq.${major}&order=slot_date.asc`);
    renderSlots();renderPublicList();
  }catch(e){console.error(e)}
}

function renderPublicList(){
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const bookings=cachedBookings.filter(b=>b.slot_date&&b.slot_date.startsWith(ym));
  bookings.sort((a,b)=>(a.slot_date+a.slot_time_range).localeCompare(b.slot_date+b.slot_time_range));
  const meta=document.getElementById('refreshMeta');
  if(meta)meta.textContent=`共 ${bookings.length} 条 · ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 更新`;
  const list=document.getElementById('publicBookingList');
  if(!list)return;
  if(!bookings.length){list.innerHTML='<div class="no-slots">暂无预约记录</div>';return}
  list.innerHTML=bookings.map(b=>{
    const confirmedTime=b.status==='confirmed'&&b.actual_time
      ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border-light);font-size:11px;color:var(--success)">✓ 确认面谈时间：${b.actual_time.replace('T',' ')}</div>`
      : b.status==='confirmed'
      ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border-light);font-size:11px;color:var(--text-muted)">⏳ 老师将尽快确认具体时间</div>`
      : '';
    return `<div class="booking-row">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div>
          <span class="booking-row-name">${b.name}</span>
          <div class="booking-row-meta">${b.slot_date.slice(5).replace('-','/')} ${b.slot_time_range||''} · ${b.duration}min · ${urgencySpan(b.urgency)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:5px">
          <span class="tag ${typeTag(b.type)}">${typeLabel(b.type)}</span>
          <span class="status-badge status-${b.status}">${b.status==='pending'?'待确认':b.status==='confirmed'?'已确认':'已取消'}</span>
        </div>
      </div>
      ${b.needs?`<div class="booking-row-needs">💬 ${b.needs}</div>`:''}
      ${confirmedTime}
    </div>`;
  }).join('');
}

initMajor();
</script>
