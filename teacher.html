<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>唯新教育 · 课程排班</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf7f2;--surface:#fff;--border:#e8e0d4;--border-light:#f0ebe2;
  --text:#3a2e24;--text-2:#6b5c4e;--text-3:#a8998a;
  --accent:#3a2e24;--ok:#2a9e6a;--ok-bg:#e4f5ee;
  --warn:#b87820;--warn-bg:#fdf2dc;
}
body{font-family:'DM Mono','Noto Serif SC',monospace;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 28px}
.header h1{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600}
.header-sub{font-size:11px;color:var(--text-3);margin-top:3px;letter-spacing:.05em}
.main{max-width:680px;margin:0 auto;padding:28px 20px}
.section-title{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600;margin-bottom:16px}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px 16px;margin-bottom:20px;font-size:12px;color:var(--text-2);line-height:1.8}
.course-block{margin-bottom:24px}
.course-head{padding:8px 14px;border-radius:3px 3px 0 0;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.slot-row{background:var(--surface);border:1px solid var(--border);border-top:none;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.slot-row:last-child{border-radius:0 0 3px 3px}
.slot-date{font-size:14px;font-weight:600}
.slot-dow{font-size:11px;font-weight:500;margin-left:5px}
.slot-time{font-size:11px;color:var(--text-3);margin-top:2px}
.slot-title{font-size:11px;color:var(--text-2);margin-top:2px}
.toggle-btn{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.toggle-btn button{padding:6px 16px;background:transparent;border:none;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-2);cursor:pointer;transition:all .15s;border-right:1px solid var(--border)}
.toggle-btn button:last-child{border-right:none}
.toggle-btn button.yes.active{background:#2a9e6a;color:#fff;border-color:#2a9e6a}
.toggle-btn button.no.active{background:#b03030;color:#fff;border-color:#b03030}
.toggle-btn button:hover:not(.active){background:var(--bg)}
.submit-area{margin-top:28px;text-align:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 28px;border-radius:3px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:'DM Mono',monospace;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#5a4a3c}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.notice{background:var(--warn-bg);border:1px solid var(--warn);border-radius:3px;padding:12px 16px;font-size:11px;color:var(--warn);line-height:1.7;margin-top:16px}
.done-box{text-align:center;padding:48px 20px}
.done-icon{font-size:40px;margin-bottom:12px}
.done-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;margin-bottom:8px}
.done-sub{font-size:12px;color:var(--text-2);line-height:1.8}
.empty{text-align:center;padding:48px;color:var(--text-3);font-size:12px}
.loading{text-align:center;padding:48px;color:var(--text-3);font-size:12px}
</style>
</head>
<body>
<div class="header">
  <h1>唯新教育 · 课程排班</h1>
  <div class="header-sub" id="headerSub">Transform Education · Teacher Availability</div>
</div>
<div class="main" id="mainContent">
  <div class="loading">加载中…</div>
</div>

<script>
const SB_URL='https://vwntezfvqbrkeovnseku.supabase.co';
const SB_KEY='sb_publishable_cUnCkti5qv1_G4N6Ho5tpw_9pr7pSas';
async function sb(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+path,opts);
  if(!r.ok){const e=await r.text();throw new Error(e)}
  const t=await r.text();return t?JSON.parse(t):[];
}

const params=new URLSearchParams(location.search);
const teacherName=decodeURIComponent(params.get('teacher')||'');
const DAYS=['周日','周一','周二','周三','周四','周五','周六'];
const DOW_COLOR={6:'#1a4a8a',0:'#8a1a2c'};

// availability state: {slotId: true/false/null}
const availability={};
let slots=[], existingAvail=[], submitted=false;

function courseColor(name){
  const n=name||'';
  if(/宏观/.test(n)) return {bg:'#ddeaf8',text:'#1a3a6a'};
  if(/微观/.test(n)) return {bg:'#ddf0e0',text:'#1a4a28'};
  if(/数学/.test(n)) return {bg:'#e8e4f8',text:'#3a2a7a'};
  if(/习题/.test(n)) return {bg:'#faecd8',text:'#5a3010'};
  if(/计量|方法论/.test(n)) return {bg:'#d8f0ea',text:'#0a4038'};
  if(/共通/.test(n)) return {bg:'#ece8e0',text:'#3a3830'};
  if(/过去问|备考/.test(n)) return {bg:'#f8e4dc',text:'#6a2818'};
  return {bg:'#ece8e0',text:'#3a3830'};
}

async function init(){
  const mc=document.getElementById('mainContent');
  if(!teacherName){
    mc.innerHTML='<div class="empty">无效链接，请联系学科负责人获取正确链接</div>';
    return;
  }
  document.getElementById('headerSub').textContent=`${teacherName} 老师 · 课程排班`;
  try{
    // fetch slots for this teacher
    slots=await sb(`/rest/v1/schedule_slots?teacher_names=cs.{"${teacherName}"}&select=*&order=session_date.asc`);
    existingAvail=await sb(`/rest/v1/teacher_availability?teacher_name=eq.${encodeURIComponent(teacherName)}&select=*`);
    // check if already submitted
    if(existingAvail.length&&existingAvail.length>=slots.length&&slots.length>0){
      submitted=true;
      renderDone();return;
    }
    // init availability from existing
    existingAvail.forEach(a=>{availability[a.slot_id]=a.available});
    render();
  }catch(e){mc.innerHTML=`<div class="empty">加载失败：${e.message}</div>`}
}

function render(){
  const mc=document.getElementById('mainContent');
  if(!slots.length){
    mc.innerHTML=`<div class="empty">暂无排班时间槽<br><span style="font-size:11px;color:var(--text-3);margin-top:6px;display:block">请等待学科负责人创建课次安排</span></div>`;
    return;
  }
  // group by course
  const byCourse={};
  slots.forEach(s=>{
    if(!byCourse[s.course_name]) byCourse[s.course_name]=[];
    byCourse[s.course_name].push(s);
  });

  mc.innerHTML=`
  <div class="info-box">
    您好，<strong>${teacherName}</strong> 老师！<br>
    以下是本期课程的所有课次安排，请为每节课选择您是否可以上课。<br>
    选完后点击「提交回复」即可。最终排课结果由学科负责人确认后会另行通知。
  </div>
  <div id="slotsContainer">
    ${Object.entries(byCourse).map(([courseName,courseSlots])=>{
      const color=courseColor(courseName);
      return `<div class="course-block">
        <div class="course-head" style="background:${color.bg};color:${color.text}">
          <span>${courseName}</span>
          <span style="font-size:10px;opacity:.7">${courseSlots.length}课次</span>
        </div>
        ${courseSlots.map(s=>{
          const d=new Date(s.session_date+'T12:00:00');
          const dow=DAYS[d.getDay()];
          const dowColor=DOW_COLOR[d.getDay()]||'var(--text-2)';
          const avail=availability[s.id];
          return `<div class="slot-row">
            <div>
              <div><span class="slot-date">${(d.getMonth()+1)}/${d.getDate()}</span><span class="slot-dow" style="color:${dowColor}">${dow}</span></div>
              <div class="slot-time">${s.time_range||''}</div>
              ${s.session_title?`<div class="slot-title">${s.session_number}回 · ${s.session_title}</div>`:`<div class="slot-time">第${s.session_number}回</div>`}
            </div>
            <div class="toggle-btn">
              <button class="yes${avail===true?' active':''}" onclick="setAvail('${s.id}',true,this)">✓ 可以上</button>
              <button class="no${avail===false?' active':''}" onclick="setAvail('${s.id}',false,this)">✕ 不可以</button>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div>
  <div class="submit-area">
    <button class="btn btn-primary" id="submitBtn" onclick="submitAvailability()">提交回复</button>
    <div class="notice" style="max-width:420px;margin:16px auto 0">
      ⚠ 提交后可联系学科负责人修改。最终安排确认后，若需要调整时间，学科负责人会另行联系您。
    </div>
  </div>`;
}

function setAvail(slotId,val,btn){
  availability[slotId]=val;
  const row=btn.closest('.toggle-btn');
  row.querySelector('.yes').classList.toggle('active',val===true);
  row.querySelector('.no').classList.toggle('active',val===false);
}

async function submitAvailability(){
  const btn=document.getElementById('submitBtn');
  const unanswered=slots.filter(s=>availability[s.id]===undefined||availability[s.id]===null);
  if(unanswered.length){
    if(!confirm(`还有 ${unanswered.length} 个课次未选择，确定提交吗？`))return;
  }
  btn.textContent='提交中…';btn.disabled=true;
  try{
    // delete existing avail for this teacher
    if(existingAvail.length){
      await sb(`/rest/v1/teacher_availability?teacher_name=eq.${encodeURIComponent(teacherName)}`,'DELETE');
    }
    const records=slots.map(s=>({
      id:`av-${Date.now()}-${Math.random().toString(36).slice(2,5)}`,
      slot_id:s.id,
      teacher_name:teacherName,
      available:availability[s.id]??false,
    }));
    await sb('/rest/v1/teacher_availability','POST',records);
    renderDone();
  }catch(e){alert('提交失败：'+e.message);btn.textContent='提交回复';btn.disabled=false}
}

function renderDone(){
  const avail=Object.values(availability).filter(v=>v===true).length;
  document.getElementById('mainContent').innerHTML=`
  <div class="done-box">
    <div class="done-icon">✅</div>
    <div class="done-title">回复已提交</div>
    <div class="done-sub">
      谢谢 ${teacherName} 老师！<br>
      您共回复了 ${slots.length} 个课次，其中 <strong>${avail}</strong> 个可以上课。<br><br>
      最终排课结果确认后，学科负责人会另行通知您。<br>
      如需修改，请联系学科负责人。
    </div>
  </div>`;
}

init();
</script>
</body>
</html>
