<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>唯新教育 · 课程排班</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf7f2;--surface:#fff;--border:#e8e0d4;--border-light:#f0ebe2;
  --text:#3a2e24;--text-2:#6b5c4e;--text-3:#a8998a;
  --accent:#3a2e24;--ok:#2a9e6a;--ok-bg:#e4f5ee;
}
body{font-family:'DM Mono','Noto Serif SC',monospace;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 24px}
.header-title{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:600}
.header-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.main{max-width:660px;margin:0 auto;padding:24px 16px 100px}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px 18px;margin-bottom:16px;font-size:12px;color:var(--text-2);line-height:1.9}
.task-box{background:var(--ok-bg);border:1px solid var(--ok);border-radius:4px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:#1a5a3a;line-height:1.8}
.course-head{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);color:var(--text)}

/* Date card */
.date-card{background:var(--surface);border:2px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.date-card.selected{border-color:var(--ok)}
.date-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:12px;cursor:pointer;user-select:none}
.date-head:hover{background:var(--bg)}
.date-left{flex:1}
.date-num{font-size:20px;font-weight:700;font-family:'DM Mono',monospace}
.date-dow{font-size:11px;font-weight:600;margin-left:6px}
.date-meta{font-size:11px;color:var(--text-3);margin-top:2px}
.check-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--border);transition:all .15s;flex-shrink:0;background:var(--bg)}
.check-circle.checked{background:var(--ok);border-color:var(--ok);color:#fff}
.date-body{padding:0 16px 12px;border-top:1px solid var(--border-light)}
.sub-label{font-size:10px;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;margin:10px 0 5px}
.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:5px 12px;border:1px solid var(--border);border-radius:2px;font-size:11px;cursor:pointer;background:var(--bg);transition:all .15s;font-family:'DM Mono',monospace}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.ok-active{background:var(--ok);color:#fff;border-color:var(--ok)}

/* Submit bar */
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:10}
.hint{font-size:12px;color:var(--text-2)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 28px;border-radius:3px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'DM Mono',monospace;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#5a4a3c}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-2)}.btn-outline:hover{background:var(--bg)}

.done-box{text-align:center;padding:56px 20px}
.done-icon{font-size:44px;margin-bottom:14px}
.done-title{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:600;margin-bottom:10px}
.done-sub{font-size:12px;color:var(--text-2);line-height:2;max-width:380px;margin:0 auto}
.empty{text-align:center;padding:56px;color:var(--text-3);font-size:12px;line-height:2}
.loading{text-align:center;padding:56px;color:var(--text-3)}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">唯新教育 · 课程排班</div>
  <div class="header-sub" id="headerSub">Transform Education</div>
</div>
<div class="main" id="mainContent"><div class="loading">加载中…</div></div>
<div class="submit-bar" id="submitBar" style="display:none">
  <div class="hint" id="submitHint"></div>
  <button class="btn btn-primary" id="submitBtn" onclick="submitAvailability()">提交回复</button>
</div>

<script>
const SB_URL='https://vwntezfvqbrkeovnseku.supabase.co';
const SB_KEY='sb_publishable_cUnCkti5qv1_G4N6Ho5tpw_9pr7pSas';
async function sb(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+path,opts);
  if(!r.ok){const e=await r.text();throw new Error(e)}
  const t=await r.text();return t?JSON.parse(t):[];
}

const params=new URLSearchParams(location.search);
const teacherName=decodeURIComponent(params.get('teacher')||'');
const DAYS=['周日','周一','周二','周三','周四','周五','周六'];
const DOW_COLOR={6:'#1a4a8a',0:'#8a1a2c'};

let slots=[], existingAvail=[];
// state per slot: {available: bool (default FALSE), time: '', titles: Set}
const state={};

function getState(slotId){
  if(!state[slotId]) state[slotId]={available:false, time:'', titles:new Set()};
  return state[slotId];
}

function courseColorText(name){
  if(/宏观|微观|经济/.test(name)) return '#1a3a6a';
  if(/共通/.test(name)) return '#3a3830';
  if(/社会人文|社会学/.test(name)) return '#1a4a28';
  if(/新闻|传播/.test(name)) return '#3a2a7a';
  if(/福祉/.test(name)) return '#5a3010';
  return '#3a2e24';
}

async function init(){
  const mc=document.getElementById('mainContent');
  if(!teacherName){
    mc.innerHTML='<div class="empty">无效链接<br><span style="font-size:11px">请联系学科负责人获取正确链接</span></div>';
    return;
  }
  document.getElementById('headerSub').textContent=`${teacherName} 老师 · 课程排班`;
  try{
    slots=await sb(`/rest/v1/schedule_slots?teacher_names=cs.{"${teacherName}"}&select=*&order=session_date.asc`);
    existingAvail=await sb(`/rest/v1/teacher_availability?teacher_name=eq.${encodeURIComponent(teacherName)}&select=*`);
    // restore existing replies
    existingAvail.forEach(a=>{
      const s=getState(a.slot_id);
      s.available=a.available;
      s.time=a.available_time||'';
      (a.preferred_titles||[]).forEach(t=>s.titles.add(t));
    });
    if(!slots.length){
      mc.innerHTML='<div class="empty">暂无排班课次<br><span style="font-size:11px">请等待学科负责人创建课次后再访问</span></div>';
      return;
    }
    render();
    document.getElementById('submitBar').style.display='flex';
    updateHint();
  }catch(e){mc.innerHTML=`<div class="empty">加载失败：${e.message}</div>`}
}

function render(){
  const allTitles=[...new Set(slots.flatMap(s=>s.session_titles||[]))];
  const byCourse={};
  slots.forEach(s=>{if(!byCourse[s.course_name])byCourse[s.course_name]=[];byCourse[s.course_name].push(s)});

  document.getElementById('mainContent').innerHTML=`
  <div class="info-box">
    您好，<strong>${teacherName}</strong> 老师！<br>
    请点击您<strong>可以上课的日期</strong>（打勾），不点的日期视为不可以。<br>
    如某天只想上特定内容，可在该课次下方点选内容，不选则默认都可以。
  </div>
  ${allTitles.length?`<div class="task-box">
    本期您负责的课程内容：
    ${allTitles.map(t=>`<span style="background:rgba(255,255,255,.6);border-radius:2px;padding:1px 8px;margin-right:4px">${t}</span>`).join('')}
  </div>`:''}
  ${Object.entries(byCourse).map(([courseName,courseSlots])=>`
    <div style="margin-bottom:24px">
      <div class="course-head" style="color:${courseColorText(courseName)}">${courseName} <span style="font-size:11px;font-weight:400;color:var(--text-3)">${courseSlots.length}课次</span></div>
      ${courseSlots.map(s=>renderCard(s)).join('')}
    </div>`).join('')}`;
}

function renderCard(s){
  const st=getState(s.id);
  const d=new Date(s.session_date+'T12:00:00');
  const dow=DAYS[d.getDay()];
  const dowColor=DOW_COLOR[d.getDay()]||'var(--text-2)';
  const hasTwo=!!(s.time_range&&s.time_range_2);
  const titles=s.session_titles||[];

  return `<div class="date-card${st.available?' selected':''}" id="card-${s.id}">
    <div class="date-head" onclick="toggleAvail('${s.id}')">
      <div class="date-left">
        <div><span class="date-num">${d.getMonth()+1}/${d.getDate()}</span><span class="date-dow" style="color:${dowColor}">${dow}</span></div>
        <div class="date-meta">${s.time_range||''}${hasTwo?` / ${s.time_range_2}`:''} · 第${s.session_number}回</div>
      </div>
      <div class="check-circle${st.available?' checked':''}">✓</div>
    </div>
    ${st.available&&(hasTwo||titles.length)?`
    <div class="date-body">
      ${hasTwo?`<div class="sub-label">时间偏好（可不选）</div>
      <div class="chip-row">
        <div class="chip${st.time===s.time_range?' active':''}" onclick="event.stopPropagation();setTime('${s.id}','${s.time_range}')">${s.time_range}</div>
        <div class="chip${st.time===s.time_range_2?' active':''}" onclick="event.stopPropagation();setTime('${s.id}','${s.time_range_2}')">${s.time_range_2}</div>
        <div class="chip ok-active${st.time==='both'?' active':''}" onclick="event.stopPropagation();setTime('${s.id}','both')">两个都行</div>
      </div>`:''}
      ${titles.length?`<div class="sub-label">内容偏好（不选=都可以）</div>
      <div class="chip-row">
        ${titles.map(t=>`<div class="chip${st.titles.has(t)?' active':''}" onclick="event.stopPropagation();toggleTitle('${s.id}','${t.replace(/'/g,"\\'")}')">${t}</div>`).join('')}
      </div>`:''}
    </div>`:''}
  </div>`;
}

function toggleAvail(slotId){
  const st=getState(slotId);
  st.available=!st.available;
  if(!st.available){st.time='';st.titles.clear()}
  rerenderCard(slotId);
  updateHint();
}
function setTime(slotId,val){
  const st=getState(slotId);
  st.time=st.time===val?'':val;
  rerenderCard(slotId);
}
function toggleTitle(slotId,title){
  const st=getState(slotId);
  st.titles.has(title)?st.titles.delete(title):st.titles.add(title);
  rerenderCard(slotId);
}
function rerenderCard(slotId){
  const s=slots.find(x=>x.id===slotId);
  if(!s) return;
  const el=document.getElementById(`card-${slotId}`);
  if(el) el.outerHTML=renderCard(s);
}
function updateHint(){
  const avail=slots.filter(s=>getState(s.id).available).length;
  document.getElementById('submitHint').textContent=`已选 ${avail} / ${slots.length} 个课次`;
}

async function submitAvailability(){
  const btn=document.getElementById('submitBtn');
  const avail=slots.filter(s=>getState(s.id).available).length;
  if(!avail&&!confirm('您还没有选择任何可以上课的日期，确定提交吗？'))return;
  btn.textContent='提交中…';btn.disabled=true;
  try{
    // always delete existing and resubmit (supports re-edit)
    await sb(`/rest/v1/teacher_availability?teacher_name=eq.${encodeURIComponent(teacherName)}`,'DELETE').catch(()=>{});
    const records=slots.map(s=>{
      const st=getState(s.id);
      const timeStr=st.time==='both'?`${s.time_range} / ${s.time_range_2}`:st.time||'';
      return {
        id:`av-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
        slot_id:s.id,teacher_name:teacherName,
        available:st.available,
        available_time:st.available&&timeStr?timeStr:null,
        preferred_titles:st.available&&st.titles.size?[...st.titles]:null,
      };
    });
    await sb('/rest/v1/teacher_availability','POST',records);
    existingAvail=records;
    renderDone(avail);
  }catch(e){alert('提交失败：'+e.message);btn.textContent='提交回复';btn.disabled=false}
}

function renderDone(availCount){
  document.getElementById('submitBar').innerHTML=`
    <div class="hint">已提交 · ${availCount} 个课次可以上</div>
    <button class="btn btn-outline" onclick="reEdit()">✎ 修改回复</button>`;
  document.getElementById('mainContent').innerHTML=`
  <div class="done-box">
    <div class="done-icon">✅</div>
    <div class="done-title">回复已提交！</div>
    <div class="done-sub">
      谢谢 ${teacherName} 老师！<br>
      共 ${slots.length} 个课次，您选择了 <strong>${availCount}</strong> 个可以上课。<br><br>
      最终排课结果确认后，学科负责人会另行通知您。<br>
      如需修改请点下方「修改回复」。
    </div>
  </div>`;
}

function reEdit(){
  document.getElementById('submitBar').innerHTML=`
    <div class="hint" id="submitHint"></div>
    <button class="btn btn-primary" id="submitBtn" onclick="submitAvailability()">提交回复</button>`;
  render();
  updateHint();
}

init();
</script>
</body>
</html>
