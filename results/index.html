<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合格実绩 · 唯新教育</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f5f0;--surface:#fff;--border:#e2ded6;--border-light:#ede9e2;
  --text-primary:#1a1814;--text-secondary:#5a5650;--text-muted:#9a9590;--accent:#2c4a8a;
  --grad-c:#2c4a8a;--grad-bg:#e8edf8;
  --ug-c:#3a6630;--ug-bg:#e8f0e4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text-primary);font-size:13px;line-height:1.55}

/* ── Hero header ── */
header{
  background:var(--surface);border-bottom:2px solid var(--text-primary);
  padding:3rem 3rem 2.2rem;text-align:center;
}
.h-title{font-family:'Noto Serif SC',serif;font-size:2.2rem;font-weight:600;letter-spacing:.04em;color:var(--text-primary)}
.h-sub{font-size:11px;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-top:8px}

/* ── Big summary stats ── */
.summary-bar{
  display:flex;justify-content:center;gap:3rem;padding:1.6rem 3rem;
  background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.sb-item{text-align:center}
.sb-num{font-family:'Noto Serif SC',serif;font-size:2.6rem;font-weight:300;color:var(--accent);line-height:1}
.sb-lbl{font-size:10px;color:var(--text-muted);letter-spacing:.08em;margin-top:6px;text-transform:uppercase}
.sb-divider{width:1px;background:var(--border);align-self:stretch}

/* ── Nav cards (大学院 / 学部 entry points) ── */
.nav-section{padding:2.5rem 3rem 1.5rem;max-width:1100px;margin:0 auto}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
.nav-card{
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:1.8rem 2rem;text-decoration:none;color:inherit;transition:all .18s;
  position:relative;overflow:hidden;display:block;
}
.nav-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.08);border-color:var(--text-muted);transform:translateY(-2px)}
.nav-card.grad{border-top:3px solid var(--grad-c)}
.nav-card.ug{border-top:3px solid var(--ug-c)}
.nc-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.nc-title{font-family:'Noto Serif SC',serif;font-size:1.4rem;font-weight:600;margin-bottom:10px}
.nc-stats{display:flex;gap:1.5rem;margin-top:14px}
.nc-stat-num{font-family:'Noto Serif SC',serif;font-size:1.5rem;font-weight:300}
.nav-card.grad .nc-stat-num{color:var(--grad-c)}
.nav-card.ug .nc-stat-num{color:var(--ug-c)}
.nc-stat-lbl{font-size:9px;color:var(--text-muted);letter-spacing:.04em;margin-top:2px}
.nc-arrow{position:absolute;right:1.8rem;top:50%;transform:translateY(-50%);font-size:1.6rem;color:var(--border);transition:all .18s}
.nav-card:hover .nc-arrow{color:var(--text-muted);transform:translateY(-50%) translateX(4px)}
.nc-tracks{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.nc-track-pill{font-size:9px;padding:2px 8px;border-radius:2px;background:var(--bg);color:var(--text-muted);border:1px solid var(--border-light)}
.nc-track-pill.has-data{background:var(--bg);color:var(--text-secondary);border-color:var(--border)}

/* ── Filter bar (for combined view below) ── */
.filter-bar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 3rem;position:sticky;top:0;z-index:200;margin-top:1rem;
}
.filter-row{display:flex;align-items:center;gap:14px;padding:9px 0;flex-wrap:wrap}
.flbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;min-width:50px}
.seg{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.seg button{padding:4px 12px;background:none;border:none;border-right:1px solid var(--border);font-family:inherit;font-size:11px;color:var(--text-secondary);cursor:pointer;transition:background .12s,color .12s;white-space:nowrap}
.seg button:last-child{border-right:none}
.seg button.active{background:var(--text-primary);color:var(--bg)}
.seg button:hover:not(.active){background:var(--bg)}

/* ── Main content ── */
main{padding:1.5rem 3rem 4rem;max-width:1200px;margin:0 auto}
.section-title{
  font-family:'Noto Serif SC',serif;font-size:1.1rem;font-weight:600;
  margin-bottom:1rem;display:flex;align-items:center;gap:10px;
}
.section-title .count{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;font-weight:400}

/* ── University combined grid ── */
.univ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:2.5rem}
.ucard{
  background:var(--surface);border:1px solid var(--border);border-radius:5px;
  padding:14px 16px;transition:box-shadow .15s,border-color .15s;
}
.ucard:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);border-color:var(--text-muted)}
.uc-name{font-family:'Noto Serif SC',serif;font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4}
.uc-total{font-size:1.6rem;font-family:'Noto Serif SC',serif;font-weight:300;color:var(--accent);line-height:1}
.uc-total-lbl{font-size:9px;color:var(--text-muted);margin-bottom:8px;letter-spacing:.04em}
.uc-breakdown{display:flex;gap:6px;flex-wrap:wrap}
.uc-pill{
  font-size:9.5px;padding:2px 8px;border-radius:2px;font-weight:500;
  display:inline-flex;align-items:center;gap:4px;text-decoration:none;cursor:default;
}
.uc-pill.grad{background:var(--grad-bg);color:var(--grad-c)}
.uc-pill.ug{background:var(--ug-bg);color:var(--ug-c)}

/* ── Bar chart sections ── */
.bar-section{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:1.4rem 1.6rem;margin-bottom:1.5rem}
.bar-section-title{font-size:11px;letter-spacing:.06em;color:var(--text-muted);text-transform:uppercase;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:11px}
.bar-label{width:160px;flex-shrink:0;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:15px;background:var(--border-light);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.bar-val{width:30px;flex-shrink:0;text-align:right;color:var(--text-muted)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}

.loading{padding:4rem;text-align:center;color:var(--text-muted);font-size:12px}

@media(max-width:780px){
  header,main,.nav-section{padding-left:1.2rem;padding-right:1.2rem}
  .filter-bar{padding-left:1.2rem;padding-right:1.2rem}
  .nav-grid,.two-col{grid-template-columns:1fr}
  .summary-bar{gap:1.5rem}
}
</style>
</head>
<body>

<header>
  <div class="h-title">合格実绩</div>
  <div class="h-sub">唯新教育 · 総合実績ハブ</div>
</header>

<div class="summary-bar" id="summary-bar">
  <div class="sb-item"><div class="sb-num" id="sb-total">—</div><div class="sb-lbl">合格総数</div></div>
  <div class="sb-divider"></div>
  <div class="sb-item"><div class="sb-num" id="sb-univs">—</div><div class="sb-lbl">合格大学数</div></div>
  <div class="sb-divider"></div>
  <div class="sb-item"><div class="sb-num" id="sb-grad">—</div><div class="sb-lbl">大学院実績</div></div>
  <div class="sb-divider"></div>
  <div class="sb-item"><div class="sb-num" id="sb-ug">—</div><div class="sb-lbl">学部実績</div></div>
</div>

<div class="nav-section">
  <div class="nav-grid">
    <a href="grad.html" class="nav-card grad">
      <div class="nc-label">Graduate School</div>
      <div class="nc-title">大学院</div>
      <div class="nc-tracks" id="grad-tracks"></div>
      <div class="nc-stats">
        <div><div class="nc-stat-num" id="grad-total">—</div><div class="nc-stat-lbl">合格件数</div></div>
        <div><div class="nc-stat-num" id="grad-univs">—</div><div class="nc-stat-lbl">合格大学数</div></div>
      </div>
      <div class="nc-arrow">→</div>
    </a>
    <a href="undergrad.html" class="nav-card ug">
      <div class="nc-label">Undergraduate</div>
      <div class="nc-title">学部</div>
      <div class="nc-tracks" id="ug-tracks"></div>
      <div class="nc-stats">
        <div><div class="nc-stat-num" id="ug-total">—</div><div class="nc-stat-lbl">合格件数</div></div>
        <div><div class="nc-stat-num" id="ug-univs">—</div><div class="nc-stat-lbl">合格大学数</div></div>
      </div>
      <div class="nc-arrow">→</div>
    </a>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-row">
    <span class="flbl">表示</span>
    <div class="seg" id="scope-seg">
      <button class="active" onclick="setScope('all')">全部（学部＋院）</button>
      <button onclick="setScope('grad')">大学院のみ</button>
      <button onclick="setScope('ug')">学部のみ</button>
    </div>
    <span class="flbl" style="margin-left:6px">年份</span>
    <div class="seg" id="era-seg">
      <button class="active" onclick="setEra('all')">全部</button>
      <button onclick="setEra('new')">2025–2026</button>
      <button onclick="setEra('hist')">2022–2024</button>
    </div>
  </div>
</div>

<main id="main">
  <div class="loading">読み込み中...</div>
</main>

<script>
// ─── Supabase ─────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://vwntezfvqbrkeovnseku.supabase.co';
const SUPABASE_KEY = 'sb_publishable_cUnCkti5qv1_G4N6Ho5tpw_9pr7pSas';

async function sbGet(table) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&order=created_at.desc`, {
    headers: {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ─── Univ name normalization (combined dict, both grad+ug variants) ─────────
const UNIV_NORM = {
  '早稻田大学':'早稲田大学','庆应义塾大学':'慶應義塾大学','慶応義塾大学':'慶應義塾大学',
  '一桥大学':'一橋大学','东京大学':'東京大学','京都大学':'京都大学','大阪大学':'大阪大学',
  '名古屋大学':'名古屋大学','九州大学':'九州大学','东北大学':'東北大学','北海道大学':'北海道大学',
  '筑波大学':'筑波大学','东京科学大学':'東京科学大学','东京工业大学':'東京科学大学','東京工業大学':'東京科学大学',
  '御茶水女子大学':'お茶の水女子大学','上智大学':'上智大学','东京理科大学':'東京理科大学',
  'ICU大学':'国際基督教大学','国际基督教大学':'国際基督教大学',
  '千叶大学':'千葉大学','横滨国立大学':'横浜国立大学','电气通信大学':'電気通信大学','横滨市立大学':'横浜市立大学',
  '中央大学':'中央大学','关西大学':'関西大学','关西学院大学':'関西学院大学','同志社大学':'同志社大学',
  '明治大学':'明治大学','法政大学':'法政大学','立命馆大学':'立命館大学','立教大学':'立教大学','青山学院大学':'青山学院大学',
  '神户大学':'神戸大学','埼玉大学':'埼玉大学','东京都立大学':'東京都立大学','金沢大学':'金沢大学','金泽大学':'金沢大学',
  '广岛大学':'広島大学','弘前大学':'弘前大学','爱知县立大学':'愛知県立大学','大阪公立大学':'大阪公立大学',
  '静冈县立大学':'静岡県立大学','东京外国语大学':'東京外国語大学','神奈川大学':'神奈川大学',
  '旭川市立大学':'旭川市立大学','秋田大学':'秋田大学','茨城大学':'茨城大学','长崎大学':'長崎大学',
  '专修大学':'専修大学','东京电机大学':'東京電機大学','东洋大学':'東洋大学','日本大学':'日本大学',
  '日本女子大学':'日本女子大学','明治学院大学':'明治学院大学','独协大学':'独協大学','近畿大学':'近畿大学',
  '顺天堂大学':'順天堂大学','驹泽大学':'駒澤大学','龙谷大学':'龍谷大学',
  '东京工科大学':'東京工科大学','东海大学':'東海大学','二松学舍大学':'二松学舎大学','京都外国语大学':'京都外国語大学',
  '国士馆大学':'国士舘大学','圣心女子大学':'聖心女子大学','大东文化大学':'大東文化大学','武藏野大学':'武蔵野大学',
  '福冈大学':'福岡大学','东京工艺大学':'東京工芸大学','兵库大学':'兵庫大学','冈山理科大学':'岡山理科大学',
  '圣学院大学':'聖学院大学','大阪工业大学':'大阪工業大学','大阪经济法科大学':'大阪経済法科大学',
  '大阪观光大学':'大阪観光大学','平成国际大学':'平成国際大学','拓殖大学':'拓殖大学','拓値大学':'拓殖大学',
  '文化学园大学':'文化学園大学','日本工业大学':'日本工業大学','札幌学院大学':'札幌学院大学','樱美林大学':'桜美林大学',
  '江户川大学':'江戸川大学','流通经济大学':'流通経済大学','福冈女子大学':'福岡女子大学','立正大学':'立正大学',
  '长崎综合科学大学':'長崎総合科学大学','青森大学':'青森大学','骏河台大学':'駿河台大学',
  '北洋大学':'北洋大学','千叶科学大学':'千葉科学大学','山梨学院大学':'山梨学院大学','徳岛文理大学':'徳島文理大学',
  '至诚馆大学':'至誠館大学','成安造形大学':'成安造形大学','武藏大学':'武蔵大学','成蹊大学':'成蹊大学',
  '成城大学':'成城大学','都留文科大学':'都留文科大学','城西大学':'城西大学','城西国際大学':'城西国際大学',
  '城西国际大学':'城西国際大学','大正大学':'大正大学','目白大学':'目白大学','淑徳大学':'淑徳大学','淑德大学':'淑徳大学',
  '日本経済大学':'日本経済大学','日本经济大学':'日本経済大学','桃山学院大学':'桃山学院大学','多摩大学':'多摩大学',
  '共立女子大学':'共立女子大学','甲南女子大学':'甲南女子大学','东京女子大学':'東京女子大学','東京女子大学':'東京女子大学',
};
function normUniv(u) { if (!u) return u; const t = u.trim(); return UNIV_NORM[t] || t; }

// ─── State ────────────────────────────────────────────────────────────────────
let gradData = [], ugData = [];
let curScope = 'all', curEra = 'all';

window.addEventListener('DOMContentLoaded', async () => {
  try {
    const [gradRaw, ugRaw] = await Promise.allSettled([
      sbGet('admission_results'), sbGet('undergrad_results')
    ]);
    gradData = gradRaw.status==='fulfilled' ? gradRaw.value.map(r=>({...r, univ:normUniv(r.univ), _src:'grad'})) : [];
    ugData = ugRaw.status==='fulfilled' ? ugRaw.value.map(r=>({...r, univ:normUniv(r.univ), _src:'ug'})) : [];
    render();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="loading" style="color:#c00">エラー: ${e.message}</div>`;
  }
});

function setScope(s) { curScope=s; document.querySelectorAll('#scope-seg button').forEach((b,i)=>b.classList.toggle('active',['all','grad','ug'][i]===s)); render(); }
function setEra(e) { curEra=e; document.querySelectorAll('#era-seg button').forEach((b,i)=>b.classList.toggle('active',['all','new','hist'][i]===e)); render(); }

function render() {
  let g = gradData, u = ugData;
  if (curEra!=='all') { g = g.filter(r=>r.era===curEra); u = u.filter(r=>r.era===curEra); }

  // Nav card stats (always show full totals regardless of scope filter, but respect era)
  document.getElementById('grad-total').textContent = g.length;
  document.getElementById('grad-univs').textContent = new Set(g.map(r=>r.univ)).size;
  document.getElementById('ug-total').textContent = u.length;
  document.getElementById('ug-univs').textContent = new Set(u.map(r=>r.univ)).size;

  // Track availability pills
  const gradTracks = new Set(g.map(r=>r.track||'bunka'));
  document.getElementById('grad-tracks').innerHTML = ['bunka','rika','bijutsu'].map(t => {
    const labels = {bunka:'文科',rika:'理科',bijutsu:'美術'};
    const has = gradTracks.has(t);
    return `<span class="nc-track-pill${has?' has-data':''}">${labels[t]}${has?'':'（準備中）'}</span>`;
  }).join('');
  const ugTracks = new Set(u.map(r=>r.track||'bunka'));
  document.getElementById('ug-tracks').innerHTML = ['bunka','rika','bijutsu'].map(t => {
    const labels = {bunka:'文科',rika:'理科',bijutsu:'美術'};
    const has = ugTracks.has(t);
    return `<span class="nc-track-pill${has?' has-data':''}">${labels[t]}${has?'':'（準備中）'}</span>`;
  }).join('');

  // Scoped combined data
  let combined = [];
  if (curScope==='all' || curScope==='grad') combined = combined.concat(g);
  if (curScope==='all' || curScope==='ug') combined = combined.concat(u);

  document.getElementById('sb-total').textContent = combined.length;
  document.getElementById('sb-univs').textContent = new Set(combined.map(r=>r.univ)).size;
  document.getElementById('sb-grad').textContent = g.length;
  document.getElementById('sb-ug').textContent = u.length;

  document.getElementById('main').innerHTML = buildMainContent(combined, g, u);
}

function buildMainContent(combined, g, u) {
  if (!combined.length) return '<div class="loading">データがまだありません</div>';

  // Group by univ, count grad/ug separately
  const univMap = {};
  for (const r of combined) {
    if (!univMap[r.univ]) univMap[r.univ] = { grad:0, ug:0, total:0 };
    univMap[r.univ][r._src]++;
    univMap[r.univ].total++;
  }
  const univs = Object.keys(univMap).sort((a,b)=>univMap[b].total-univMap[a].total);

  let html = `<div class="section-title">大学別 合格件数<span class="count">${univs.length} 校</span></div>`;
  html += `<div class="univ-grid">`;
  for (const uname of univs.slice(0, 60)) {
    const d = univMap[uname];
    const pills = [];
    if (d.grad>0) pills.push(`<span class="uc-pill grad">院 ${d.grad}</span>`);
    if (d.ug>0) pills.push(`<span class="uc-pill ug">学部 ${d.ug}</span>`);
    html += `<div class="ucard">
      <div class="uc-name">${uname}</div>
      <div class="uc-total">${d.total}</div>
      <div class="uc-total-lbl">合格件数</div>
      <div class="uc-breakdown">${pills.join('')}</div>
    </div>`;
  }
  html += `</div>`;

  // Bar charts: subject distribution (grad) + tier distribution (combined)
  html += `<div class="two-col">`;

  // Grad subject distribution
  if (g.length) {
    const SUBJ_LABEL = {shakai:'社会学',fukushi:'社会福祉',shinpan:'新聞伝播',keizai:'経済学',keiei:'経営学',kyoiku:'教育学',hougaku:'法学',seiji:'政治学/国際',bungaku:'文学',rekishi:'歴史学',hyosho:'表象文化',nihongo:'日本語教育',shinri:'心理学',other:'その他'};
    const counts = {};
    for (const r of g) counts[r.subject||'other'] = (counts[r.subject||'other']||0)+1;
    const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    const max = entries[0]?.[1]||1;
    html += `<div class="bar-section"><div class="bar-section-title">大学院 · 学科別件数</div>`;
    for (const [s,cnt] of entries) {
      const pct = Math.round(cnt/max*100);
      html += `<div class="bar-row"><div class="bar-label">${SUBJ_LABEL[s]||s}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--grad-c)"></div></div>
        <div class="bar-val">${cnt}</div></div>`;
    }
    html += `</div>`;
  }

  // UG tier distribution
  if (u.length) {
    const TIER_LABEL = {0:'T0 旧帝・早慶上理',1:'T1 上位国公立/MARCH',2:'T2 地方国公立/日東駒専',3:'T3 大東亜帝国',4:'T4 保底校'};
    const counts = {};
    for (const r of u) { const t = r.tier ?? 4; counts[t] = (counts[t]||0)+1; }
    const max = Math.max(...Object.values(counts), 1);
    html += `<div class="bar-section"><div class="bar-section-title">学部 · 層次別件数</div>`;
    for (const t of [0,1,2,3,4]) {
      const cnt = counts[t]||0;
      if (!cnt) continue;
      const pct = Math.round(cnt/max*100);
      const colors = ['#1a3070','#2c4a8a','#3a6630','#7a4a20','#7a2020'];
      html += `<div class="bar-row"><div class="bar-label">${TIER_LABEL[t]}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[t]}"></div></div>
        <div class="bar-val">${cnt}</div></div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}
</script>
</body>
</html>
