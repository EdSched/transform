<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合格実绩 · 唯新教育</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0; --surface: #fff; --border: #e2ded6; --border-light: #ede9e2;
  --text-primary: #1a1814; --text-secondary: #5a5650; --text-muted: #9a9590;
  --accent: #2c4a8a;
  --t1: #2c4a8a; --t1-bg: #e8edf8; --t1-border: #c0cce8;
  --t2: #3a6630; --t2-bg: #e8f0e4; --t2-border: #b8d0b4;
  --t3: #7a4a20; --t3-bg: #f4ece0; --t3-border: #d8c0a4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text-primary); font-size: 13px; line-height: 1.55; }

/* ── Header ── */
header {
  background: var(--surface); border-bottom: 2px solid var(--text-primary);
  padding: 2rem 3rem 1.5rem;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem; flex-wrap: wrap;
}
.header-left h1 { font-family: 'Noto Serif SC', serif; font-size: 1.6rem; font-weight: 600; letter-spacing: .03em; }
.header-left .sub { font-size: 10px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; margin-top: 4px; }
.header-stats { display: flex; gap: 2rem; }
.stat-item { text-align: right; }
.stat-num { font-family: 'Noto Serif SC', serif; font-size: 2rem; font-weight: 300; color: var(--accent); line-height: 1; }
.stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: .06em; margin-top: 3px; }

/* ── Filter bar ── */
.filter-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 3rem; position: sticky; top: 0; z-index: 200;
}
.filter-row {
  display: flex; align-items: center; gap: 16px; padding: 10px 0; flex-wrap: wrap;
  border-bottom: 1px solid var(--border-light);
}
.filter-row:last-child { border-bottom: none; }
.filter-label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; min-width: 60px; }

/* Seg buttons */
.seg { display: flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
.seg button {
  padding: 4px 12px; background: none; border: none; border-right: 1px solid var(--border);
  font-family: inherit; font-size: 11px; color: var(--text-secondary); cursor: pointer;
  transition: background .12s, color .12s; letter-spacing: .03em; white-space: nowrap;
}
.seg button:last-child { border-right: none; }
.seg button.active { background: var(--text-primary); color: var(--bg); }
.seg button:hover:not(.active) { background: var(--bg); }

/* Subject pills */
.pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 3px 10px; border-radius: 2px; font-size: 10px; font-family: inherit;
  cursor: pointer; border: 1px solid transparent; transition: opacity .12s, transform .1s;
  letter-spacing: .02em;
}
.pill:not(.active) { opacity: .38; }
.pill.active { opacity: 1; }
.pill:hover { transform: translateY(-1px); }

/* Score range sliders */
.score-filters { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
.score-group { display: flex; align-items: center; gap: 8px; }
.score-group label { font-size: 10px; color: var(--text-muted); letter-spacing: .04em; white-space: nowrap; }
.score-group select {
  padding: 3px 8px; border: 1px solid var(--border); border-radius: 3px;
  font-family: inherit; font-size: 11px; background: var(--bg); color: var(--text-primary);
}
.jlpt-toggles { display: flex; gap: 6px; }
.jlpt-btn {
  padding: 3px 10px; border: 1px solid var(--border); border-radius: 2px;
  font-size: 11px; font-family: inherit; cursor: pointer; background: none; color: var(--text-secondary);
  transition: all .12s;
}
.jlpt-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }

/* Sort control */
.sort-row { display: flex; align-items: center; gap: 10px; }
.sort-label { font-size: 10px; color: var(--text-muted); }
.sort-btn {
  padding: 3px 10px; border: 1px solid var(--border); border-radius: 2px;
  font-size: 11px; font-family: inherit; cursor: pointer; background: none; color: var(--text-secondary);
  transition: all .12s;
}
.sort-btn.active { border-color: var(--text-secondary); color: var(--text-primary); background: var(--surface); }
.sort-dir-btn {
  padding: 3px 8px; border: 1px solid var(--border); border-radius: 2px;
  font-size: 11px; font-family: inherit; cursor: pointer; background: none; color: var(--text-secondary);
}

/* ── Main ── */
main { padding: 1.5rem 3rem 4rem; }

/* ── Tier sections ── */
.tier-section { margin-bottom: 2rem; }
.tier-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  padding: 8px 12px; border-radius: 3px; cursor: pointer; user-select: none;
}
.tier-header:hover { opacity: .85; }
.tier-1 .tier-header { background: var(--t1-bg); border: 1px solid var(--t1-border); }
.tier-2 .tier-header { background: var(--t2-bg); border: 1px solid var(--t2-border); }
.tier-3 .tier-header { background: var(--t3-bg); border: 1px solid var(--t3-border); }
.tier-badge { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 2px; letter-spacing: .1em; }
.tier-1 .tier-badge { background: var(--t1); color: #fff; }
.tier-2 .tier-badge { background: var(--t2); color: #fff; }
.tier-3 .tier-badge { background: var(--t3); color: #fff; }
.tier-name { font-family: 'Noto Serif SC', serif; font-size: 13px; letter-spacing: .02em; }
.tier-count { margin-left: auto; font-size: 10px; color: var(--text-muted); letter-spacing: .04em; }
.tier-toggle { font-size: 11px; color: var(--text-muted); }
.tier-body { }

/* ── University grid ── */
.univ-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.univ-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; transition: box-shadow .15s, border-color .15s; overflow: hidden;
}
.univ-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.08); border-color: var(--text-muted); }
.univ-card.expanded { border-color: var(--accent); }
.univ-card-head {
  padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 6px;
}
.univ-name { font-family: 'Noto Serif SC', serif; font-size: 12px; font-weight: 600; flex: 1; min-width: 0; line-height: 1.4; }
.univ-badge {
  font-size: 12px; font-weight: 600; color: var(--accent);
  flex-shrink: 0; font-family: 'Noto Serif SC', serif;
}
.univ-subj-bar {
  display: flex; height: 3px; margin: 0 12px 8px; border-radius: 2px; overflow: hidden; gap: 1px;
}
.subj-seg { height: 100%; flex-shrink: 0; }

/* ── Expanded detail panel ── */
.univ-detail {
  border-top: 1px solid var(--border-light); display: none;
  background: #faf9f6;
}
.univ-card.expanded .univ-detail { display: block; }
.detail-inner { padding: 10px 12px; }
.detail-sort-bar {
  display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap;
}
.detail-sort-label { font-size: 9px; color: var(--text-muted); letter-spacing: .06em; }
.detail-sort-btn {
  font-size: 9px; padding: 1px 7px; border: 1px solid var(--border); border-radius: 2px;
  background: none; font-family: inherit; cursor: pointer; color: var(--text-secondary);
}
.detail-sort-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }
.entry-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0; border-top: 1px solid var(--border-light);
}
.entry-row:first-of-type { border-top: none; }
.subj-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.entry-info { flex: 1; min-width: 0; }
.entry-dept { font-size: 11px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-spec { font-size: 10px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
.entry-tags { display: flex; gap: 4px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.score-tag { font-size: 9px; padding: 1px 5px; border-radius: 2px; background: var(--border-light); color: var(--text-secondary); white-space: nowrap; }
.score-tag.hi { background: #e8f0f8; color: var(--accent); font-weight: 500; }
.subj-tag-sm { font-size: 9px; padding: 1px 5px; border-radius: 2px; white-space: nowrap; }
.era-tag { font-size: 9px; padding: 1px 5px; border-radius: 2px; white-space: nowrap; }
.era-hist { background: #f0ede6; color: var(--text-muted); }
.era-new  { background: #e8f0f8; color: var(--accent); }

/* ── Loading / empty ── */
.loading { padding: 3rem; text-align: center; color: var(--text-muted); font-size: 12px; letter-spacing: .04em; }
.no-data { padding: 2rem; text-align: center; color: var(--text-muted); font-size: 12px; }

@media (max-width: 680px) {
  header, main { padding-left: 1.2rem; padding-right: 1.2rem; }
  .filter-bar { padding-left: 1.2rem; padding-right: 1.2rem; }
  .univ-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}

/* ── Modal overlay ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(20,18,14,.55);
  z-index: 500; display: none; align-items: center; justify-content: center;
  padding: 1.5rem;
  backdrop-filter: blur(2px);
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; width: 100%; max-width: 860px;
  max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
}
.modal-header {
  padding: 1.2rem 1.6rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0;
}
.modal-univ-name {
  font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 600;
  letter-spacing: .02em; flex: 1; min-width: 0;
}
.modal-tier-badge {
  font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 3px;
  letter-spacing: .08em; flex-shrink: 0; margin-top: 4px;
}
.modal-close {
  width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
  background: none; font-size: 14px; cursor: pointer; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background .12s;
}
.modal-close:hover { background: var(--bg); color: var(--text-primary); }
.modal-subheader {
  padding: 8px 1.6rem; border-bottom: 1px solid var(--border-light);
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
  background: var(--bg);
}
.modal-stat { font-size: 11px; color: var(--text-secondary); }
.modal-stat strong { color: var(--text-primary); }
.modal-sort-bar { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.modal-sort-label { font-size: 10px; color: var(--text-muted); }
.modal-sort-btn {
  padding: 3px 10px; border: 1px solid var(--border); border-radius: 2px;
  font-size: 10px; font-family: inherit; cursor: pointer; background: none;
  color: var(--text-secondary); transition: all .12s;
}
.modal-sort-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }
.modal-body {
  overflow-y: auto; flex: 1; padding: 0;
}
.modal-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.modal-table thead th {
  padding: 9px 14px; background: var(--bg); border-bottom: 2px solid var(--border);
  text-align: left; font-size: 10px; letter-spacing: .06em; color: var(--text-muted);
  text-transform: uppercase; white-space: nowrap; position: sticky; top: 0; z-index: 10;
}
.modal-table tbody tr { border-bottom: 1px solid var(--border-light); transition: background .1s; }
.modal-table tbody tr:hover { background: #faf8f4; }
.modal-table tbody td { padding: 10px 14px; vertical-align: middle; }
.modal-table .dept-cell { color: var(--text-secondary); font-size: 12px; }
.modal-table .spec-cell { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
.score-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 500;
  white-space: nowrap;
}
.score-badge.toeic { background: #e8f0f8; color: #1a3060; }
.score-badge.toefl { background: #e8f4e4; color: #1a4020; }
.score-badge.ielts { background: #f4ede0; color: #5a3800; }
.score-badge.jlpt  { background: #f0ede6; color: #3a3020; }
.score-badge.hi    { background: #fff0c8; color: #5a4000; border: 1px solid #e0c060; }
.modal-subj-tag {
  display: inline-block; padding: 2px 8px; border-radius: 3px;
  font-size: 10px; white-space: nowrap;
}
.modal-era-tag {
  display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px;
}

/* ── Univ card — make it clearly clickable ── */
.univ-card { cursor: pointer; }
.univ-card-head { padding: 12px 14px; }
.univ-name { font-size: 13px; }
.univ-hint { font-size: 9px; color: var(--text-muted); margin-top: 2px; letter-spacing:.03em; }

</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>合格実绩</h1>
    <div class="sub">唯新教育 · 文科大学院</div>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">合格件数</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-univs">—</div>
      <div class="stat-label">合格大学数</div>
    </div>
  </div>
</header>

<div class="filter-bar">
  <!-- Row 1: Era + Tier + Subject -->
  <div class="filter-row">
    <span class="filter-label">年份</span>
    <div class="seg" id="era-seg">
      <button class="active" onclick="setEra('all')">全部</button>
      <button onclick="setEra('new')">2025–2026</button>
      <button onclick="setEra('hist')">2022–2024</button>
    </div>
    <span class="filter-label" style="margin-left:8px">层次</span>
    <div class="seg" id="tier-seg">
      <button class="active" onclick="setTier(0)">全部</button>
      <button onclick="setTier(1)">T1</button>
      <button onclick="setTier(2)">T2</button>
      <button onclick="setTier(3)">T3</button>
    </div>
    <span class="filter-label" style="margin-left:8px">学科</span>
    <div class="pill-row" id="subj-pills"></div>
  </div>

  <!-- Row 2: Score filters -->
  <div class="filter-row">
    <span class="filter-label">语言成绩</span>
    <div class="score-filters">
      <div class="score-group">
        <label>JLPT</label>
        <div class="jlpt-toggles" id="jlpt-btns">
          <button class="jlpt-btn active" onclick="toggleJlpt('all')">全部</button>
          <button class="jlpt-btn" onclick="toggleJlpt('N1')">N1</button>
          <button class="jlpt-btn" onclick="toggleJlpt('N2')">N2</button>
        </div>
      </div>
      <div class="score-group">
        <label>JLPT点数 ≥</label>
        <select id="jlpt-score-min" onchange="applyFilters()">
          <option value="0">不限</option>
          <option value="100">100+</option>
          <option value="110">110+</option>
          <option value="120">120+</option>
          <option value="130">130+</option>
          <option value="140">140+</option>
          <option value="150">150+</option>
          <option value="160">160+</option>
          <option value="170">170+</option>
        </select>
      </div>
      <div class="score-group">
        <label>TOEIC 区間</label>
        <select id="toeic-min" onchange="applyFilters()">
          <option value="0">不限</option>
          <option value="500">500–599</option>
          <option value="600">600–699</option>
          <option value="700">700–799</option>
          <option value="800">800–899</option>
          <option value="900">900+</option>
        </select>
        <select id="toeic-max" onchange="applyFilters()">
          <option value="9999">以上</option>
          <option value="599">〜599</option>
          <option value="699">〜699</option>
          <option value="799">〜799</option>
          <option value="899">〜899</option>
        </select>
      </div>
      <div class="score-group">
        <label>TOEFL 区間</label>
        <select id="toefl-min" onchange="applyFilters()">
          <option value="0">不限</option>
          <option value="60">60–69</option>
          <option value="70">70–79</option>
          <option value="80">80–89</option>
          <option value="90">90–99</option>
          <option value="100">100+</option>
        </select>
        <select id="toefl-max" onchange="applyFilters()">
          <option value="999">以上</option>
          <option value="69">〜69</option>
          <option value="79">〜79</option>
          <option value="89">〜89</option>
          <option value="99">〜99</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Row 3: Sort -->
  <div class="filter-row">
    <span class="filter-label">排序</span>
    <div class="sort-row">
      <div class="seg" id="sort-seg">
        <button class="active" onclick="setSort('default')">默认</button>
        <button onclick="setSort('jlpt_score')">JLPT点数</button>
        <button onclick="setSort('toeic')">TOEIC</button>
        <button onclick="setSort('toefl')">TOEFL</button>
      </div>
      <button class="sort-dir-btn" id="sort-dir-btn" onclick="toggleSortDir()">↓</button>
    </div>
  </div>
</div>

<main id="main"><div class="loading">読み込み中...</div></main>


<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allData = [];
let curEra = 'all';
let curTier = 0;
let activeSubjs = new Set(['shakai','fukushi','shinpan','keizai','keiei','kyoiku','hougaku','seiji','bungaku','rekishi','hyosho','nihongo','shinri','other']);
let curJlpt = 'all';
let curSort = 'default';
let sortDir = -1; // -1 = desc, 1 = asc
let expandedUnivs = new Set();
let univDetailSort = {}; // univName → sort key

const SUBJ_META = [
  { id:'shakai',   label:'社会学',         cls:'pill-shakai'   },
  { id:'fukushi',  label:'社会福祉',        cls:'pill-fukushi'  },
  { id:'shinpan',  label:'新聞伝播',        cls:'pill-shinpan'  },
  { id:'keizai',   label:'経済学',          cls:'pill-keizai'   },
  { id:'keiei',    label:'経営学',          cls:'pill-keiei'    },
  { id:'kyoiku',   label:'教育学',          cls:'pill-kyoiku'   },
  { id:'hougaku',  label:'法学',            cls:'pill-hougaku'  },
  { id:'seiji',    label:'政治学/国際',     cls:'pill-seiji'    },
  { id:'bungaku',  label:'文学',            cls:'pill-bungaku'  },
  { id:'rekishi',  label:'歴史学',          cls:'pill-rekishi'  },
  { id:'hyosho',   label:'表象文化',        cls:'pill-hyosho'   },
  { id:'nihongo',  label:'日本語教育',      cls:'pill-nihongo'  },
  { id:'shinri',   label:'心理学',          cls:'pill-shinri'   },
  { id:'other',    label:'その他',          cls:'pill-other'    },
];
const SUBJ_LABEL = {shakai:'社会学',fukushi:'社会福祉',shinpan:'新聞伝播',keizai:'経済学',keiei:'経営学',kyoiku:'教育学',hougaku:'法学',seiji:'政治学/国際',bungaku:'文学',rekishi:'歴史学',hyosho:'表象文化',nihongo:'日本語教育',shinri:'心理学',other:'その他'};

// ─── Boot ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  buildPills();

  // Event delegation for univ card clicks
  document.getElementById('main').addEventListener('click', e => {
    const card = e.target.closest('.univ-card[data-univ]');
    if (card) openModal(card.dataset.univ);
  });

  try {
    allData = await fetchAllResults();
    applyFilters();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="loading" style="color:#c00">データ読み込みエラー: ${e.message}<br><small>Supabaseの設定を確認してください</small></div>`;
  }
});

// ─── Pills ───────────────────────────────────────────────────────────────────
function buildPills() {
  const container = document.getElementById('subj-pills');
  container.innerHTML = SUBJ_META.map(s => {
    const c = SUBJ_COLOR[s.id];
    return `<button class="pill active" id="pill-${s.id}"
      style="background:${c.bg};color:${c.fg};border-color:${c.fg}"
      onclick="toggleSubj('${s.id}')">${s.label}</button>`;
  }).join('');
}

function toggleSubj(id) {
  if (activeSubjs.has(id) && activeSubjs.size === 1) return;
  if (activeSubjs.has(id)) activeSubjs.delete(id); else activeSubjs.add(id);
  document.getElementById(`pill-${id}`)?.classList.toggle('active', activeSubjs.has(id));
  applyFilters();
}

// ─── Filter controls ─────────────────────────────────────────────────────────
function setEra(e) {
  curEra = e;

    b.classList.toggle('active', b.textContent.trim() === v || (v==='all' && b.textContent==='全部')));

function setSort(s) {
  curSort = s;

function toggleSortDir() {
  sortDir *= -1;
  document.getElementById('sort-dir-btn').textContent = sortDir === -1 ? '↓' : '↑';

// ─── Filter + sort ───────────────────────────────────────────────────────────
function applyFilters() {
  const jlptScoreMin = parseInt(document.getElementById('jlpt-score-min').value);
  const toeicMin = parseInt(document.getElementById('toeic-min').value);
  const toeicMax = parseInt(document.getElementById('toeic-max').value);
  const toeflMin = parseInt(document.getElementById('toefl-min').value);
  const toeflMax = parseInt(document.getElementById('toefl-max').value);

  let data = allData.filter(r => {
    if (curEra !== 'all' && r.era !== curEra) return false;
    if (!activeSubjs.has(r.subject || 'other')) return false;
    if (curTier !== 0 && (r.tier || tierOf(r.univ)) !== curTier) return false;
    if (curJlpt !== 'all' && r.jlpt !== curJlpt) return false;
    if (jlptScoreMin > 0 && (!r.jlpt_score || r.jlpt_score < jlptScoreMin)) return false;
    if (r.eng_type === 'TOEIC' && r.eng_score) {
      if (toeicMin > 0 && r.eng_score < toeicMin) return false;
      if (toeicMax < 9999 && r.eng_score > toeicMax) return false;
    }
    if (r.eng_type === 'TOEFL' && r.eng_score) {
      if (toeflMin > 0 && r.eng_score < toeflMin) return false;
      if (toeflMax < 999 && r.eng_score > toeflMax) return false;
    }
    return true;
  });

  // Global sort (affects order within each univ)
  if (curSort !== 'default') {
    data = sortRows(data, curSort, sortDir);
  }

  updateStats(data);
  renderTiers(data);
}

function sortRows(rows, key, dir) {
  return [...rows].sort((a, b) => {
    let av, bv;
    if (key === 'jlpt_score') { av = a.jlpt_score || 0; bv = b.jlpt_score || 0; }
    else if (key === 'toeic') { av = a.eng_type==='TOEIC' ? (a.eng_score||0) : 0; bv = b.eng_type==='TOEIC' ? (b.eng_score||0) : 0; }
    else if (key === 'toefl') { av = a.eng_type==='TOEFL' ? (a.eng_score||0) : 0; bv = b.eng_type==='TOEFL' ? (b.eng_score||0) : 0; }
    else return 0;
    return (bv - av) * dir * -1;  // desc = high first when dir=-1
  });
}

function updateStats(data) {
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-univs').textContent = new Set(data.map(d => d.univ)).size;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderTiers(data) {
  // Group by tier → univ (use tier from first record per univ, then auto)
  // First pass: determine canonical tier per univ
  const univTierMap = {};
  for (const r of data) {
    if (!univTierMap[r.univ]) {
      univTierMap[r.univ] = r.tier || tierOf(r.univ);
    }
  }
  // Second pass: group using canonical tier
  const tiers = { 1: {}, 2: {}, 3: {} };
  for (const r of data) {
    const t = univTierMap[r.univ];
    if (!tiers[t][r.univ]) tiers[t][r.univ] = [];
    tiers[t][r.univ].push(r);
  }

  const main = document.getElementById('main');
  if (!data.length) {
    main.innerHTML = '<div class="no-data">条件に該当するデータがありません</div>';
    return;
  }

  let html = '';
  for (const t of [1, 2, 3]) {
    const univs = Object.keys(tiers[t]);
    if (!univs.length) continue;
    const total = univs.reduce((s, u) => s + tiers[t][u].length, 0);
    const tierColors = { 1: 'var(--t1)', 2: 'var(--t2)', 3: 'var(--t3)' };

    html += `<div class="tier-section tier-${t}" id="tier-block-${t}">`;
    html += `<div class="tier-header" onclick="toggleTier(${t})">
      <span class="tier-badge">${TIERS[t].label}</span>
      <span class="tier-name">${TIERS[t].name}</span>
      <span class="tier-count">${total} 件 · ${univs.length} 校</span>
      <span class="tier-toggle" id="tier-toggle-${t}">▼</span>
    </div>`;
    html += `<div class="tier-body" id="tier-body-${t}">`;
    html += `<div class="univ-grid">`;

    // Sort univs by count desc
    univs.sort((a, b) => tiers[t][b].length - tiers[t][a].length);
    for (const u of univs) {
      html += buildUnivCard(u, tiers[t][u], tierColors[t]);
    }
    html += `</div></div></div>`;
  }

  main.innerHTML = html;


}

function buildUnivCard(univ, rows, accentColor) {
  const subjCounts = {};
  for (const r of rows) subjCounts[r.subject || 'other'] = (subjCounts[r.subject||'other']||0) + 1;
  const barSegs = Object.entries(subjCounts).map(([s, cnt]) => {
    const w = Math.round(cnt / rows.length * 100);
    return `<div class="subj-seg" style="width:${w}%;background:${SUBJ_COLOR[s]?.fg||'#999'}"></div>`;
  }).join('');

  const topSubjs = Object.entries(subjCounts).sort((a,b)=>b[1]-a[1]).slice(0,2)
    .map(([s])=>SUBJ_LABEL[s]||s).join('・');

  // Store univ in data attribute to avoid escaping issues
  const safeUniv = univ.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  let h = `<div class="univ-card" data-univ="${safeUniv}">`;
  h += `<div class="univ-card-head">
    <div class="univ-name">${univ}</div>
    <div class="univ-badge" style="color:${accentColor}">${rows.length}</div>
  </div>`;
  h += `<div class="univ-subj-bar" style="margin:0 14px 6px">${barSegs}</div>`;
  h += `<div class="univ-hint" style="padding:0 14px 10px;font-size:9px;color:var(--text-muted)">${topSubjs}</div>`;
  h += `</div>`;
  return h;
}

function buildDetail(univ, rows) {
  const sortKey = univDetailSort[univ] || 'default';
  let sorted = [...rows];
  if (sortKey !== 'default') sorted = sortRows(sorted, sortKey, -1);

  let html = `<div class="detail-inner">`;
  html += `<div class="detail-sort-bar">
    <span class="detail-sort-label">ソート:</span>
    <button class="detail-sort-btn ${sortKey==='default'?'active':''}" onclick="setDetailSort('${univ.replace(/'/g,"\\'")}','default',event)">デフォルト</button>
    <button class="detail-sort-btn ${sortKey==='jlpt_score'?'active':''}" onclick="setDetailSort('${univ.replace(/'/g,"\\'")}','jlpt_score',event)">JLPT↓</button>
    <button class="detail-sort-btn ${sortKey==='toeic'?'active':''}" onclick="setDetailSort('${univ.replace(/'/g,"\\'")}','toeic',event)">TOEIC↓</button>
    <button class="detail-sort-btn ${sortKey==='toefl'?'active':''}" onclick="setDetailSort('${univ.replace(/'/g,"\\'")}','toefl',event)">TOEFL↓</button>
  </div>`;

  for (const r of sorted) {
    const sc = SUBJ_COLOR[r.subject] || SUBJ_COLOR.other;
    const jlptStr = r.jlpt ? (r.jlpt_score ? `${r.jlpt}-${r.jlpt_score}` : r.jlpt) : null;
    const engStr = (r.eng_type && r.eng_score) ? `${r.eng_type}-${r.eng_score}` : (r.eng_type||null);

    // Highlight high scores
    const jlptHi = r.jlpt_score && r.jlpt_score >= 150;
    const engHi = r.eng_score && ((r.eng_type==='TOEIC' && r.eng_score>=800) || (r.eng_type==='TOEFL' && r.eng_score>=90) || (r.eng_type==='IELTS' && r.eng_score>=7));

    html += `<div class="entry-row">
      <div class="subj-dot" style="background:${sc.fg}"></div>
      <div class="entry-info">
        <div class="entry-dept">${r.dept||'—'}</div>
        ${r.spec ? `<div class="entry-spec">${r.spec}</div>` : ''}
      </div>
      <div class="entry-tags">
        ${jlptStr ? `<span class="score-tag${jlptHi?' hi':''}">${jlptStr}</span>` : ''}
        ${engStr  ? `<span class="score-tag${engHi?' hi':''}">${engStr}</span>`   : ''}
        <span class="subj-tag-sm" style="background:${sc.bg};color:${sc.fg}">${SUBJ_LABEL[r.subject]||r.subject}</span>
        <span class="era-tag ${r.era==='new'?'era-new':'era-hist'}">${r.era==='new'?'25–26':'22–24'}</span>
      </div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

// ─── Interactions ─────────────────────────────────────────────────────────────
function toggleTier(t) {
  const body = document.getElementById(`tier-body-${t}`);
  const icon = document.getElementById(`tier-toggle-${t}`);

// ── Modal ────────────────────────────────────────────────────────────────────
let modalUniv = null;
let modalSortKey = 'default';

function openModal(univ) {
  modalUniv = univ;
  modalSortKey = 'default';
  document.querySelectorAll('.modal-sort-btn').forEach((b,i) =>
    b.classList.toggle('active', i === 0));

  document.getElementById('univ-modal').classList.add('show');

function closeModal() {
  document.getElementById('univ-modal').classList.remove('show');

}

function setModalSort(key, btn) {

function getFilteredRowsForUniv(univ) {
  const jlptScoreMin = parseInt(document.getElementById('jlpt-score-min').value);
  const toeicMin = parseInt(document.getElementById('toeic-min').value);
  const toeicMax = parseInt(document.getElementById('toeic-max').value);
  const toeflMin = parseInt(document.getElementById('toefl-min').value);
  const toeflMax = parseInt(document.getElementById('toefl-max').value);
  return allData.filter(r => {
    if (r.univ !== univ) return false;
    if (curEra !== 'all' && r.era !== curEra) return false;
    if (!activeSubjs.has(r.subject||'other')) return false;
    if (curJlpt !== 'all' && r.jlpt !== curJlpt) return false;
    if (jlptScoreMin > 0 && (!r.jlpt_score || r.jlpt_score < jlptScoreMin)) return false;
    if (r.eng_type === 'TOEIC' && r.eng_score) {
      if (toeicMin > 0 && r.eng_score < toeicMin) return false;
      if (toeicMax < 9999 && r.eng_score > toeicMax) return false;
    }
    if (r.eng_type === 'TOEFL' && r.eng_score) {
      if (toeflMin > 0 && r.eng_score < toeflMin) return false;
      if (toeflMax < 999 && r.eng_score > toeflMax) return false;
    }
    return true;
  });
}

function renderModal() {
  if (!modalUniv) return;
  let rows = getFilteredRowsForUniv(modalUniv);

  // Sort
  if (modalSortKey !== 'default') rows = sortRows(rows, modalSortKey, -1);

  // Tier
  const tier = rows[0]?.tier || tierOf(modalUniv);
  const tierColors = { 1:['#e8edf8','#2c4a8a'], 2:['#e8f0e4','#3a6630'], 3:['#f4ece0','#7a4a20'] };
  const [tbg, tfg] = tierColors[tier] || ['#eee','#666'];
  const tierNames = { 1:'T1 旧帝・一橋・東科大・早慶上智', 2:'T2 G-MARCH・関関同立・地方国公立', 3:'T3 日駒東専・女子大・地方私立' };

  document.getElementById('modal-univ-name').textContent = modalUniv;
  const badge = document.getElementById('modal-tier-badge');
  badge.textContent = tierNames[tier] || '';
  badge.style.background = tbg; badge.style.color = tfg;

  // Subject breakdown for stat line
  const subjCounts = {};
  for (const r of rows) subjCounts[r.subject||'other'] = (subjCounts[r.subject||'other']||0) + 1;
  const subjStr = Object.entries(subjCounts).sort((a,b)=>b[1]-a[1])
    .map(([s,n]) => `${SUBJ_LABEL[s]||s} ${n}`).join('　');
  document.getElementById('modal-stat').innerHTML =
    `<strong>${rows.length}</strong> 件　|　${subjStr}`;

  // Table rows
  const tbody = document.getElementById('modal-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="padding:2rem;text-align:center;color:var(--text-muted)">データなし</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const sc = SUBJ_COLOR[r.subject] || SUBJ_COLOR.other;
    const jlptStr = r.jlpt ? (r.jlpt_score ? `${r.jlpt}-${r.jlpt_score}` : r.jlpt) : null;
    const jlptHi = r.jlpt_score && r.jlpt_score >= 150;
    const engHi = r.eng_score && (
      (r.eng_type==='TOEIC' && r.eng_score>=800) ||
      (r.eng_type==='TOEFL' && r.eng_score>=90) ||
      (r.eng_type==='IELTS' && r.eng_score>=7)
    );
    const engCls = r.eng_type ? r.eng_type.toLowerCase() : '';
    const eraStyle = r.era==='new'
      ? 'background:#e8f0f8;color:#2c4a8a'
      : 'background:#f0ede6;color:#9a9590';

    return `<tr>
      <td>
        <div class="dept-cell">${r.dept||'—'}</div>
      </td>
      <td>
        <div class="dept-cell">${r.spec||'—'}</div>
      </td>
      <td>
        <span class="modal-subj-tag" style="background:${sc.bg};color:${sc.fg}">${SUBJ_LABEL[r.subject]||r.subject||'—'}</span>
      </td>
      <td>
        ${jlptStr
          ? `<span class="score-badge jlpt${jlptHi?' hi':''}">${jlptStr}</span>`
          : '<span style="color:var(--text-muted);font-size:11px">—</span>'}
      </td>
      <td>
        ${(r.eng_type && r.eng_score)
          ? `<span class="score-badge ${engCls}${engHi?' hi':''}">${r.eng_type} ${r.eng_score}</span>`
          : '<span style="color:var(--text-muted);font-size:11px">—</span>'}
      </td>
      <td><span class="modal-era-tag" style="${eraStyle}">${r.era==='new'?'25–26':'22–24'}</span></td>
    </tr>`;
  }).join('');
}

// ── Supabase helpers ─────────────────────────────────────────────────────────
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers,
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase ${res.status}: ${err}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function fetchAllResults() {
  return sbFetch('admission_results?select=*&order=created_at.desc');
}

async function insertResult(row) {
  return sbFetch('admission_results', { method: 'POST', body: row });
}

async function insertBatch(rows) {
  return sbFetch('admission_results', { method: 'POST', body: rows, prefer: 'return=representation' });
}

async function deleteResult(id) {
  return sbFetch(`admission_results?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal', headers: {} });
}

async function updateResult(id, row) {

}

// ── Parse helpers ────────────────────────────────────────────────────────────
// Parse jlpt string like 'N1-145' → { jlpt: 'N1', jlpt_score: 145 }
function parseJlpt(raw) {
  if (!raw || raw === '—' || raw === '无' || raw === '——') return { jlpt: null, jlpt_score: null };
  const m = raw.match(/^(N[12])\D*(\d+)?/i);
  if (!m) return { jlpt: raw.trim(), jlpt_score: null };
  return { jlpt: m[1].toUpperCase(), jlpt_score: m[2] ? parseInt(m[2]) : null };
}

// Parse eng string like 'TOEIC-820', 'TOEFL-90', 'IELTS-7.0'
function parseEng(raw) {
  if (!raw || raw === '—' || raw === '无' || raw === '——') return { eng_type: null, eng_score: null };
  const upper = raw.toUpperCase();
  let type = null, score = null;
  if (upper.includes('TOEIC')) type = 'TOEIC';
  else if (upper.includes('TOEFL')) type = 'TOEFL';
  else if (upper.includes('IELTS')) type = 'IELTS';
  else if (upper.includes('EJU')) type = 'EJU';
  else return { eng_type: raw.trim(), eng_score: null };
  const m = raw.match(/[\d.]+/);
  score = m ? parseFloat(m[0]) : null;
  return { eng_type: type, eng_score: score ? Math.round(score) : null };
}

</script>
