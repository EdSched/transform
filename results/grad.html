<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合格実绩 · 大学院 · 唯新教育</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f5f0;--surface:#fff;--border:#e2ded6;--border-light:#ede9e2;
  --text-primary:#1a1814;--text-secondary:#5a5650;--text-muted:#9a9590;--accent:#2c4a8a;
  --t1:#2c4a8a;--t1-bg:#e8edf8;--t1-bd:#c0cce8;
  --t2:#3a6630;--t2-bg:#e8f0e4;--t2-bd:#b8d0b4;
  --t3:#7a4a20;--t3-bg:#f4ece0;--t3-bd:#d8c0a4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text-primary);font-size:13px;line-height:1.55}

/* Header */
header{background:var(--surface);border-bottom:2px solid var(--text-primary);padding:1.4rem 3rem 1.4rem;display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.h-title{font-family:'Noto Serif SC',serif;font-size:1.5rem;font-weight:600;letter-spacing:.03em}
.h-sub{font-size:10px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.h-stats{display:flex;gap:1.5rem}
.stat-num{font-family:'Noto Serif SC',serif;font-size:1.8rem;font-weight:300;color:var(--accent);line-height:1}
.stat-lbl{font-size:10px;color:var(--text-muted);letter-spacing:.06em;margin-top:2px}

/* Filter bar */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 3rem;position:sticky;top:0;z-index:200}
.filter-row{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--border-light);flex-wrap:wrap}
.filter-row:last-child{border-bottom:none}
.flbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;min-width:50px}

/* Seg */
.seg{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.seg button{padding:4px 11px;background:none;border:none;border-right:1px solid var(--border);font-family:inherit;font-size:11px;color:var(--text-secondary);cursor:pointer;transition:background .12s,color .12s;white-space:nowrap}
.seg button:last-child{border-right:none}
.seg button.active{background:var(--text-primary);color:var(--bg)}
.seg button:hover:not(.active){background:var(--bg)}

/* Pills */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;max-width:700px}
.pill{padding:4px 11px;border-radius:3px;font-size:12px;font-family:inherit;cursor:pointer;border:1px solid transparent;transition:opacity .12s;letter-spacing:.01em;white-space:nowrap}
.pill:not(.active){opacity:.32}
.pill.active{opacity:1}

/* Score filters */
.score-filters{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.sg{display:flex;align-items:center;gap:6px}
.sg label{font-size:10px;color:var(--text-muted);white-space:nowrap}
.sg select{padding:3px 7px;border:1px solid var(--border);border-radius:3px;font-family:inherit;font-size:11px;background:var(--bg)}
.jlpt-row{display:flex;gap:5px}
.jbtn{padding:3px 9px;border:1px solid var(--border);border-radius:2px;font-size:11px;font-family:inherit;cursor:pointer;background:none;color:var(--text-secondary);transition:all .12s}
.jbtn.active{background:var(--text-primary);color:var(--bg);border-color:var(--text-primary)}

/* Sort */
.sort-row{display:flex;align-items:center;gap:8px}
.sdbtn{padding:3px 7px;border:1px solid var(--border);border-radius:2px;font-size:11px;font-family:inherit;cursor:pointer;background:none;color:var(--text-secondary)}

/* Main */
main{padding:1.5rem 3rem 4rem}

/* View tabs */
.view-tabs{display:flex;gap:6px;margin-bottom:1.2rem}
.vtab{padding:5px 16px;border:1px solid var(--border);border-radius:3px;background:none;font-family:inherit;font-size:11px;color:var(--text-muted);cursor:pointer;letter-spacing:.04em;transition:all .12s}
.vtab.active{border-color:var(--text-secondary);color:var(--text-primary);background:var(--surface)}

/* Tier section */
.tier-section{margin-bottom:1.8rem}
.tier-hdr{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:3px;cursor:pointer;user-select:none;margin-bottom:8px}
.tier-hdr:hover{opacity:.85}
.t1 .tier-hdr{background:var(--t1-bg);border:1px solid var(--t1-bd)}
.t2 .tier-hdr{background:var(--t2-bg);border:1px solid var(--t2-bd)}
.t3 .tier-hdr{background:var(--t3-bg);border:1px solid var(--t3-bd)}
.tbadge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:2px;letter-spacing:.1em}
.t1 .tbadge{background:var(--t1);color:#fff}
.t2 .tbadge{background:var(--t2);color:#fff}
.t3 .tbadge{background:var(--t3);color:#fff}
.tname{font-family:'Noto Serif SC',serif;font-size:13px}
.tcount{margin-left:auto;font-size:10px;color:var(--text-muted)}
.ttoggle{font-size:11px;color:var(--text-muted)}

/* Univ grid */
.univ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px}
.ucard{background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:box-shadow .15s,border-color .15s;overflow:hidden}
.ucard:hover{box-shadow:0 2px 10px rgba(0,0,0,.09);border-color:var(--text-muted)}
.ucard-head{padding:11px 13px;display:flex;align-items:center;justify-content:space-between;gap:5px}
.ucard-name{font-family:'Noto Serif SC',serif;font-size:12px;font-weight:600;flex:1;min-width:0;line-height:1.4}
.ucard-cnt{font-size:13px;font-weight:600;color:var(--accent);flex-shrink:0;font-family:'Noto Serif SC',serif}
.ucard-bar{display:flex;height:3px;margin:0 13px 5px;border-radius:2px;overflow:hidden;gap:1px}
.ucard-sub{padding:0 13px 9px;font-size:9px;color:var(--text-muted)}

/* Detail panel (inline expand below tier) */
.detail-panel{display:none;background:var(--surface);border:1px solid var(--accent);border-radius:4px;margin-bottom:1rem;overflow:hidden}
.detail-panel.open{display:block}
.dp-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:#f5f8ff;flex-wrap:wrap}
.dp-univ{font-family:'Noto Serif SC',serif;font-size:1rem;font-weight:600}
.dp-tier{font-size:9px;font-weight:600;padding:2px 8px;border-radius:2px;letter-spacing:.08em}
.dp-stats{font-size:11px;color:var(--text-secondary)}
.dp-close{margin-left:auto;width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:none;font-size:13px;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center}
.dp-close:hover{background:var(--bg);color:var(--text-primary)}
.dp-sort-bar{padding:8px 16px;border-bottom:1px solid var(--border-light);display:flex;gap:6px;align-items:center;background:var(--bg);flex-wrap:wrap}
.dp-sort-lbl{font-size:10px;color:var(--text-muted)}
.dp-sort-btn{padding:2px 9px;border:1px solid var(--border);border-radius:2px;font-size:10px;font-family:inherit;cursor:pointer;background:none;color:var(--text-secondary);transition:all .12s}
.dp-sort-btn.active{background:var(--text-primary);color:var(--bg);border-color:var(--text-primary)}
.dp-table-wrap{overflow-x:auto}
.dp-table{width:100%;border-collapse:collapse;font-size:12px}
.dp-table thead th{padding:8px 14px;background:var(--bg);border-bottom:2px solid var(--border);text-align:left;font-size:10px;letter-spacing:.06em;color:var(--text-muted);text-transform:uppercase;white-space:nowrap}
.dp-table tbody tr{border-bottom:1px solid var(--border-light);transition:background .1s}
.dp-table tbody tr:hover{background:#faf8f4}
.dp-table td{padding:10px 14px;vertical-align:middle}
.sbadge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:500;white-space:nowrap}
.sbadge.toeic{background:#e8f0f8;color:#1a3060}
.sbadge.toefl{background:#e8f4e4;color:#1a4020}
.sbadge.ielts{background:#f4ede0;color:#5a3800}
.sbadge.jlpt{background:#f0ede6;color:#3a3020}
.sbadge.hi{background:#fff0c8;color:#5a4000;border:1px solid #e0c060}

/* Group-by-subject view */
.subj-section{margin-bottom:1.5rem}
.subj-hdr{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:3px;margin-bottom:8px;cursor:pointer;user-select:none}
.subj-hdr:hover{opacity:.85}
.subj-count{margin-left:auto;font-size:10px;color:var(--text-muted)}

/* Group-by-era view */
.era-section{margin-bottom:1.5rem}
.era-hdr{padding:8px 14px;border-radius:3px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.era-new .era-hdr{background:#e8f0f8;border:1px solid #c0d0e8}
.era-hist .era-hdr{background:#f0ede6;border:1px solid #d8d0c4}

/* Results table (shared) */
.res-table{width:100%;border-collapse:collapse;font-size:12px}
.res-table thead th{padding:7px 12px;background:var(--bg);border-bottom:2px solid var(--border);text-align:left;font-size:10px;letter-spacing:.06em;color:var(--text-muted);text-transform:uppercase;white-space:nowrap}
.res-table tbody tr{border-bottom:1px solid var(--border-light);transition:background .1s}
.res-table tbody tr:hover{background:#faf8f4}
.res-table td{padding:8px 12px;vertical-align:middle}
.stag{display:inline-block;padding:1px 7px;border-radius:2px;font-size:10px;white-space:nowrap}
.etag{display:inline-block;padding:1px 6px;border-radius:2px;font-size:10px}
.etag-new{background:#e8f0f8;color:#2c4a8a}
.etag-hist{background:#f0ede6;color:#9a9590}

.no-data{padding:2rem;text-align:center;color:var(--text-muted);font-size:12px}
.loading{padding:3rem;text-align:center;color:var(--text-muted);font-size:12px}

@media(max-width:680px){
  header,main{padding-left:1.2rem;padding-right:1.2rem}
  .filter-bar{padding-left:1.2rem;padding-right:1.2rem}
  .univ-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}

/* ── Track tabs (文科/理科/美術) ── */
.track-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 3rem;display:flex;align-items:center;gap:0}
.track-tab{padding:10px 22px;background:none;border:none;border-bottom:3px solid transparent;font-family:'Noto Serif SC',serif;font-size:14px;color:var(--text-muted);cursor:pointer;letter-spacing:.04em;transition:all .15s}
.track-tab.active{color:var(--text-primary);border-bottom-color:var(--accent);font-weight:600}
.track-tab:hover:not(.active){color:var(--text-secondary);background:var(--bg)}
.track-tab .tcount{font-size:10px;color:var(--text-muted);margin-left:6px;font-family:'DM Mono',monospace}
.track-empty{padding:4rem 2rem;text-align:center;color:var(--text-muted)}
.track-empty .te-icon{font-size:2rem;margin-bottom:.8rem;opacity:.4}
.track-empty .te-text{font-size:13px;letter-spacing:.04em}
.back-home{padding:5px 14px;border:1px solid var(--border);border-radius:3px;background:var(--surface);font-family:inherit;font-size:11px;color:var(--text-secondary);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .12s}
.back-home:hover{border-color:var(--text-secondary);color:var(--text-primary)}

</style>
</head>
<body>

<header>
  <div>
    <a href="index.html" class="back-home">← 総合トップ</a>
    <div class="h-title" style="margin-top:8px">合格実绩 · 大学院</div>
    <div class="h-sub" id="track-sub">唯新教育 · 大学院</div>
  </div>
  <div class="h-stats">
    <div style="text-align:right">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-lbl">合格件数</div>
    </div>
    <div style="text-align:right">
      <div class="stat-num" id="stat-univs">—</div>
      <div class="stat-lbl">合格大学数</div>
    </div>
  </div>
</header>

<div class="track-bar" id="track-bar">
  <button class="track-tab active" onclick="setTrack('bunka')">文科<span class="tcount" id="tc-bunka"></span></button>
  <button class="track-tab" onclick="setTrack('rika')">理科<span class="tcount" id="tc-rika"></span></button>
  <button class="track-tab" onclick="setTrack('bijutsu')">美術<span class="tcount" id="tc-bijutsu"></span></button>
</div>

<div class="filter-bar">
  <div class="filter-row">
    <span class="flbl">年份</span>
    <div class="seg" id="era-seg">
      <button class="active" onclick="setEra('all')">全部</button>
      <button onclick="setEra('new')">2025–2026</button>
      <button onclick="setEra('hist')">2022–2024</button>
    </div>
    <span class="flbl" style="margin-left:6px">层次</span>
    <div class="seg" id="tier-seg">
      <button class="active" onclick="setTier(-1)">全部</button>
      <button onclick="setTier(0)">T0</button>
      <button onclick="setTier(1)">T1</button>
      <button onclick="setTier(2)">T2</button>
      <button onclick="setTier(3)">T3</button>
    </div>
    <span class="flbl" style="margin-left:6px">学科</span>
    <button id="subj-all-btn" onclick="toggleAllSubj()"
      style="padding:2px 10px;border:1px solid var(--border);border-radius:2px;font-family:inherit;font-size:10px;
             background:var(--bg);color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .12s;flex-shrink:0">
      全解除
    </button>
    <div class="pill-row" id="subj-pills"></div>
  </div>
  <div class="filter-row">
    <span class="flbl">成绩</span>
    <div class="score-filters">
      <div class="sg">
        <label>JLPT</label>
        <div class="jlpt-row" id="jlpt-btns">
          <button class="jbtn active" onclick="setJlpt('all')">全部</button>
          <button class="jbtn" onclick="setJlpt('N1')">N1</button>
          <button class="jbtn" onclick="setJlpt('N2')">N2</button>
        </div>
      </div>
      <div class="sg">
        <label>JLPT点数≥</label>
        <select id="jmin" onchange="applyFilters()">
          <option value="0">不限</option>
          <option value="100">100+</option>
          <option value="110">110+</option>
          <option value="120">120+</option>
          <option value="130">130+</option>
          <option value="140">140+</option>
          <option value="150">150+</option>
          <option value="160">160+</option>
          <option value="170">170+</option>
        </select>
      </div>
      <div class="sg">
        <label>TOEIC</label>
        <select id="toeic-min" onchange="applyFilters()">
          <option value="0">不限</option>
          <option value="500">500+</option>
          <option value="600">600+</option>
          <option value="700">700+</option>
          <option value="800">800+</option>
          <option value="900">900+</option>
        </select>
        <select id="toeic-max" onchange="applyFilters()">
          <option value="9999">以上</option>
          <option value="599">〜599</option>
          <option value="699">〜699</option>
          <option value="799">〜799</option>
          <option value="899">〜899</option>
        </select>
      </div>
      <div class="sg">
        <label>TOEFL</label>
        <select id="toefl-min" onchange="applyFilters()">
          <option value="0">不限</option>
          <option value="60">60+</option>
          <option value="70">70+</option>
          <option value="80">80+</option>
          <option value="90">90+</option>
          <option value="100">100+</option>
        </select>
        <select id="toefl-max" onchange="applyFilters()">
          <option value="999">以上</option>
          <option value="69">〜69</option>
          <option value="79">〜79</option>
          <option value="89">〜89</option>
          <option value="99">〜99</option>
        </select>
      </div>
    </div>
  </div>
  <div class="filter-row">
    <span class="flbl">排序</span>
    <div class="sort-row">
      <div class="seg" id="sort-seg">
        <button class="active" onclick="setSort('default')">默认</button>
        <button onclick="setSort('jlpt_score')">JLPT点数</button>
        <button onclick="setSort('toeic')">TOEIC</button>
        <button onclick="setSort('toefl')">TOEFL</button>
      </div>
      <button class="sdbtn" id="sort-dir-btn" onclick="toggleSortDir()">↓</button>
    </div>
  </div>
</div>

<main id="main">
  <div class="view-tabs" style="display:flex;align-items:center;gap:6px;margin-bottom:1.2rem">
    <button class="vtab active" onclick="setGroupBy('tier')">学校別（層次）</button>
    <button class="vtab" onclick="setGroupBy('subject')">学科別</button>
    <button class="vtab" onclick="setGroupBy('era')">年度別</button>
    <div id="inline-stats" style="margin-left:auto;display:flex;align-items:center;gap:16px">
      <div style="text-align:right">
        <div style="font-family:'Noto Serif SC',serif;font-size:2.2rem;font-weight:300;color:var(--accent);line-height:1" id="inline-total">—</div>
        <div style="font-size:10px;color:var(--text-muted);letter-spacing:.06em;margin-top:2px">合格件数</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'Noto Serif SC',serif;font-size:2.2rem;font-weight:300;color:var(--text-secondary);line-height:1" id="inline-univs">—</div>
        <div style="font-size:10px;color:var(--text-muted);letter-spacing:.06em;margin-top:2px">合格大学数</div>
      </div>
    </div>
  </div>
  <div id="content"><div class="loading">読み込み中...</div></div>
</main>

<script>

async function fetchAllResults() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/admission_results?select=*&order=created_at.desc`, {
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}

}

    allData = raw.map(r => ({...r, univ: normUniv(r.univ), track: r.track || 'bunka'}));

// ─── Pills ────────────────────────────────────────────────────────────────────
function buildPills() {
  document.getElementById('subj-pills').innerHTML = SUBJ_META.map(s => {
    const c = SUBJ_COLOR[s.id] || { bg: '#eeecea', fg: '#3a3830' };
    return `<button class="pill active" id="pill-${s.id}"
      style="background:${c.bg};color:${c.fg};border-color:${c.fg}"
      onclick="toggleSubj('${s.id}')">${s.label}</button>`;
  }).join('');
  updatePillUI();
}
function toggleSubj(id) {
  const allIds = SUBJ_META.map(s => s.id);
  const isOnlyOne = activeSubjs.size === 1 && activeSubjs.has(id);
  const isAllActive = activeSubjs.size === allIds.length;

  if (isAllActive) {
    // All active → single-select this one
    activeSubjs = new Set([id]);
  } else if (isOnlyOne) {
    // Already the only one → re-select all
    activeSubjs = new Set(allIds);
  } else {
    // Toggle this one in/out
    activeSubjs.has(id) ? activeSubjs.delete(id) : activeSubjs.add(id);
    if (activeSubjs.size === 0) activeSubjs = new Set(allIds);
  }
  updatePillUI();
  applyFilters();
}

function toggleAllSubj() {
  const allIds = SUBJ_META.map(s => s.id);
  if (activeSubjs.size === allIds.length) {
    // All active → deactivate all (show nothing — or keep one)
    // Better: cycle through: all→none shown as "全解除" state, click again→all
    activeSubjs = new Set();
  } else {
    activeSubjs = new Set(allIds);
  }
  updatePillUI();
  applyFilters();
}

function updatePillUI() {
  const allIds = SUBJ_META.map(s => s.id);
  allIds.forEach(id => {
    document.getElementById('pill-'+id)?.classList.toggle('active', activeSubjs.has(id));
  });
  const btn = document.getElementById('subj-all-btn');
  if (btn) {
    const allActive = activeSubjs.size === allIds.length;
    btn.textContent = allActive ? '全解除' : '全選択';
    btn.style.background = allActive ? 'var(--bg)' : 'var(--text-primary)';
    btn.style.color = allActive ? 'var(--text-muted)' : 'var(--bg)';
    btn.style.borderColor = allActive ? 'var(--border)' : 'var(--text-primary)';
  }
}

// ─── Filter ───────────────────────────────────────────────────────────────────
function filtered() {
  const jmin=parseInt(document.getElementById('jmin').value);
  const tmin=parseInt(document.getElementById('toeic-min').value);
  const tmax=parseInt(document.getElementById('toeic-max').value);
  const fmin=parseInt(document.getElementById('toefl-min').value);
  const fmax=parseInt(document.getElementById('toefl-max').value);
  return allData.filter(r=>{
    if ((r.track||'bunka')!==curTrack) return false;
    if (curEra!=='all' && r.era!==curEra) return false;
    if (activeSubjs.size === 0) return false;
    // 理科タブでsubject='other'のデータはrika_otherとして扱う
    const effectiveSubj = (curTrack === 'rika' && (r.subject === 'other' || !r.subject)) ? 'rika_other' : (r.subject || 'other');
    if (!activeSubjs.has(effectiveSubj)) return false;
    if (curTier!==-1 && (r.tier != null ? r.tier : tierOf(r.univ))!==curTier) return false;
    if (curJlpt!=='all' && r.jlpt!==curJlpt) return false;
    if (jmin>0 && (!r.jlpt_score||r.jlpt_score<jmin)) return false;
    if (r.eng_type==='TOEIC'&&r.eng_score){if(tmin>0&&r.eng_score<tmin)return false;if(tmax<9999&&r.eng_score>tmax)return false}
    if (r.eng_type==='TOEFL'&&r.eng_score){if(fmin>0&&r.eng_score<fmin)return false;if(fmax<999&&r.eng_score>fmax)return false}
    return true;
  });
}

function sortRows(rows, key, dir) {
  return [...rows].sort((a,b)=>{
    let av=0,bv=0;
    if(key==='jlpt_score'){av=a.jlpt_score||0;bv=b.jlpt_score||0}
    else if(key==='toeic'){av=a.eng_type==='TOEIC'?(a.eng_score||0):0;bv=b.eng_type==='TOEIC'?(b.eng_score||0):0}
    else if(key==='toefl'){av=a.eng_type==='TOEFL'?(a.eng_score||0):0;bv=b.eng_type==='TOEFL'?(b.eng_score||0):0}
    return (bv-av)*dir*-1;
  });
}

// ─── Apply + render ───────────────────────────────────────────────────────────
function applyFilters() {
  let data = filtered();
  if (curSort!=='default') data = sortRows(data, curSort, sortDir);
  const totalCount = data.length;
  const univCount = new Set(data.map(d=>d.univ)).size;
  document.getElementById('stat-total').textContent = totalCount;
  document.getElementById('stat-univs').textContent = univCount;
  // Inline stats below view tabs
  const il = document.getElementById('inline-total');
  const iu = document.getElementById('inline-univs');
  if (il) il.textContent = totalCount;
  if (iu) iu.textContent = univCount;

  const content = document.getElementById('content');
  const trackTotal = allData.filter(r => (r.track||'bunka')===curTrack).length;
  if (trackTotal === 0) {
    const labels = {bunka:'文科', rika:'理科', bijutsu:'美術'};
    content.innerHTML = `<div class="track-empty">
      <div class="te-icon">○</div>
      <div class="te-text">${labels[curTrack]}のデータはまだありません</div>
    </div>`;
  } else if (curGroup==='tier') content.innerHTML = renderTierView(data);
  else if (curGroup==='subject') content.innerHTML = renderSubjectView(data);
  else content.innerHTML = renderEraView(data);

  // Re-attach open panel if univ still exists
  if (openUniv) {
    const rows = data.filter(r=>r.univ===openUniv);
    if (rows.length) openDetailPanel(openUniv, rows, false);
  }
}

// ─── Tier view ────────────────────────────────────────────────────────────────
function renderTierView(data) {
  // Group by tier→univ (canonical tier per univ)
  const univTierMap = {};
  for (const r of data) {
    if (!univTierMap[r.univ]) univTierMap[r.univ] = r.tier != null ? r.tier : tierOf(r.univ);
  }
  const tiers = {0:{},1:{},2:{},3:{}};
  for (const r of data) {
    const t = univTierMap[r.univ];
    if (!tiers[t][r.univ]) tiers[t][r.univ] = [];
    tiers[t][r.univ].push(r);
  }

  let html = '';
  for (const t of [0,1,2,3]) {
    const univs = Object.keys(tiers[t]);
    if (!univs.length) continue;
    const total = univs.reduce((s,u)=>s+tiers[t][u].length,0);
    const col = {0:'#1a3070',1:'var(--t1)',2:'var(--t2)',3:'var(--t3)'}[t]||'var(--t1)';
    const collapsed = tierCollapsed[t];

    html += `<div class="tier-section t${t}" id="tsec-${t}">
      <div class="tier-hdr" onclick="toggleTierSection(${t})">
        <span class="tbadge">${TIERS[t].label}</span>
        <span class="tname">${TIERS[t].name}</span>
        <span class="tcount">${total} 件 · ${univs.length} 校</span>
        <span class="ttoggle" id="ttoggle-${t}">${collapsed?'▶':'▼'}</span>
      </div>
      <div id="tbody-${t}" style="${collapsed?'display:none':''}">`;

    // Detail panel slot (before grid, so it appears above)
    html += `<div id="dp-slot-${t}"></div>`;

    html += `<div class="univ-grid">`;
    univs.sort((a,b)=>tiers[t][b].length-tiers[t][a].length);
    for (const u of univs) {
      const rows = tiers[t][u];
      const subjCounts = {};
      for (const r of rows) subjCounts[r.subject||'other']=(subjCounts[r.subject||'other']||0)+1;
      const barSegs = Object.entries(subjCounts).map(([s,cnt])=>{
        const w=Math.round(cnt/rows.length*100);
        return `<div class="subj-seg" style="width:${w}%;background:${SUBJ_COLOR[s]?.fg||'#999'}"></div>`;
      }).join('');
      const topSubjs = Object.entries(subjCounts).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([s])=>SUBJ_LABEL[s]||s).join('・');
      const isOpen = openUniv===u;
      const safeU = u.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      html += `<div class="ucard${isOpen?' ucard-open':''}" data-univ="${safeU}" data-tier="${t}" style="${isOpen?'border-color:var(--accent)':''}">
        <div class="ucard-head">
          <div class="ucard-name">${u}</div>
          <div class="ucard-cnt" style="color:${col}">${rows.length}</div>
        </div>
        <div class="ucard-bar">${barSegs}</div>
        <div class="ucard-sub">${topSubjs}</div>
      </div>`;
    }
    html += `</div></div></div>`;
  }
  return html || '<div class="no-data">条件に該当するデータがありません</div>';
}

// ─── Subject view ─────────────────────────────────────────────────────────────
function renderSubjectView(data) {
  const groups = {};
  for (const r of data) {
    const s = (curTrack === 'rika' && (r.subject === 'other' || !r.subject)) ? 'rika_other' : (r.subject||'other');
    if (!groups[s]) groups[s]=[];
    groups[s].push(r);
  }
  const knownIds = SUBJ_META.map(s=>s.id); const order = [...knownIds.filter(s=>groups[s]), ...Object.keys(groups).filter(k=>!knownIds.includes(k))];
  if (!order.length) return '<div class="no-data">条件に該当するデータがありません</div>';

  return order.map(s => {
    const rows = groups[s];
    const c = SUBJ_COLOR[s];
    // Group by univ within subject
    const univMap = {};
    for (const r of rows) { if(!univMap[r.univ])univMap[r.univ]=[]; univMap[r.univ].push(r); }
    const univs = Object.keys(univMap).sort((a,b)=>univMap[b].length-univMap[a].length);

    let html = `<div class="subj-section">
      <div class="subj-hdr" style="background:${c.bg};border:1px solid ${c.fg}"
           onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
        <span style="font-size:11px;font-weight:500;color:${c.fg}">${SUBJ_LABEL[s]}</span>
        <span class="subj-count">${rows.length} 件 · ${univs.length} 校</span>
        <span style="font-size:10px;color:${c.fg}">▼</span>
      </div>
      <div>
        <div style="overflow-x:auto">
        <table class="res-table">
          <thead><tr>
            <th>大学名</th><th>研究科</th><th>専攻</th>
            <th>JLPT</th><th>英語</th><th>年度</th>
          </tr></thead>
          <tbody>`;
    let sorted = [...rows];
    if (curSort!=='default') sorted=sortRows(sorted,curSort,sortDir);
    for (const r of sorted) {
      html += buildTableRow(r);
    }
    html += `</tbody></table></div></div></div>`;
    return html;
  }).join('');
}

// ─── Era view ─────────────────────────────────────────────────────────────────
function renderEraView(data) {
  const newRows = data.filter(r=>r.era==='new');
  const histRows = data.filter(r=>r.era==='hist');

  function eraBlock(rows, cls, label, color) {
    if (!rows.length) return '';
    let sorted = [...rows];
    if (curSort!=='default') sorted=sortRows(sorted,curSort,sortDir);
    return `<div class="era-section ${cls}">
      <div class="era-hdr">
        <span style="font-size:11px;font-weight:600;color:${color}">${label}</span>
        <span style="font-size:10px;color:var(--text-muted)">${rows.length} 件</span>
      </div>
      <div style="overflow-x:auto">
      <table class="res-table">
        <thead><tr><th>大学名</th><th>研究科</th><th>専攻</th><th>学科</th><th>JLPT</th><th>英語</th></tr></thead>
        <tbody>${sorted.map(r=>buildTableRow(r,true)).join('')}</tbody>
      </table></div></div>`;
  }
  const out = eraBlock(newRows,'era-new','2025–2026 入学','#2c4a8a') +
              eraBlock(histRows,'era-hist','2022–2024 実绩','#9a9590');
  return out || '<div class="no-data">条件に該当するデータがありません</div>';
}

// ─── Shared table row ─────────────────────────────────────────────────────────
function buildTableRow(r, showSubj=false) {
  const effSubj = (curTrack === 'rika' && (r.subject === 'other' || !r.subject)) ? 'rika_other' : (r.subject||'other');
  const sc = SUBJ_COLOR[effSubj]||SUBJ_COLOR.other;
  const jHi = r.jlpt_score&&r.jlpt_score>=150;
  const jStr = r.jlpt?(r.jlpt_score?`${r.jlpt}-${r.jlpt_score}`:r.jlpt):null;
  const eHi = r.eng_score&&((r.eng_type==='TOEIC'&&r.eng_score>=800)||(r.eng_type==='TOEFL'&&r.eng_score>=90)||(r.eng_type==='IELTS'&&r.eng_score>=7));
  const eCls = (r.eng_type||'').toLowerCase();
  const eraTag = `<span class="etag ${r.era==='new'?'etag-new':'etag-hist'}">${r.era==='new'?'25–26':'22–24'}</span>`;
  const showS = showSubj || curTrack==='rika';
  return `<tr>
    <td style="font-weight:500">${r.univ||'—'}</td>
    <td style="color:var(--text-secondary)">${r.dept||'—'}</td>
    <td style="color:var(--text-muted);font-size:11px">${r.spec||'—'}</td>
    ${showS?`<td><span class="stag" style="background:${sc.bg};color:${sc.fg}">${SUBJ_LABEL[effSubj]||effSubj||'—'}</span></td>`:''}
    <td>${jStr?`<span class="sbadge jlpt${jHi?' hi':''}">${jStr}</span>`:'<span style="color:var(--text-muted)">—</span>'}</td>
    <td>${(r.eng_type&&r.eng_score)?`<span class="sbadge ${eCls}${eHi?' hi':''}">${r.eng_type} ${r.eng_score}</span>`:'<span style="color:var(--text-muted)">—</span>'}</td>
    <td>${eraTag}</td>
  </tr>`;
}

// ─── Detail panel (tier view only) ────────────────────────────────────────────
document.addEventListener('click', e => {
  if (curGroup!=='tier') return;
  const card = e.target.closest('.ucard[data-univ]');
  if (!card) return;
  const univ = card.dataset.univ;
  const tier = parseInt(card.dataset.tier);
  if (openUniv===univ) { closeDetailPanel(); return; }
  const rows = filtered().filter(r=>r.univ===univ);
  openUniv = univ;
  dpSortKey = 'default';
  openDetailPanel(univ, rows, true, tier);
});

function openDetailPanel(univ, rows, scroll=true, tier) {
  // Close any existing
  document.querySelectorAll('.detail-panel').forEach(el=>el.remove());
  // Mark open card
  document.querySelectorAll('.ucard').forEach(c=>c.style.borderColor='');
  const card = document.querySelector(`.ucard[data-univ="${univ.replace(/"/g,'&quot;')}"]`);
  if (card) { card.style.borderColor='var(--t1)'; tier = (tier != null) ? tier : parseInt(card.dataset.tier); }

  // Find slot
  const slot = document.getElementById(`dp-slot-${tier != null ? tier : 3}`);
  if (!slot) return;

  const panel = document.createElement('div');
  panel.className = 'detail-panel open';
  panel.id = 'detail-panel-main';
  panel.innerHTML = buildDetailPanelHTML(univ, rows, tier);
  slot.after(panel);  // insert after slot (before grid)
  // Actually insert AFTER the grid for this tier
  const grid = slot.nextElementSibling;
  if (grid) grid.after(panel);

  if (scroll) setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function buildDetailPanelHTML(univ, rows, tier) {
  tier = (tier != null) ? tier : tierOf(univ);
  const TCOL = {0:['#e0e6f4','#1a3070'],1:['#e8edf8','#2c4a8a'],2:['#e8f0e4','#3a6630'],3:['#f4ece0','#7a4a20']};
  const [tbg,tfg] = TCOL[tier]||['#eee','#666'];
  const TNAMES={0:'T0',1:'T1',2:'T2',3:'T3'};

  const subjCounts={};
  for(const r of rows) { const es=(curTrack==='rika'&&(r.subject==='other'||!r.subject))?'rika_other':(r.subject||'other'); subjCounts[es]=(subjCounts[es]||0)+1; }
  const subjStr=Object.entries(subjCounts).sort((a,b)=>b[1]-a[1])
    .map(([s,n])=>`<span class="stag" style="background:${SUBJ_COLOR[s]?.bg};color:${SUBJ_COLOR[s]?.fg};margin-right:4px">${SUBJ_LABEL[s]||s} ${n}</span>`).join('');

  let sorted=[...rows];
  if(dpSortKey!=='default') sorted=sortRows(sorted,dpSortKey,-1);

  const btns=['デフォルト','JLPT↓','TOEIC↓','TOEFL↓'].map((lbl,i)=>{
    const k=['default','jlpt_score','toeic','toefl'][i];
    return `<button class="dp-sort-btn${dpSortKey===k?' active':''}" onclick="setDpSort('${k}')">${lbl}</button>`;
  }).join('');

  const rows_html = sorted.map(r=>{
    const effSubj = (curTrack === 'rika' && (r.subject === 'other' || !r.subject)) ? 'rika_other' : (r.subject||'other');
    const sc=SUBJ_COLOR[effSubj]||SUBJ_COLOR.other;
    const jHi=r.jlpt_score&&r.jlpt_score>=150;
    const jStr=r.jlpt?(r.jlpt_score?`${r.jlpt}-${r.jlpt_score}`:r.jlpt):null;
    const eHi=r.eng_score&&((r.eng_type==='TOEIC'&&r.eng_score>=800)||(r.eng_type==='TOEFL'&&r.eng_score>=90)||(r.eng_type==='IELTS'&&r.eng_score>=7));
    const eCls=(r.eng_type||'').toLowerCase();
    return `<tr>
      <td style="color:var(--text-secondary)">${r.dept||'—'}</td>
      <td style="color:var(--text-muted);font-size:11px">${r.spec||'—'}</td>
      <td><span class="stag" style="background:${sc.bg};color:${sc.fg}">${SUBJ_LABEL[effSubj]||effSubj||'—'}</span></td>
      <td>${jStr?`<span class="sbadge jlpt${jHi?' hi':''}">${jStr}</span>`:'<span style="color:var(--text-muted)">—</span>'}</td>
      <td>${(r.eng_type&&r.eng_score)?`<span class="sbadge ${eCls}${eHi?' hi':''}">${r.eng_type} ${r.eng_score}</span>`:'<span style="color:var(--text-muted)">—</span>'}</td>
      <td><span class="etag ${r.era==='new'?'etag-new':'etag-hist'}">${r.era==='new'?'25–26':'22–24'}</span></td>
    </tr>`;
  }).join('');

  return `
    <div class="dp-header">
      <div class="dp-univ">${univ}</div>
      <span class="dp-tier" style="background:${tbg};color:${tfg}">${TNAMES[tier]||''}</span>
      <span class="dp-stats">${rows.length} 件　${subjStr}</span>
      <button class="dp-close" onclick="closeDetailPanel()">✕</button>
    </div>
    <div class="dp-sort-bar">
      <span class="dp-sort-lbl">ソート</span>${btns}
    </div>
    <div class="dp-table-wrap">
      <table class="dp-table">
        <thead><tr>
          <th style="min-width:180px">研究科</th>
          <th>専攻</th>
          <th style="width:90px">学科</th>
          <th style="width:120px">JLPT</th>
          <th style="width:120px">英語</th>
          <th style="width:60px">年度</th>
        </tr></thead>
        <tbody>${rows_html}</tbody>
      </table>
    </div>`;
}

function setDpSort(key) {
  dpSortKey = key;
  if (!openUniv) return;
  const rows = filtered().filter(r=>r.univ===openUniv);
  const tier = tierOf(openUniv);
  const panel = document.getElementById('detail-panel-main');
  if (panel) panel.innerHTML = buildDetailPanelHTML(openUniv, rows, tier);
}

function closeDetailPanel() {
  openUniv = null;
  document.getElementById('detail-panel-main')?.remove();
  document.querySelectorAll('.ucard').forEach(c=>c.style.borderColor='');
}

function toggleTierSection(t) {
  tierCollapsed[t] = !tierCollapsed[t];
  const body = document.getElementById(`tbody-${t}`);
  const icon = document.getElementById(`ttoggle-${t}`);
  if (body) body.style.display = tierCollapsed[t]?'none':'';
  if (icon) icon.textContent = tierCollapsed[t]?'▶':'▼';
}
</script>
</body>
</html>
