<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面谈预约管理端 — 唯新教育</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf7f2;
  --surface: #ffffff;
  --border: #e8e0d4;
  --border-light: #f0ebe2;
  --text-primary: #3a2e24;
  --text-secondary: #6b5c4e;
  --text-muted: #a8998a;
  --accent: #3a2e24;
  --accent-light: #f2ede8;
  --accent-mid: #8a7a6e;
  --sat: #2a5a9a;
  --sun: #9a2a3c;
  --tag-daily-bg:#ede8fa; --tag-daily:#4a3a8a;
  --tag-plan-bg:#e2f2e8;  --tag-plan:#2a5a38;
  --tag-mock-bg:#faeae0;  --tag-mock:#7a3818;
  --success:#2a9e6a; --success-light:#e4f5ee;
  --warning:#b87820; --warning-light:#fdf2dc;
  --danger:#b03030;  --danger-light:#fceaea;
}
body { font-family:'DM Mono','Noto Serif SC',monospace; background:var(--bg); color:var(--text-primary); font-size:13px; line-height:1.5; min-height:100vh; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:1.4rem 2.5rem 1.1rem; display:flex; align-items:flex-end; justify-content:space-between; }
header h1 { font-family:'Noto Serif SC',serif; font-size:1.35rem; font-weight:600; letter-spacing:.02em; }
.header-sub { font-size:10px; color:var(--text-muted); letter-spacing:.08em; text-transform:uppercase; margin-top:3px; }
.layout { display:grid; grid-template-columns:320px 1fr; min-height:calc(100vh - 68px); }
.sidebar { background:var(--surface); border-right:1px solid var(--border); padding:20px 18px; overflow-y:auto; }
.main { padding:24px 2.5rem; overflow-y:auto; }

.section-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
.form-group { margin-bottom:12px; }
.form-label { display:block; font-size:11px; color:var(--text-secondary); margin-bottom:4px; letter-spacing:.02em; }
input, select, textarea { width:100%; border:1px solid var(--border); background:var(--bg); border-radius:3px; padding:7px 9px; font-size:12px; font-family:'DM Mono',monospace; color:var(--text-primary); outline:none; transition:border-color .15s; }
input:focus, select:focus, textarea:focus { border-color:var(--accent); }
.btn { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border-radius:3px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid transparent; transition:all .15s; font-family:'DM Mono',monospace; letter-spacing:.02em; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#5a4a3c; }
.btn-outline { background:transparent; color:var(--text-primary); border-color:var(--border); }
.btn-outline:hover { background:var(--bg); border-color:var(--accent-mid); }
.btn-ghost { background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-family:'DM Mono',monospace; font-size:11px; padding:3px 6px; border-radius:2px; }
.btn-ghost:hover { color:var(--danger); }
.btn-full { width:100%; justify-content:center; }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { background:#1f8558; }
.btn-danger { background:transparent; color:var(--danger); border-color:var(--border); }
.btn-danger:hover { background:var(--danger-light); border-color:var(--danger); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-record { background:var(--accent-light); color:var(--accent); border-color:var(--border); }
.btn-record:hover { background:var(--border); }
.divider { border:none; border-top:1px solid var(--border); margin:16px 0; }

.btn-group { display:flex; border:1px solid var(--border); border-radius:3px; overflow:hidden; width:fit-content; }
.btn-group button { padding:5px 14px; background:transparent; border:none; border-right:1px solid var(--border); font-family:'DM Mono',monospace; font-size:11px; color:var(--text-secondary); cursor:pointer; letter-spacing:.03em; transition:all .15s; }
.btn-group button:last-child { border-right:none; }
.btn-group button.active { background:var(--accent); color:#fff; }
.btn-group button:hover:not(.active) { background:var(--bg); }

.slot-list { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
.slot-item { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; background:var(--bg); border:1px solid var(--border-light); border-radius:3px; font-size:11px; }
.slot-item-left { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }

.tag { display:inline-block; padding:1px 7px; border-radius:2px; font-size:10px; font-weight:500; letter-spacing:.02em; }
.tag-daily { background:var(--tag-daily-bg); color:var(--tag-daily); }
.tag-plan  { background:var(--tag-plan-bg);  color:var(--tag-plan); }
.tag-mock  { background:var(--tag-mock-bg);  color:var(--tag-mock); }

.status-badge { padding:2px 8px; border-radius:2px; font-size:10px; font-weight:500; letter-spacing:.04em; }
.status-pending   { background:var(--warning-light); color:var(--warning); }
.status-confirmed { background:var(--success-light); color:var(--success); }
.status-cancelled { background:var(--border); color:var(--text-muted); }

.booking-grid { display:flex; flex-direction:column; gap:10px; }
.booking-card { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:14px 16px; }
.booking-card.status-pending  { border-left:3px solid var(--warning); }
.booking-card.status-confirmed{ border-left:3px solid var(--success); }
.booking-card.status-cancelled{ border-left:3px solid var(--border); opacity:.55; }
.booking-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px; }
.booking-name { font-size:14px; font-weight:600; font-family:'Noto Serif SC',serif; }
.booking-meta { font-size:11px; color:var(--text-muted); margin-top:2px; }
.booking-body { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin:8px 0; }
.booking-field-label { font-size:10px; color:var(--text-muted); }
.booking-field-value { font-size:11px; font-weight:500; }
.progress-pills { display:flex; flex-wrap:wrap; gap:3px; margin-top:6px; }
.progress-pill { padding:1px 7px; background:var(--bg); border:1px solid var(--border-light); border-radius:2px; font-size:10px; color:var(--text-secondary); }
.booking-needs { background:var(--bg); border-radius:3px; padding:7px 9px; font-size:11px; color:var(--text-secondary); margin-top:6px; line-height:1.5; border:1px solid var(--border-light); }
.booking-actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; padding-top:10px; border-top:1px solid var(--border-light); }
.note-field { margin-top:8px; padding-top:8px; border-top:1px solid var(--border-light); }
.note-label { font-size:10px; color:var(--text-muted); margin-bottom:3px; }
.note-content { font-size:11px; color:var(--text-secondary); font-style:italic; }
.actual-time { font-size:11px; color:var(--success); }
.urgency-high { color:var(--danger); font-weight:600; }
.urgency-mid  { color:var(--warning); font-weight:600; }
.urgency-low  { color:var(--success); font-weight:600; }
.record-done { font-size:10px; color:var(--success); background:var(--success-light); padding:2px 8px; border-radius:2px; }

.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
.page-title { font-family:'Noto Serif SC',serif; font-size:1.2rem; font-weight:600; }
.month-nav { display:flex; align-items:center; gap:10px; }
.month-nav button { background:none; border:1px solid var(--border); border-radius:2px; width:26px; height:26px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; color:var(--text-primary); }
.month-nav button:hover { background:var(--bg); }
.month-display { font-size:13px; font-weight:500; min-width:70px; text-align:center; font-family:'DM Mono',monospace; }
.export-bar { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:10px 14px; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
.export-info { font-size:12px; color:var(--text-muted); }
.export-info strong { color:var(--text-primary); }
.filter-row { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.filter-chip { padding:4px 12px; border-radius:2px; font-size:11px; border:1px solid var(--border); cursor:pointer; transition:all .15s; background:var(--surface); font-family:'DM Mono',monospace; }
.filter-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.empty-state { text-align:center; padding:50px 20px; color:var(--text-muted); font-size:12px; }
.count-badge { display:inline-block; background:var(--accent); color:#fff; border-radius:2px; font-size:10px; padding:1px 5px; margin-left:4px; }

.mode-tabs { display:flex; border:1px solid var(--border); border-radius:3px; overflow:hidden; margin-bottom:14px; }
.mode-tab { flex:1; padding:6px 8px; background:transparent; border:none; font-family:'DM Mono',monospace; font-size:11px; color:var(--text-secondary); cursor:pointer; text-align:center; border-right:1px solid var(--border); transition:all .15s; }
.mode-tab:last-child { border-right:none; }
.mode-tab.active { background:var(--accent); color:#fff; }
.weekday-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:10px; }
.wd-btn { padding:5px 0; background:var(--bg); border:1px solid var(--border); border-radius:2px; font-family:'DM Mono',monospace; font-size:11px; color:var(--text-secondary); cursor:pointer; text-align:center; transition:all .15s; }
.wd-btn.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
.wd-btn.sat { color:var(--sat); }
.wd-btn.sun { color:var(--sun); }
.date-range-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.time-range-row { display:grid; grid-template-columns:1fr 16px 1fr; gap:4px; align-items:center; }
.time-sep { text-align:center; color:var(--text-muted); font-size:11px; }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:4px; padding:22px; width:560px; max-width:100%; max-height:88vh; overflow-y:auto; border:1px solid var(--border); }
.modal-title { font-family:'Noto Serif SC',serif; font-size:15px; font-weight:600; margin-bottom:4px; }
.modal-subtitle { font-size:11px; color:var(--text-muted); margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--border); }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; padding-top:12px; border-top:1px solid var(--border); }
.modal-section { margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid var(--border-light); }
.modal-section:last-of-type { border-bottom:none; margin-bottom:0; padding-bottom:0; }
.modal-section-title { font-size:11px; font-weight:600; color:var(--text-secondary); letter-spacing:.06em; text-transform:uppercase; margin-bottom:10px; }
.warn-banner { background:var(--warning-light); border:1px solid var(--warning); border-radius:3px; padding:9px 12px; font-size:11px; color:var(--warning); margin-bottom:16px; line-height:1.6; }

/* Record preview */
.copy-box { background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:12px 14px; font-size:11px; line-height:1.8; color:var(--text-secondary); white-space:pre-wrap; word-break:break-all; margin-top:12px; max-height:220px; overflow-y:auto; }
</style>
</head>
<body>

<header>
  <div>
    <h1>面谈预约管理端</h1>
    <div class="header-sub">唯新教育</div>
  </div>
  <button class="btn btn-outline btn-sm" onclick="doLogout()" style="font-size:11px">退出登录</button>
</header>

<!-- Login Overlay -->
<div id="loginOverlay" style="display:none;position:fixed;inset:0;background:rgba(250,247,242,.97);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:0">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:36px 40px;width:320px;text-align:center">
    <div style="font-family:'Noto Serif SC',serif;font-size:1.2rem;font-weight:600;margin-bottom:4px">面谈预约管理端</div>
    <div style="font-size:10px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px">唯新教育</div>
    <div style="text-align:left;margin-bottom:8px">
      <label style="font-size:11px;color:var(--text-secondary);display:block;margin-bottom:5px">管理密码</label>
      <input type="password" id="loginPw" placeholder="请输入密码" style="width:100%">
    </div>
    <div id="loginErr" style="font-size:11px;color:var(--danger);min-height:18px;margin-bottom:10px;text-align:left"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">进入管理后台</button>
    <div style="font-size:10px;color:var(--text-muted);margin-top:14px">登录后自动保持 30 天</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="section-label">新增时间槽</div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="modeTabSingle" onclick="setMode('single')">单次指定</button>
      <button class="mode-tab" id="modeTabRepeat" onclick="setMode('repeat')">按星期循环</button>
    </div>

    <div id="panelSingle">
      <div class="form-group">
        <label class="form-label">日期</label>
        <input type="date" id="slotDate">
      </div>
    </div>
    <div id="panelRepeat" style="display:none">
      <div class="form-group">
        <label class="form-label">适用星期（可多选）</label>
        <div class="weekday-grid" id="weekdayGrid">
          <button class="wd-btn" data-wd="1" onclick="toggleWd(this)">周一</button>
          <button class="wd-btn" data-wd="2" onclick="toggleWd(this)">周二</button>
          <button class="wd-btn" data-wd="3" onclick="toggleWd(this)">周三</button>
          <button class="wd-btn" data-wd="4" onclick="toggleWd(this)">周四</button>
          <button class="wd-btn" data-wd="5" onclick="toggleWd(this)">周五</button>
          <button class="wd-btn sat" data-wd="6" onclick="toggleWd(this)">周六</button>
          <button class="wd-btn sun" data-wd="0" onclick="toggleWd(this)">周日</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">日期范围</label>
        <div class="date-range-row">
          <input type="date" id="repeatStart">
          <input type="date" id="repeatEnd">
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">时间段</label>
      <div class="time-range-row">
        <input type="time" id="slotTimeStart" value="10:00">
        <div class="time-sep">—</div>
        <input type="time" id="slotTimeEnd" value="12:00">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">专业</label>
      <select id="slotMajor">
        <option value="keiei">経営学</option>
        <option value="keizai">経済学</option>
        <option value="shakai">社会学</option>
        <option value="shinpan">新闻传播学</option>
        <option value="fukushi">社会福祉学</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">面谈类型</label>
      <select id="slotType">
        <option value="daily">日常学习面谈（TA老师）</option>
        <option value="plan">计划书相关（专业课老师）</option>
        <option value="mock">模拟面试（按情况安排）</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="addSlot()">＋ 添加时间槽</button>

    <hr class="divider">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="section-label" style="margin:0">本月时间槽 <span id="slotCount" class="count-badge">0</span></div>
      <div style="display:flex;gap:6px">
        <button class="btn-ghost" style="font-size:10px;color:var(--danger)" onclick="clearMonthSlots()">清空本月</button>
        <button class="btn-ghost" style="font-size:10px;color:var(--text-muted)" onclick="clearAllSlots()">清空全部</button>
      </div>
    </div>
    <div class="slot-list" id="slotList">
      <div style="font-size:11px;color:var(--text-muted);text-align:center;padding:14px 0">暂无时间槽</div>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <div class="page-title">预约管理</div>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-display" id="monthDisplay"></div>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="export-bar">
      <div class="export-info">当月数据 · <strong id="exportCount">0</strong> 条预约记录</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" onclick="exportExcel()">↓ 导出本月 Excel</button>
      </div>
    </div>

    <div class="filter-row" id="majorFilterRow">
      <div class="filter-chip active" onclick="setMajorFilter('all',this)">全部专业</div>
      <div class="filter-chip" onclick="setMajorFilter('keiei',this)">経営学</div>
      <div class="filter-chip" onclick="setMajorFilter('keizai',this)">経済学</div>
      <div class="filter-chip" onclick="setMajorFilter('shakai',this)">社会学</div>
      <div class="filter-chip" onclick="setMajorFilter('shinpan',this)">新闻传播</div>
      <div class="filter-chip" onclick="setMajorFilter('fukushi',this)">社会福祉</div>
    </div>

    <div class="btn-group" style="margin-bottom:10px">
      <button class="active" onclick="setTab('all',this)">全部</button>
      <button onclick="setTab('pending',this)">待确认</button>
      <button onclick="setTab('confirmed',this)">已确认</button>
      <button onclick="setTab('cancelled',this)">已取消</button>
    </div>

    <div class="filter-row">
      <div class="filter-chip active" onclick="setTypeFilter('all',this)">所有类型</div>
      <div class="filter-chip" onclick="setTypeFilter('daily',this)">日常学习</div>
      <div class="filter-chip" onclick="setTypeFilter('plan',this)">计划书</div>
      <div class="filter-chip" onclick="setTypeFilter('mock',this)">模拟面试</div>
    </div>

    <div class="booking-grid" id="bookingGrid">
      <div class="empty-state">暂无预约记录</div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">修改预约</div>
    <div class="modal-subtitle" id="editModalSub"></div>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label class="form-label">状态</label>
      <select id="editStatus">
        <option value="pending">待确认</option>
        <option value="confirmed">已确认</option>
        <option value="cancelled">已取消</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">实际面谈时间</label>
      <input type="datetime-local" id="editActualTime">
    </div>
    <div class="form-group">
      <label class="form-label">备注（计划书／模拟面试适用）</label>
      <textarea id="editNote" rows="3" placeholder="面谈记录、备注或跟进事项…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('editModal')">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Record Modal (Daily only) -->
<div class="modal-overlay" id="recordModal">
  <div class="modal">
    <div class="modal-title">面谈记录</div>
    <div class="modal-subtitle" id="recordModalSub"></div>
    <input type="hidden" id="recordId">
    <div id="recordWarn" class="warn-banner" style="display:none"></div>

    <div class="form-group">
      <label class="form-label">实际面谈时间</label>
      <input type="datetime-local" id="recActualTime">
    </div>

    <div class="modal-section">
      <div class="modal-section-title">知识学习进展</div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select id="rec_study_status">
          <option value="">请选择</option>
          <option>进展顺利并能掌握</option>
          <option>能够稳定跟上</option>
          <option>需要更多时间</option>
          <option>没有很好跟上进度</option>
          <option>遇到困难</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">解决建议</label>
        <textarea id="rec_study_advice" rows="2" placeholder="例：建议上课做好笔记，定期复习…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">完成期限</label>
        <input type="date" id="rec_study_deadline">
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">计划书完成情况</div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select id="rec_plan_status">
          <option value="">请选择</option>
          <option>未开始</option>
          <option>在收集材料</option>
          <option>遇到困难</option>
          <option>撰写中</option>
          <option>已完成</option>
        </select>
      </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SLOTS_KEY='txe_slots', BOOKINGS_KEY='txe_bookings';
let currentTab='all', currentTypeFilter='all', currentMajorFilter='all';
let currentMonth=new Date().getMonth(), currentYear=new Date().getFullYear();
let slotMode='single';

const MAJORS={keiei:'経営学',keizai:'経済学',shakai:'社会学',shinpan:'新闻传播学',fukushi:'社会福祉学'};
const DAYS=['周日','周一','周二','周三','周四','周五','周六'];

function getSlots(){return JSON.parse(localStorage.getItem(SLOTS_KEY)||'[]')}
function saveSlots(d){localStorage.setItem(SLOTS_KEY,JSON.stringify(d))}
function getBookings(){return JSON.parse(localStorage.getItem(BOOKINGS_KEY)||'[]')}
function saveBookings(d){localStorage.setItem(BOOKINGS_KEY,JSON.stringify(d))}
function typeLabel(t){return t==='daily'?'日常学习面谈':t==='plan'?'计划书相关':'模拟面试'}
function typeTag(t){return t==='daily'?'tag-daily':t==='plan'?'tag-plan':'tag-mock'}

function setMode(m){
  slotMode=m;
  document.getElementById('modeTabSingle').classList.toggle('active',m==='single');
  document.getElementById('modeTabRepeat').classList.toggle('active',m==='repeat');
  document.getElementById('panelSingle').style.display=m==='single'?'':'none';
  document.getElementById('panelRepeat').style.display=m==='repeat'?'':'none';
}
function toggleWd(btn){btn.classList.toggle('selected')}

function datesForWeekdays(wds,startStr,endStr){
  const start=new Date(startStr),end=new Date(endStr);
  if(isNaN(start)||isNaN(end)||start>end) return [];
  const dates=[],cur=new Date(start);
  while(cur<=end){
    if(wds.includes(cur.getDay())) dates.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

function addSlot(){
  const tstart=document.getElementById('slotTimeStart').value;
  const tend=document.getElementById('slotTimeEnd').value;
  const type=document.getElementById('slotType').value;
  const major=document.getElementById('slotMajor').value;
  if(!tstart||!tend){alert('请填写时间段');return}
  if(tstart>=tend){alert('结束时间需晚于开始时间');return}
  const timeRange=`${tstart}–${tend}`;
  let dates=[];
  if(slotMode==='single'){
    const d=document.getElementById('slotDate').value;
    if(!d){alert('请选择日期');return}
    dates=[d];
  } else {
    const wds=[...document.querySelectorAll('#weekdayGrid .wd-btn.selected')].map(b=>parseInt(b.dataset.wd));
    if(!wds.length){alert('请选择至少一个星期');return}
    const rs=document.getElementById('repeatStart').value, re=document.getElementById('repeatEnd').value;
    if(!rs||!re){alert('请填写日期范围');return}
    dates=datesForWeekdays(wds,rs,re);
    if(!dates.length){alert('所选范围内没有符合的日期');return}
  }
  const slots=getSlots();
  const existing=new Set(slots.map(s=>`${s.date}|${s.timeRange}|${s.type}|${s.major}`));
  let added=0;
  for(const date of dates){
    const key=`${date}|${timeRange}|${type}|${major}`;
    if(!existing.has(key)){
      slots.push({id:`${Date.now()}-${Math.random().toString(36).slice(2,6)}`,date,timeRange,type,major});
      existing.add(key); added++;
    }
  }
  slots.sort((a,b)=>a.date.localeCompare(b.date)||a.timeRange.localeCompare(b.timeRange));
  saveSlots(slots); renderSlots();
  if(added>1) alert(`已添加 ${added} 个时间槽`);
}

function clearMonthSlots(){
  const ym=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const remaining=getSlots().filter(s=>!s.date.startsWith(ym));
  if(!confirm(`确定清空 ${currentYear}年${currentMonth+1}月 的所有时间槽？`)) return;
  saveSlots(remaining); renderSlots();
}
function clearAllSlots(){
  if(!confirm('确定清空全部时间槽？此操作不可恢复。')) return;
  saveSlots([]); renderSlots();
}

function deleteSlot(id){
  if(!confirm('确定删除这个时间槽？')) return;
  saveSlots(getSlots().filter(s=>s.id!==id)); renderSlots();
}

function renderSlots(){
  const slots=getSlots();
  const ym=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const monthSlots=slots.filter(s=>s.date.startsWith(ym));
  document.getElementById('slotCount').textContent=monthSlots.length;
  const list=document.getElementById('slotList');
  if(!monthSlots.length){list.innerHTML='<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:14px 0">本月暂无时间槽</div>';return}
  list.innerHTML=monthSlots.map(s=>{
    const d=new Date(s.date), dow=DAYS[d.getDay()];
    const isSat=d.getDay()===6,isSun=d.getDay()===0;
    const dc=isSat?'var(--sat)':isSun?'var(--sun)':'var(--text-secondary)';
    return `<div class="slot-item">
      <div class="slot-item-left">
        <span class="tag ${typeTag(s.type)}">${s.type==='daily'?'日常':s.type==='plan'?'计划书':'模拟'}</span>
        <span style="font-size:10px;color:var(--text-muted)">${MAJORS[s.major]||s.major}</span>
        <span style="font-weight:500">${s.date.slice(5)}</span>
        <span style="font-size:10px;color:${dc}">${dow}</span>
        <span style="color:var(--text-secondary);font-family:'DM Mono',monospace;font-size:10px">${s.timeRange}</span>
      </div>
      <button class="btn-ghost" onclick="deleteSlot('${s.id}')">✕</button>
    </div>`;
  }).join('');
}

function updateMonthDisplay(){document.getElementById('monthDisplay').textContent=`${currentYear}·${String(currentMonth+1).padStart(2,'0')}`}
function changeMonth(d){
  currentMonth+=d;
  if(currentMonth>11){currentMonth=0;currentYear++}
  if(currentMonth<0){currentMonth=11;currentYear--}
  updateMonthDisplay(); renderSlots(); renderBookings();
}
function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.btn-group button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); renderBookings();
}
function setTypeFilter(type,el){
  currentTypeFilter=type;
  document.querySelectorAll('.filter-row:nth-of-type(2) .filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); renderBookings();
}
function setMajorFilter(major,el){
  currentMajorFilter=major;
  document.querySelectorAll('#majorFilterRow .filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); renderBookings();
}
function urgencyLabel(u){
  if(u==='high') return '<span class="urgency-high">紧急</span>';
  if(u==='mid')  return '<span class="urgency-mid">适中</span>';
  return '<span class="urgency-low">一般</span>';
}

function renderBookings(){
  updateMonthDisplay();
  const all=getBookings();
  const ym=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  let filtered=all.filter(b=>b.slotDate&&b.slotDate.startsWith(ym));
  if(currentTab!=='all') filtered=filtered.filter(b=>b.status===currentTab);
  if(currentTypeFilter!=='all') filtered=filtered.filter(b=>b.type===currentTypeFilter);
  if(currentMajorFilter!=='all') filtered=filtered.filter(b=>b.major===currentMajorFilter);
  filtered.sort((a,b)=>(a.slotDate+a.slotTimeRange).localeCompare(b.slotDate+b.slotTimeRange));
  document.getElementById('exportCount').textContent=all.filter(b=>b.slotDate&&b.slotDate.startsWith(ym)).length;
  const grid=document.getElementById('bookingGrid');
  if(!filtered.length){grid.innerHTML='<div class="empty-state">暂无预约记录</div>';return}
  grid.innerHTML=filtered.map(b=>{
    const hasRecord=b.type==='daily'&&b.dailyRecord;
    const majorName=MAJORS[b.major]||b.major||'';
    return `<div class="booking-card status-${b.status}">
      <div class="booking-header">
        <div>
          <div class="booking-name">${b.name} <span style="font-size:11px;color:var(--text-muted);font-weight:400;font-family:'DM Mono',monospace">${majorName}</span></div>
          <div class="booking-meta">${b.slotDate} ${b.slotTimeRange||''} · ${b.duration}min · ${urgencyLabel(b.urgency)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end">
          <span class="tag ${typeTag(b.type)}">${typeLabel(b.type)}</span>
          <span class="status-badge status-${b.status}">${b.status==='pending'?'待确认':b.status==='confirmed'?'已确认':'已取消'}</span>
          ${hasRecord?'<span class="record-done">已记录</span>':''}
        </div>
      </div>
      <div class="booking-body">
        <div><div class="booking-field-label">出愿期间</div><div class="booking-field-value">${b.examPeriod||''}</div></div>
        <div><div class="booking-field-label">研究计划书</div><div class="booking-field-value">${b.planStatus||''}</div></div>
        <div><div class="booking-field-label">面试准备</div><div class="booking-field-value">${b.interviewStatus||''}</div></div>
      </div>
      <div class="progress-pills">${renderProgressPills(b)}</div>
      ${b.needs?`<div class="booking-needs">💬 ${b.needs}</div>`:''}
      ${b.actualTime?`<div class="note-field"><div class="note-label">实际面谈时间</div><div class="actual-time">✓ ${b.actualTime.replace('T',' ')}</div></div>`:''}
      ${b.note?`<div class="note-field"><div class="note-label">备注</div><div class="note-content">${b.note}</div></div>`:''}
      <div class="booking-actions">
        ${b.status==='pending'?`<button class="btn btn-success btn-sm" onclick="confirmBooking('${b.id}')">✓ 确认</button>`:''}
        <button class="btn btn-outline btn-sm" onclick="openEdit('${b.id}')">编辑</button>
        ${b.status==='confirmed'&&b.type==='daily'?`<button class="btn btn-record btn-sm" onclick="openRecord('${b.id}')">${hasRecord?'查看记录':'填写记录'}</button>`:''}
        ${b.status!=='cancelled'?`<button class="btn btn-danger btn-sm" onclick="cancelBooking('${b.id}')">取消预约</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderProgressPills(b){
  return [['targetSchool','目标学校'],['contactProf','联系教授'],['planStatus','计划书'],
          ['applicationStatus','出愿进度'],['writtenExam','笔试'],['interviewStatus','面试准备'],['specialtyStatus','专业知识']]
    .filter(([k])=>b[k]).map(([k,l])=>`<span class="progress-pill">${l}·${b[k]}</span>`).join('');
}

function confirmBooking(id){
  const bks=getBookings(),b=bks.find(x=>x.id===id);
  if(b){b.status='confirmed';saveBookings(bks);renderBookings()}
}
function cancelBooking(id){
  if(!confirm('确定取消？')) return;
  const bks=getBookings(),b=bks.find(x=>x.id===id);
  if(b){b.status='cancelled';saveBookings(bks);renderBookings()}
}

function openEdit(id){
  const b=getBookings().find(x=>x.id===id);
  if(!b) return;
  document.getElementById('editId').value=id;
  document.getElementById('editModalSub').textContent=`${b.name} · ${b.slotDate} ${b.slotTimeRange||''}`;
  document.getElementById('editStatus').value=b.status;
  document.getElementById('editActualTime').value=b.actualTime||'';
  document.getElementById('editNote').value=b.note||'';
  document.getElementById('editModal').classList.add('open');
}
function saveEdit(){
  const id=document.getElementById('editId').value;
  const bks=getBookings(),b=bks.find(x=>x.id===id);
  if(b){
    b.status=document.getElementById('editStatus').value;
    b.actualTime=document.getElementById('editActualTime').value;
    b.note=document.getElementById('editNote').value;
    saveBookings(bks); closeModal('editModal'); renderBookings();
  }
}

function openRecord(id){
  const b=getBookings().find(x=>x.id===id);
  if(!b) return;
  document.getElementById('recordId').value=id;
  document.getElementById('recordModalSub').textContent=`${b.name} · ${b.slotDate} ${b.slotTimeRange||''}`;
  document.getElementById('copyBox').style.display='none';
  document.getElementById('copyRecordBtn').style.display='none';

  // Time warning
  const warn=document.getElementById('recordWarn');
  const actualStr=b.actualTime||b.slotDate+'T'+((b.slotTimeRange||'').split('–')[0]||'00:00');
  const actualDt=new Date(actualStr);
  const now=new Date();
  if(actualDt>now){
    warn.style.display='block';
    warn.textContent=`⚠ 面谈还未开始（预约时间：${b.slotDate} ${b.slotTimeRange||''}），提前记录请准确填写实际面谈时间。`;
  } else {
    warn.style.display='none';
  }

  // Fill existing record if any
  const r=b.dailyRecord||{};
  document.getElementById('recActualTime').value=b.actualTime||'';
  ['study','plan','apply','exam'].forEach(k=>{
    document.getElementById(`rec_${k}_status`).value=r[`${k}_status`]||'';
    document.getElementById(`rec_${k}_advice`).value=r[`${k}_advice`]||'';
    document.getElementById(`rec_${k}_deadline`).value=r[`${k}_deadline`]||'';
  });
  document.getElementById('rec_issue').value=r.issue||'';
  document.getElementById('rec_issue_advice').value=r.issue_advice||'';
  document.getElementById('rec_issue_deadline').value=r.issue_deadline||'';
  document.getElementById('rec_extra').value=r.extra||'';

  document.getElementById('recordModal').classList.add('open');
}

function saveRecord(){
  const id=document.getElementById('recordId').value;
  const bks=getBookings(),b=bks.find(x=>x.id===id);
  if(!b) return;
  b.actualTime=document.getElementById('recActualTime').value;
  b.dailyRecord={
    study_status:document.getElementById('rec_study_status').value,
    study_advice:document.getElementById('rec_study_advice').value,
    study_deadline:document.getElementById('rec_study_deadline').value,
    plan_status:document.getElementById('rec_plan_status').value,
    plan_advice:document.getElementById('rec_plan_advice').value,
    plan_deadline:document.getElementById('rec_plan_deadline').value,
    apply_status:document.getElementById('rec_apply_status').value,
    apply_advice:document.getElementById('rec_apply_advice').value,
    apply_deadline:document.getElementById('rec_apply_deadline').value,
    exam_status:document.getElementById('rec_exam_status').value,
    exam_advice:document.getElementById('rec_exam_advice').value,
    exam_deadline:document.getElementById('rec_exam_deadline').value,
    issue:document.getElementById('rec_issue').value,
    issue_advice:document.getElementById('rec_issue_advice').value,
    issue_deadline:document.getElementById('rec_issue_deadline').value,
    extra:document.getElementById('rec_extra').value,
  };
  saveBookings(bks);
  // Show copy box
  const text=buildRecordText(b);
  document.getElementById('copyBox').textContent=text;
  document.getElementById('copyBox').style.display='block';
  document.getElementById('copyRecordBtn').style.display='inline-flex';
  renderBookings();
}

function buildRecordText(b){
  const r=b.dailyRecord||{};
  const at=b.actualTime?b.actualTime.replace('T',' '):(b.slotDate+' '+b.slotTimeRange);
  const lines=[
    `【面谈记录】${b.name}`,
    `日期：${at}`,
    `专业：${MAJORS[b.major]||b.major||''}`,
    ``,
  ];
  const sections=[
    ['📚 知识学习进展','study'],
    ['📝 计划书完成情况','plan'],
    ['🎓 出愿情况','apply'],
    ['📖 备考情况','exam'],
  ];
  sections.forEach(([title,k])=>{
    const st=r[`${k}_status`],ad=r[`${k}_advice`],dl=r[`${k}_deadline`];
    if(st||ad||dl){
      lines.push(title);
      if(st) lines.push(`状态：${st}`);
      if(ad) lines.push(`建议：${ad}`);
      if(dl) lines.push(`期限：${dl}`);
      lines.push('');
    }
  });
  if(r.issue||r.issue_advice){
    lines.push('❓ 目前困惑 / 问题');
    if(r.issue) lines.push(`问题：${r.issue}`);
    if(r.issue_advice) lines.push(`建议：${r.issue_advice}`);
    if(r.issue_deadline) lines.push(`期限：${r.issue_deadline}`);
    lines.push('');
  }
  if(r.extra){lines.push('📌 补充');lines.push(r.extra);lines.push('')}
  return lines.join('\n');
}

function copyRecord(){
  const text=document.getElementById('copyBox').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copyRecordBtn');
    btn.textContent='✓ 已复制';
    setTimeout(()=>{btn.textContent='📋 复制记录'},2000);
  }).catch(()=>{
    document.getElementById('copyBox').select?.();
    alert('请手动选中上方文本复制');
  });
}

function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});
});

function exportExcel(){
  const ym=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const data=getBookings().filter(b=>b.slotDate&&b.slotDate.startsWith(ym));
  if(!data.length){alert('当月暂无预约数据');return}
  const rows=data.map(b=>{
    const r=b.dailyRecord||{};
    return {
      '姓名':b.name,'专业':MAJORS[b.major]||b.major||'',
      '预约日期':b.slotDate,'时间段':b.slotTimeRange||'','时长(分钟)':b.duration,
      '面谈类型':typeLabel(b.type),'紧急程度':b.urgency==='high'?'紧急':b.urgency==='mid'?'适中':'一般',
      '出愿期间':b.examPeriod||'','专业知识':b.specialtyStatus||'','目标学校':b.targetSchool||'',
      '联系教授':b.contactProf||'','研究计划书':b.planStatus||'','出愿进度':b.applicationStatus||'',
      '笔试准备':b.writtenExam||'','面试准备':b.interviewStatus||'','具体需求':b.needs||'',
      '状态':b.status==='pending'?'待确认':b.status==='confirmed'?'已确认':'已取消',
      '实际面谈时间':b.actualTime||'','备注':b.note||'',
      '知识进展状态':r.study_status||'','知识进展建议':r.study_advice||'','知识进展期限':r.study_deadline||'',
      '计划书状态':r.plan_status||'','计划书建议':r.plan_advice||'','计划书期限':r.plan_deadline||'',
      '出愿情况状态':r.apply_status||'','出愿建议':r.apply_advice||'','出愿期限':r.apply_deadline||'',
      '备考状态':r.exam_status||'','备考建议':r.exam_advice||'','备考期限':r.exam_deadline||'',
      '困惑问题':r.issue||'','困惑建议':r.issue_advice||'','困惑期限':r.issue_deadline||'',
      '补充':r.extra||''
    };
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'预约记录');
  XLSX.writeFile(wb,`面谈预约_${currentYear}年${currentMonth+1}月.xlsx`);
}

const ADMIN_PW='weixin$2026';
const LOGIN_KEY='txe_admin_login';
const LOGIN_EXPIRE=30*24*60*60*1000; // 30天

function checkLogin(){
  const rec=localStorage.getItem(LOGIN_KEY);
  if(rec){
    const {ts}=JSON.parse(rec);
    if(Date.now()-ts<LOGIN_EXPIRE) return true;
  }
  return false;
}
function doLogin(){
  const pw=document.getElementById('loginPw').value;
  const err=document.getElementById('loginErr');
  if(pw===ADMIN_PW){
    localStorage.setItem(LOGIN_KEY,JSON.stringify({ts:Date.now()}));
    document.getElementById('loginOverlay').style.display='none';
    initPage();
  } else {
    err.textContent='密码错误，请重试';
    document.getElementById('loginPw').value='';
    document.getElementById('loginPw').focus();
  }
}
function doLogout(){
  localStorage.removeItem(LOGIN_KEY);
  location.reload();
}
function initPage(){
  const today=new Date();
  document.getElementById('slotDate').valueAsDate=today;
  const y=today.getFullYear(),m=String(today.getMonth()+1).padStart(2,'0');
  document.getElementById('repeatStart').value=`${y}-${m}-01`;
  document.getElementById('repeatEnd').value=today.toISOString().slice(0,10);
  currentMonth=today.getMonth(); currentYear=today.getFullYear();
  updateMonthDisplay(); renderSlots(); renderBookings();
}

// Init
if(checkLogin()){
  initPage();
} else {
  document.getElementById('loginOverlay').style.display='flex';
}
document.getElementById('loginPw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
